<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin: Politics Quiz Questions — Classicalia</title>
<link rel="icon" type="image/png" href="../../images/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
/* Admin-specific styles */
.admin-wrap {
    max-width: 1100px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
    position: relative;
    z-index: 1;
}

.admin-toolbar {
    display: flex;
    gap: 0.75rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 1.25rem;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
}

.admin-toolbar-left {
    display: flex;
    gap: 0.75rem;
    flex-wrap: wrap;
}

.admin-status {
    font-size: 0.85rem;
    color: rgba(255,255,255,0.5);
}

.admin-btn {
    font-family: 'Inter', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    padding: 0.55rem 1rem;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.05);
    color: white;
    cursor: pointer;
    transition: all 0.15s;
}
.admin-btn:hover {
    background: rgba(255,255,255,0.1);
    border-color: rgba(255,255,255,0.25);
}
.admin-btn.primary {
    background: #0066ff;
    border-color: #0066ff;
}
.admin-btn.primary:hover {
    background: #0052cc;
}
.admin-btn.danger {
    background: rgba(224,85,85,0.15);
    border-color: rgba(224,85,85,0.4);
    color: #ff9b9b;
}
.admin-btn.danger:hover {
    background: rgba(224,85,85,0.25);
}
.admin-btn.small {
    padding: 0.35rem 0.7rem;
    font-size: 0.78rem;
}
.admin-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
}

.lesson-section {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    margin-bottom: 1rem;
    overflow: hidden;
}

.lesson-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 1.25rem;
    cursor: pointer;
    user-select: none;
    transition: background 0.15s;
}
.lesson-header:hover {
    background: rgba(255,255,255,0.05);
}

.lesson-header-left {
    display: flex;
    align-items: center;
    gap: 0.75rem;
}

.lesson-badge {
    background: rgba(0,102,255,0.2);
    color: #5e9fff;
    padding: 0.25rem 0.6rem;
    border-radius: 6px;
    font-size: 0.8rem;
    font-weight: 600;
    font-family: 'Inter', monospace;
}

.lesson-title {
    font-weight: 600;
    font-size: 1rem;
    color: white;
}

.lesson-count {
    font-size: 0.8rem;
    color: rgba(255,255,255,0.4);
}

.lesson-toggle {
    font-size: 1rem;
    color: rgba(255,255,255,0.4);
    transition: transform 0.2s;
}
.lesson-section.expanded .lesson-toggle {
    transform: rotate(180deg);
}

.lesson-body {
    display: none;
    padding: 0 1.25rem 1.25rem;
    border-top: 1px solid rgba(255,255,255,0.06);
}
.lesson-section.expanded .lesson-body {
    display: block;
}

.question-card {
    background: rgba(0,0,0,0.25);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 1rem 1.25rem;
    margin-top: 1rem;
}

.q-label {
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: rgba(255,255,255,0.45);
    margin-bottom: 0.35rem;
}

.q-text {
    font-size: 0.95rem;
    font-weight: 500;
    line-height: 1.5;
    margin-bottom: 0.9rem;
}

.q-answer {
    font-size: 0.9rem;
    line-height: 1.6;
    color: rgba(255,255,255,0.78);
    margin-bottom: 0.9rem;
    white-space: pre-wrap;
}

.q-keypoints {
    list-style: none;
    padding: 0;
    margin-bottom: 1rem;
}
.q-keypoints li {
    position: relative;
    padding-left: 1.1rem;
    font-size: 0.85rem;
    color: rgba(255,255,255,0.65);
    line-height: 1.5;
    margin-bottom: 0.25rem;
}
.q-keypoints li::before {
    content: '>';
    position: absolute;
    left: 0;
    color: #5ecb8a;
    font-weight: 700;
}

.q-actions {
    display: flex;
    gap: 0.5rem;
    padding-top: 0.75rem;
    border-top: 1px solid rgba(255,255,255,0.06);
}

/* Edit form */
.edit-form input,
.edit-form textarea {
    width: 100%;
    font-family: inherit;
    font-size: 0.9rem;
    padding: 0.7rem 0.85rem;
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    color: white;
    line-height: 1.5;
    margin-bottom: 0.75rem;
    resize: vertical;
}
.edit-form input:focus,
.edit-form textarea:focus {
    outline: none;
    border-color: #0066ff;
}
.edit-form textarea {
    min-height: 80px;
}
.edit-form .field-label {
    display: block;
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: rgba(255,255,255,0.55);
    margin-bottom: 0.35rem;
}

.kp-row {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 0.5rem;
    align-items: flex-start;
}
.kp-row input {
    flex: 1;
    margin-bottom: 0;
}
.kp-remove {
    background: rgba(224,85,85,0.15);
    border: 1px solid rgba(224,85,85,0.3);
    color: #ff9b9b;
    width: 36px;
    height: 36px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 1rem;
    flex-shrink: 0;
}
.kp-add {
    font-size: 0.8rem;
    background: rgba(94,203,138,0.12);
    border: 1px dashed rgba(94,203,138,0.35);
    color: #5ecb8a;
    padding: 0.45rem 0.85rem;
    border-radius: 8px;
    cursor: pointer;
    margin-bottom: 0.75rem;
}

.form-actions {
    display: flex;
    gap: 0.5rem;
    padding-top: 0.5rem;
}

.add-question-btn {
    display: block;
    width: 100%;
    margin-top: 1rem;
    padding: 0.8rem;
    font-size: 0.85rem;
    font-weight: 500;
    background: rgba(0,102,255,0.1);
    border: 1px dashed rgba(0,102,255,0.4);
    color: #5e9fff;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.15s;
}
.add-question-btn:hover {
    background: rgba(0,102,255,0.2);
    border-color: rgba(0,102,255,0.6);
}

.loading, .empty, .error {
    text-align: center;
    padding: 2.5rem 1rem;
    color: rgba(255,255,255,0.4);
    font-size: 0.9rem;
}
.error { color: #ff9b9b; }

.toast {
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    padding: 0.9rem 1.25rem;
    background: #1a1f3a;
    border: 1px solid rgba(255,255,255,0.15);
    border-left: 3px solid #5ecb8a;
    border-radius: 8px;
    font-size: 0.85rem;
    color: white;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    z-index: 1000;
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.3s;
}
.toast.show {
    opacity: 1;
    transform: translateY(0);
}
.toast.error {
    border-left-color: #e05555;
}
</style>
</head>

<div class="hero">
    <div class="hero-eyebrow">Admin Panel</div>
    <h1 class="hero-title">Quiz <span style="color:var(--red)">Questions</span></h1>
    <div class="hero-rule"></div>

<div class="admin-wrap">
    <div class="admin-toolbar">

            <button class="admin-btn" onclick="expandAll()">Expand All</button>
            <button class="admin-btn" onclick="collapseAll()">Collapse All</button>
            <button class="admin-btn" id="sync-btn" onclick="syncFromStaticFiles()">Sync from Static Files</button>
        </div>
        <div class="admin-status" id="status"></div>
    </div>

    <div id="content"><div class="loading">Loading...</div></div>
</div>

<div class="foot">Admin tools &mdash; Lawrence McNally</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../../auth/config.js"></script>
<script>
// Lesson metadata - defines display order and titles
const LESSONS = [
    {num: '1.1', title: 'The whole narrative - story summary'},
    {num: '1.2', title: 'Oral tradition and composition'},
    {num: '1.3', title: 'The Homeric Question'},
    {num: '1.4', title: 'Epic structure and in medias res'},
    {num: '1.5', title: 'Key literary techniques'},
    {num: '2.1', title: 'Book 1 in detail'},
    {num: '2.2', title: 'Book 3 in detail'},
    {num: '2.3', title: 'Key themes: kleos, timē, menis, divine intervention'},
    {num: '2.4', title: 'Characters: Achilles, Agamemnon, Helen'},
    {num: '2.5', title: 'Literary techniques in Books 1 & 3'},
    {num: '3.1', title: 'Book 4 in detail'},
    {num: '3.2', title: 'Book 6 in detail'},
    {num: '3.3', title: "War's brutality vs domestic life"},
    {num: '3.4', title: 'Characters: Hector, Andromache, Diomedes'},
    {num: '3.5', title: "Women's roles and position in society"},
    {num: '3.6', title: 'Literary techniques in Books 4 & 6'},
    {num: '4.1', title: 'Book 9: Embassy to Achilles'},
    {num: '4.2', title: 'Book 10: The Doloneia'},
    {num: '4.3', title: 'Heroic values questioned'},
    {num: '4.4', title: "Achilles' refusal and the hero concept"},
    {num: '4.5', title: 'Literary techniques in Books 9 & 10'},
    {num: '5.1', title: "Book 16: Patroclus' aristeia"},
    {num: '5.2', title: 'Book 17: Fight for the body'},
    {num: '5.3', title: 'Death and mortality'},
    {num: '5.4', title: 'Patroclus and Achilles'},
    {num: '5.5', title: 'Literary techniques in Books 16 & 17'},
    {num: '6.1', title: 'Book 18: Shield of Achilles'},
    {num: '6.2', title: 'Book 19: Arming for battle'},
    {num: '6.3', title: 'Grief and revenge'},
    {num: '6.4', title: 'Achilles transformed'},
    {num: '6.5', title: 'The Shield: microcosm of society'},
    {num: '7.1', title: "Book 22: Hector's death"},
    {num: '7.2', title: 'Book 23: Funeral games'},
    {num: '7.3', title: "Book 24: Priam's supplication"},
    {num: '7.4', title: 'Reconciliation and humanity'},
    {num: '7.5', title: 'Hector, Priam, Achilles'}
];

let questionsByLesson = {};  // { '1.1': [rows], ... }
let currentUser = null;

// ====== Init & Auth ======

async function init() {
    const { data: { user } } = await supabase.auth.getUser();
    if (!user) {
        window.location.href = '../../auth/login.html';
        return;
    }

    const { data: profile } = await supabase
        .from('users')
        .select('id, email, full_name, is_admin')
        .eq('id', user.id)
        .single();

    if (!profile || !profile.is_admin) {
        alert('Access denied. Admin only.');
        window.location.href = 'index.html';
        return;
    }

    currentUser = profile;
    document.getElementById('status').textContent = `Signed in as ${profile.full_name || profile.email}`;

    await loadQuestions();
}

// ====== Data loading ======

async function loadQuestions() {
    const content = document.getElementById('content');
    content.innerHTML = '<div class="loading">Loading questions...</div>';

    const { data, error } = await supabase
        .from('iliad_quiz_questions')
        .select('*')
        .order('lesson')
        .order('sort_order');

    if (error) {
        content.innerHTML = `<div class="error">Failed to load: ${escapeHtml(error.message)}</div>`;
        return;
    }

    // Group by lesson
    questionsByLesson = {};
    for (const row of data || []) {
        if (!questionsByLesson[row.lesson]) questionsByLesson[row.lesson] = [];
        questionsByLesson[row.lesson].push(row);
    }

    render();
}

function render() {
    const content = document.getElementById('content');
    content.innerHTML = '';

    const totalQuestions = Object.values(questionsByLesson).reduce((a, b) => a + b.length, 0);
    if (totalQuestions === 0) {
        content.innerHTML = `
            <div class="empty">
                <p>No questions in the database yet.</p>
                <p style="margin-top:0.75rem;">Click <strong>Sync from Static Files</strong> to import the existing questions.</p>
            </div>
        `;
        return;
    }

    for (const {num, title} of LESSONS) {
        const rows = questionsByLesson[num] || [];
        const section = document.createElement('div');
        section.className = 'lesson-section';
        section.id = `lesson-${num}`;

        section.innerHTML = `
            <div class="lesson-header" onclick="toggleLesson('${num}')">
                <div class="lesson-header-left">
                    <span class="lesson-badge">${num}</span>
                    <span class="lesson-title">${escapeHtml(title)}</span>
                    <span class="lesson-count">${rows.length} question${rows.length !== 1 ? 's' : ''}</span>
                </div>
                <span class="lesson-toggle">⌄</span>
            </div>
            <div class="lesson-body">
                <div id="lesson-body-${num}"></div>
                <button class="add-question-btn" onclick="startAddQuestion('${num}', \`${escapeBacktick(title)}\`)">+ Add Question</button>
            </div>
        `;

        content.appendChild(section);
        renderQuestions(num);
    }
}

function renderQuestions(lessonNum) {
    const body = document.getElementById(`lesson-body-${lessonNum}`);
    if (!body) return;
    const rows = questionsByLesson[lessonNum] || [];
    body.innerHTML = '';

    for (const row of rows) {
        const card = document.createElement('div');
        card.className = 'question-card';
        card.id = `q-${row.id}`;
        card.innerHTML = renderQuestionView(row);
        body.appendChild(card);
    }
}

function renderQuestionView(row) {
    const kpHtml = (row.key_points || []).map(kp => `<li>${escapeHtml(kp)}</li>`).join('');
    return `
        <div class="q-label">Question</div>
        <div class="q-text">${escapeHtml(row.question)}</div>
        <div class="q-label">Model Answer</div>
        <div class="q-answer">${escapeHtml(row.model_answer)}</div>
        ${kpHtml ? `<div class="q-label">Key Points</div><ul class="q-keypoints">${kpHtml}</ul>` : ''}
        <div class="q-actions">
            <button class="admin-btn small" onclick="startEditQuestion('${row.id}')">Edit</button>
            <button class="admin-btn small danger" onclick="deleteQuestion('${row.id}')">Delete</button>
        </div>
    `;
}

// ====== Expand / collapse ======

function toggleLesson(num) {
    document.getElementById(`lesson-${num}`).classList.toggle('expanded');
}

function expandAll() {
    document.querySelectorAll('.lesson-section').forEach(s => s.classList.add('expanded'));
}

function collapseAll() {
    document.querySelectorAll('.lesson-section').forEach(s => s.classList.remove('expanded'));
}

// ====== Edit mode ======

function startEditQuestion(id) {
    const row = findQuestion(id);
    if (!row) return;
    const card = document.getElementById(`q-${id}`);
    card.innerHTML = renderEditForm(row, false);
}

function startAddQuestion(lessonNum, lessonTitle) {
    const body = document.getElementById(`lesson-body-${lessonNum}`);
    if (!body) return;
    // Don't add multiple new question forms
    if (body.querySelector('.question-card.new')) return;
    const card = document.createElement('div');
    card.className = 'question-card new';
    card.id = 'q-new';
    const blank = { id: 'new', lesson: lessonNum, lesson_title: lessonTitle, question: '', model_answer: '', key_points: [] };
    card.innerHTML = renderEditForm(blank, true);
    body.appendChild(card);
    card.scrollIntoView({ behavior: 'smooth', block: 'center' });
    card.querySelector('textarea[name="question"]').focus();
}

function renderEditForm(row, isNew) {
    const kpInputs = (row.key_points && row.key_points.length > 0 ? row.key_points : [''])
        .map(kp => renderKpRow(kp)).join('');
    const idAttr = isNew ? 'new' : row.id;
    return `
        <div class="edit-form" data-id="${idAttr}">
            <label class="field-label">Question</label>
            <textarea name="question" placeholder="The question...">${escapeHtml(row.question || '')}</textarea>

            <label class="field-label">Model Answer</label>
            <textarea name="modelAnswer" placeholder="The model answer..." style="min-height:120px;">${escapeHtml(row.model_answer || '')}</textarea>

            <label class="field-label">Key Points</label>
            <div class="kp-list">${kpInputs}</div>
            <button type="button" class="kp-add" onclick="addKpRow(this)">+ Add Key Point</button>

            <div class="form-actions">
                <button class="admin-btn primary" onclick="saveQuestion('${idAttr}', '${row.lesson}', \`${escapeBacktick(row.lesson_title || '')}\`)">Save</button>
                <button class="admin-btn" onclick="cancelEdit('${idAttr}', '${row.lesson}')">Cancel</button>
            </div>
        </div>
    `;
}

function renderKpRow(value) {
    return `
        <div class="kp-row">
            <input type="text" name="keypoint" value="${escapeHtml(value || '')}" placeholder="Short key point">
            <button type="button" class="kp-remove" onclick="removeKpRow(this)">×</button>
        </div>
    `;
}

function addKpRow(btn) {
    const form = btn.closest('.edit-form');
    const list = form.querySelector('.kp-list');
    const div = document.createElement('div');
    div.innerHTML = renderKpRow('');
    list.appendChild(div.firstElementChild);
}

function removeKpRow(btn) {
    btn.closest('.kp-row').remove();
}

function cancelEdit(id, lessonNum) {
    if (id === 'new') {
        document.getElementById('q-new')?.remove();
        return;
    }
    const row = findQuestion(id);
    if (!row) return;
    const card = document.getElementById(`q-${id}`);
    card.innerHTML = renderQuestionView(row);
}

// ====== Save / delete ======

async function saveQuestion(id, lessonNum, lessonTitle) {
    const card = document.getElementById(`q-${id}`);
    const form = card.querySelector('.edit-form');
    const question = form.querySelector('textarea[name="question"]').value.trim();
    const modelAnswer = form.querySelector('textarea[name="modelAnswer"]').value.trim();
    const keyPoints = Array.from(form.querySelectorAll('input[name="keypoint"]'))
        .map(i => i.value.trim())
        .filter(Boolean);

    if (!question || !modelAnswer) {
        toast('Question and model answer are required', true);
        return;
    }

    const saveBtn = form.querySelector('.admin-btn.primary');
    saveBtn.disabled = true;
    saveBtn.textContent = 'Saving...';

    try {
        if (id === 'new') {
            // Find next sort_order
            const existing = questionsByLesson[lessonNum] || [];
            const nextSort = existing.length > 0
                ? Math.max(...existing.map(r => r.sort_order || 0)) + 1
                : 0;
            const { data, error } = await supabase
                .from('iliad_quiz_questions')
                .insert({
                    lesson: lessonNum,
                    lesson_title: lessonTitle,
                    question,
                    model_answer: modelAnswer,
                    key_points: keyPoints,
                    sort_order: nextSort
                })
                .select()
                .single();
            if (error) throw error;
            if (!questionsByLesson[lessonNum]) questionsByLesson[lessonNum] = [];
            questionsByLesson[lessonNum].push(data);
            toast('Question added');
        } else {
            const { data, error } = await supabase
                .from('iliad_quiz_questions')
                .update({
                    question,
                    model_answer: modelAnswer,
                    key_points: keyPoints
                })
                .eq('id', id)
                .select()
                .single();
            if (error) throw error;
            // Update local copy
            const row = findQuestion(id);
            if (row) Object.assign(row, data);
            toast('Question updated');
        }
        render();
        document.getElementById(`lesson-${lessonNum}`)?.classList.add('expanded');
    } catch (err) {
        console.error(err);
        toast('Failed: ' + err.message, true);
        saveBtn.disabled = false;
        saveBtn.textContent = 'Save';
    }
}

async function deleteQuestion(id) {
    if (!confirm('Delete this question? This cannot be undone.')) return;
    try {
        const { error } = await supabase
            .from('iliad_quiz_questions')
            .delete()
            .eq('id', id);
        if (error) throw error;
        // Remove from local state
        for (const lesson in questionsByLesson) {
            questionsByLesson[lesson] = questionsByLesson[lesson].filter(r => r.id !== id);
        }
        render();
        // Re-expand all that were expanded before
        toast('Question deleted');
    } catch (err) {
        toast('Failed to delete: ' + err.message, true);
    }
}

// ====== Sync from static files ======

async function syncFromStaticFiles() {
    if (!confirm('This will import questions from the static JS files into the database.\n\nExisting database questions will NOT be touched - only new lessons will be added if their content is missing.\n\nContinue?')) return;

    const btn = document.getElementById('sync-btn');
    btn.disabled = true;
    btn.textContent = 'Syncing...';

    let totalInserted = 0;
    let totalSkipped = 0;

    try {
        for (let topicNum = 1; topicNum <= 7; topicNum++) {
            // Dynamically load topic questions file
            let data;
            try {
                data = await loadTopicFile(topicNum);
            } catch (e) {
                console.error(`Failed to load topic ${topicNum}:`, e);
                continue;
            }
            if (!data) continue;

            for (const [lessonNum, lesson] of Object.entries(data)) {
                // Skip if already has questions in DB
                if ((questionsByLesson[lessonNum] || []).length > 0) {
                    totalSkipped += lesson.questions.length;
                    continue;
                }

                const rows = lesson.questions.map((q, i) => ({
                    lesson: lessonNum,
                    lesson_title: lesson.title,
                    question: q.question,
                    model_answer: q.modelAnswer,
                    key_points: q.keyPoints || [],
                    sort_order: i
                }));

                if (rows.length === 0) continue;

                const { data: inserted, error } = await supabase
                    .from('iliad_quiz_questions')
                    .insert(rows)
                    .select();

                if (error) {
                    throw new Error(`Topic ${topicNum} lesson ${lessonNum}: ${error.message}`);
                }
                totalInserted += inserted.length;
            }
        }

        await loadQuestions();
        toast(`Sync complete: ${totalInserted} imported, ${totalSkipped} already present`);
    } catch (err) {
        console.error(err);
        toast('Sync failed: ' + err.message, true);
    } finally {
        btn.disabled = false;
        btn.textContent = 'Sync from Static Files';
    }
}

// Load a topic's static JS file and return its quizData
async function loadTopicFile(topicNum) {
    return new Promise((resolve, reject) => {
        window.quizData = undefined;
        const script = document.createElement('script');
        script.src = `topic${topicNum}-questions.js?t=${Date.now()}`;
        script.onload = () => {
            const data = window.quizData;
            document.head.removeChild(script);
            window.quizData = undefined;
            if (!data || typeof data !== 'object') {
                reject(new Error(`topic${topicNum}-questions.js did not set window.quizData`));
                return;
            }
            resolve(data);
        };
        script.onerror = () => {
            document.head.removeChild(script);
            reject(new Error(`Failed to load topic${topicNum}-questions.js`));
        };
        document.head.appendChild(script);
    });
}

// ====== Helpers ======

function findQuestion(id) {
    for (const lesson in questionsByLesson) {
        const row = questionsByLesson[lesson].find(r => r.id === id);
        if (row) return row;
    }
    return null;
}

function escapeHtml(str) {
    if (str == null) return '';
    return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}

function escapeBacktick(str) {
    return String(str || '').replace(/`/g, '\\`').replace(/\\/g, '\\\\').replace(/\$/g, '\\$');
}

function toast(msg, isError) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.toggle('error', !!isError);
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3500);
}

// ====== Particle animation (matches other pages) ======
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);
const particles = Array.from({length: 40}, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    vx: (Math.random() - 0.5) * 0.15,
    vy: (Math.random() - 0.5) * 0.15,
    r: Math.random() * 1.2 + 0.3
}));
function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (const p of particles) {
        p.x += p.vx;
        p.y += p.vy;
        if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
        if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,0.25)';
        ctx.fill();
    }
    requestAnimationFrame(animate);
}
animate();

init();
