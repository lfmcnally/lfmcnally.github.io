<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agrippina – Tacitus XIV</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #ffffff;
    font-family: 'Lora', serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  .counter {
    position: fixed;
    top: 2rem;
    right: 2.5rem;
    font-family: 'Lora', serif;
    font-size: 0.85rem;
    color: #a0b4cc;
    letter-spacing: 0.05em;
  }

  .card {
    max-width: 820px;
    width: 100%;
    text-align: center;
  }

  .label { display: none; }

  .latin {
    font-size: 1.55rem;
    font-style: italic;
    font-weight: 600;
    color: #1a3557;
    line-height: 1.75;
    margin-bottom: 2rem;
  }

  .divider {
    width: 48px;
    height: 2px;
    background: #0066ff;
    margin: 0 auto 2rem;
    border-radius: 1px;
  }

  .english {
    font-size: 1.05rem;
    font-weight: 600;
    color: #0066ff;
    line-height: 1.8;
  }

  .nav {
    position: fixed;
    bottom: 2.5rem;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 1.2rem;
    align-items: center;
  }

  button {
    background: none;
    border: 1.5px solid #c8d8e8;
    color: #1a3557;
    font-family: 'Lora', serif;
    font-size: 0.85rem;
    padding: 0.5rem 1.4rem;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s ease;
  }

  button:hover {
    background: #1a3557;
    color: #fff;
    border-color: #1a3557;
  }

  button:disabled {
    opacity: 0.25;
    cursor: default;
    background: none;
    color: #1a3557;
    border-color: #c8d8e8;
  }

  .dots {
    display: flex;
    gap: 0.5rem;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #c8d8e8;
    transition: background 0.2s;
  }

  .dot.active {
    background: #1a3557;
  }
</style>
</head>
<body>

<div class="counter" id="counter"></div>

<div class="card" id="card">
  <div class="label" id="label"></div>
  <div class="latin" id="latin"></div>
  <div class="divider"></div>
  <div class="english" id="english"></div>
</div>

<nav class="nav">
  <button id="prev" onclick="go(-1)">← prev</button>
  <div class="dots" id="dots"></div>
  <button id="next" onclick="go(1)">next →</button>
</nav>

<script>
const sentences = [
  {
    num: "I",
    latin: "noctem sideribus inlustrem et placido mari quietam quasi convincendum ad scelus dii praebuere.",
    english: "The gods offered a night bright with stars and calm with a peaceful sea, as if to expose the crime."
  },
  {
    num: "II",
    latin: "nec multum erat progressa navis, duobus e numero familiarium Agrippinam comitantibus, ex quis Crepereius Gallus haud procul gubernaculis adstabat, Acerronia super pedes cubitantis reclinis paenitentiam filii et reciperatam matris gratiam per gaudium memorabat,",
    english: "The ship had not advanced far, with two of her friends accompanying Agrippina, of whom Crepereius Gallus was standing not far from the rudders, while Acerronia, reclining above the feet of her lying down, was joyfully talking about the repentance of her son and the mother's recovered influence,"
  },
  {
    num: "III",
    latin: "cum dato signo ruere tectum loci multo plumbo grave, pressusque Crepereius et statim exanimatus est:",
    english: "when at a given signal the roof of the room, heavy with much lead, collapsed, and Crepereius was crushed and immediately killed."
  },
  {
    num: "IV",
    latin: "Agrippina et Acerronia eminentibus lecti parietibus ac forte validioribus quam ut oneri cederent protectae sunt.",
    english: "Agrippina and Acerronia were protected by the projecting walls of the couch, which by chance were too strong to yield to the weight."
  },
  {
    num: "V",
    latin: "nec dissolutio navigii sequebatur, turbatis omnibus et quod plerique ignari etiam conscios impediebant.",
    english: "Nor did the breaking up of the ship follow, since everyone was confused and the ignorant majority were even hindering those in the know."
  },
  {
    num: "VI",
    latin: "visum dehinc remigibus unum in latus inclinare atque ita navem submergere:",
    english: "Then it seemed good to the rowers to lean to one side and thus sink the ship."
  },
  {
    num: "VII",
    latin: "sed neque ipsis promptus in rem subitam consensus, et alii contra nitentes dedere facultatem lenioris in mare iactus.",
    english: "But their agreement was not quick for the sudden situation, and others pressing against gave the opportunity for a gentler casting into the sea."
  },
  {
    num: "VIII",
    latin: "verum Acerronia, imprudentia dum se Agrippinam esse utque subveniretur matri principis clamitat, contis et remis et quae fors obtulerat navalibus telis conficitur:",
    english: "But Acerronia, through imprudence, while she shouts that she is Agrippina and that help be given to the emperor's mother, is killed with poles and oars and whatever naval weapons chance had offered."
  },
  {
    num: "IX",
    latin: "Agrippina silens eoque minus adgnita (unum tamen vulnus umero excepit) nando, deinde occursu lenunculorum Lucrinum in lacum vecta villae suae infertur.",
    english: "Agrippina, silent and for that reason less recognised (she received, however, one wound in the shoulder), by swimming, then having been carried by meeting little boats to the Lucrine lake, is brought to her villa."
  }
];

let current = 0;

const dotsEl = document.getElementById('dots');
sentences.forEach((_, i) => {
  const d = document.createElement('div');
  d.className = 'dot' + (i === 0 ? ' active' : '');
  d.id = 'dot' + i;
  dotsEl.appendChild(d);
});

function render() {
  const s = sentences[current];
  document.getElementById('label').textContent = `Sentence ${s.num}`;
  document.getElementById('latin').textContent = s.latin;
  document.getElementById('english').textContent = s.english;
  document.getElementById('counter').textContent = `${current + 1} / ${sentences.length}`;
  document.getElementById('prev').disabled = current === 0;
  document.getElementById('next').disabled = current === sentences.length - 1;
  document.querySelectorAll('.dot').forEach((d, i) => {
    d.classList.toggle('active', i === current);
  });
}

function go(dir) {
  const next = current + dir;
  if (next < 0 || next >= sentences.length) return;
  current = next;
  render();
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') go(1);
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') go(-1);
});

render();
</script>
</body>
</html>
