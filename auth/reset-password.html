<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/png" href="/images/favicon.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset password — Classicalia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/version2/assets/css/classicalia.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="auth-body">

<div class="dash-header" style="padding:80px 0 60px;">
  <canvas class="header-sky" data-starfield data-seed="999" data-region="0.8"></canvas>
  <nav class="nav">
    <div class="nav-inner">
      <a href="/version2/" class="nav-logo"><img src="/version2/assets/images/classicalia-wordmark.png" alt="Classicalia"></a>
      <div class="nav-links">
        <a href="/version2/subjects/latin/" class="nav-link">Latin</a>
        <a href="/version2/subjects/greek/" class="nav-link">Greek</a>
        <a href="/version2/subjects/classical-civilisation/" class="nav-link">Class. Civ.</a>
        <div class="nav-div"></div>
        <a href="/auth/login.html" class="nav-cta">Sign in</a>
      </div>
    </div>
  </nav>
  <div style="max-width:480px;margin:0 auto;padding:0 24px;position:relative;z-index:2;">
    <div class="dash-eyebrow">Reset password</div>
    <div class="dash-title" style="font-size:36px;">Set a new password</div>
    <div class="dash-subtitle">Pick something memorable but not something you've used elsewhere.</div>
  </div>
</div>

<div class="auth-wrap">
  <div class="auth-card">

    <div id="loading" class="auth-hint" style="text-align:center;padding:18px 0;">Verifying your reset link&hellip;</div>

    <div id="message" class="auth-message"></div>

    <form id="resetForm" class="hidden">
      <div class="auth-field">
        <label for="password" class="auth-label">New password</label>
        <input type="password" id="password" name="password" class="auth-input" required placeholder="Enter new password" minlength="6" autocomplete="new-password">
        <span class="auth-hint">At least 6 characters.</span>
      </div>

      <div class="auth-field">
        <label for="confirmPassword" class="auth-label">Confirm new password</label>
        <input type="password" id="confirmPassword" name="confirmPassword" class="auth-input" required placeholder="Confirm new password" minlength="6" autocomplete="new-password">
      </div>

      <button type="submit" class="auth-submit" id="submitBtn">Update password</button>
    </form>

    <div class="auth-foot">
      <div><a href="login.html">Back to sign in</a></div>
      <div class="auth-foot-sep">·</div>
      <div><a href="/version2/">&larr; Back to Classicalia</a></div>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script src="auth.js"></script>
<script src="/version2/assets/js/starfield.js"></script>
<script>
  const form = document.getElementById('resetForm');
  const messageDiv = document.getElementById('message');
  const submitBtn = document.getElementById('submitBtn');
  const loadingDiv = document.getElementById('loading');

  function showMessage(text, type) {
    messageDiv.textContent = text;
    messageDiv.className = 'auth-message ' + type;
  }

  document.addEventListener('DOMContentLoaded', async function () {
    supabase.auth.onAuthStateChange(async function (event, session) {
      if (event === 'PASSWORD_RECOVERY') {
        loadingDiv.classList.add('hidden');
        form.classList.remove('hidden');
      } else if (event === 'SIGNED_IN' && session) {
        loadingDiv.classList.add('hidden');
        form.classList.remove('hidden');
      }
    });

    const { data: { session } } = await supabase.auth.getSession();
    if (session) {
      loadingDiv.classList.add('hidden');
      form.classList.remove('hidden');
    } else {
      // Give Supabase a moment to process the URL hash
      setTimeout(async function () {
        const { data: { session: delayedSession } } = await supabase.auth.getSession();
        if (delayedSession) {
          loadingDiv.classList.add('hidden');
          form.classList.remove('hidden');
        } else if (form.classList.contains('hidden')) {
          loadingDiv.classList.add('hidden');
          showMessage('This password reset link is invalid or has expired. Please request a new one.', 'error');
        }
      }, 1000);
    }
  });

  form.addEventListener('submit', async function (e) {
    e.preventDefault();
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirmPassword').value;

    if (password !== confirmPassword) {
      showMessage('Passwords do not match.', 'error');
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = 'Updating…';

    const result = await updatePassword(password);

    if (result.success) {
      showMessage('Password updated. Redirecting to sign in…', 'success');
      submitBtn.textContent = 'Password updated';
      setTimeout(async function () {
        await signOut();
        window.location.href = 'login.html';
      }, 2000);
    } else {
      showMessage(result.error, 'error');
      submitBtn.disabled = false;
      submitBtn.textContent = 'Update password';
    }
  });
</script>
</body>
</html>
