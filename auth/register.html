<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/png" href="/images/favicon.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign up — Classicalia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/version2/assets/css/classicalia.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="auth-body">

<div class="dash-header" style="padding:80px 0 60px;">
  <canvas class="header-sky" data-starfield data-seed="404" data-region="0.8"></canvas>
  <nav class="nav">
    <div class="nav-inner">
      <a href="/version2/" class="nav-logo"><img src="/version2/assets/images/classicalia-wordmark.png" alt="Classicalia"></a>
      <div class="nav-links">
        <a href="/version2/subjects/latin/" class="nav-link">Latin</a>
        <a href="/version2/subjects/greek/" class="nav-link">Greek</a>
        <a href="/version2/subjects/classical-civilisation/" class="nav-link">Class. Civ.</a>
        <div class="nav-div"></div>
        <a href="/auth/login.html" class="nav-cta">Sign in</a>
      </div>
    </div>
  </nav>
  <div style="max-width:480px;margin:0 auto;padding:0 24px;position:relative;z-index:2;">
    <div class="dash-eyebrow">Create an account</div>
    <div class="dash-title" style="font-size:36px;">Join Classicalia</div>
    <div class="dash-subtitle">Free, always — sync your progress across devices and let teachers see your work if you choose to share your code.</div>
  </div>
</div>

<div class="auth-wrap">
  <div class="auth-card">

    <div id="message" class="auth-message"></div>

    <form id="registerForm">
      <div class="auth-field">
        <label for="fullName" class="auth-label">Full name</label>
        <input type="text" id="fullName" name="fullName" class="auth-input" required placeholder="Your full name" autocomplete="name">
      </div>

      <div class="auth-field">
        <label for="email" class="auth-label">Email address</label>
        <input type="email" id="email" name="email" class="auth-input" required placeholder="you@example.com" autocomplete="email">
      </div>

      <div class="auth-field">
        <label for="password" class="auth-label">Password</label>
        <input type="password" id="password" name="password" class="auth-input" required placeholder="Choose a password" minlength="6" autocomplete="new-password">
        <span class="auth-hint">At least 6 characters.</span>
      </div>

      <div class="auth-field">
        <label for="school" class="auth-label">School</label>
        <input type="text" id="school" name="school" class="auth-input" required placeholder="Your school name" list="schoolSuggestions" autocomplete="off">
        <datalist id="schoolSuggestions"></datalist>
      </div>

      <div class="auth-field">
        <label class="auth-label">I am a&hellip;</label>
        <div class="auth-roles">
          <label class="auth-role" id="studentCard">
            <input type="radio" name="role" value="student" checked>
            <div class="auth-role-title">Student</div>
            <div class="auth-role-desc">Track your own progress; join a teacher's class with a sharing code.</div>
          </label>
          <label class="auth-role" id="teacherCard">
            <input type="radio" name="role" value="teacher">
            <div class="auth-role-title">Teacher</div>
            <div class="auth-role-desc">Create classes, add students, and see their vocabulary progress.</div>
          </label>
        </div>
      </div>

      <button type="submit" class="auth-submit" id="submitBtn">Create account</button>
    </form>

    <div class="auth-foot">
      <div>Already have an account? <a href="login.html">Sign in</a></div>
      <div class="auth-foot-sep">·</div>
      <div><a href="/version2/">&larr; Back to Classicalia</a></div>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script src="auth.js"></script>
<script src="../shared/school-matcher.js"></script>
<script src="/version2/assets/js/starfield.js"></script>
<script>
  const form = document.getElementById('registerForm');
  const messageDiv = document.getElementById('message');
  const submitBtn = document.getElementById('submitBtn');
  const roleCards = document.querySelectorAll('.auth-role');

  function showMessage(text, type) {
    messageDiv.textContent = text;
    messageDiv.className = 'auth-message ' + type;
  }

  function syncRoleSelection() {
    roleCards.forEach(card => {
      const input = card.querySelector('input[type="radio"]');
      card.classList.toggle('is-selected', input && input.checked);
    });
  }
  roleCards.forEach(card => {
    card.addEventListener('click', () => {
      const input = card.querySelector('input[type="radio"]');
      if (input) input.checked = true;
      syncRoleSelection();
    });
  });
  syncRoleSelection();

  // Title-case school name as the user types
  function titleCaseSchool(value) {
    return value.replace(/\b\w/g, c => c.toUpperCase());
  }
  const schoolInput = document.getElementById('school');
  schoolInput.addEventListener('input', function () {
    const pos = this.selectionStart;
    this.value = titleCaseSchool(this.value);
    this.setSelectionRange(pos, pos);
  });

  // Cached list of existing schools for autocomplete + near-duplicate detection
  let existingSchools = [];
  async function loadSchoolSuggestions() {
    try {
      const { data: users } = await supabase
        .from('users')
        .select('school')
        .not('school', 'is', null);
      if (!users) return;
      existingSchools = [...new Set(users.map(u => u.school.trim()).filter(Boolean))];
      existingSchools.sort();
      const datalist = document.getElementById('schoolSuggestions');
      datalist.innerHTML = existingSchools.map(s => '<option value="' + s + '">').join('');
    } catch (e) { /* non-critical */ }
  }

  document.addEventListener('DOMContentLoaded', async function () {
    await redirectIfLoggedIn();
    loadSchoolSuggestions();
  });

  form.addEventListener('submit', async function (e) {
    e.preventDefault();
    const fullName = document.getElementById('fullName').value;
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    let school = document.getElementById('school').value.trim();
    const role = document.querySelector('input[name="role"]:checked').value;

    if (school && window.SchoolMatcher) {
      school = window.SchoolMatcher.resolveSchoolChoice(school, existingSchools);
      document.getElementById('school').value = school;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = 'Creating account…';

    const result = await signUp(email, password, fullName, role, school);

    if (result.success) {
      showMessage('Account created! Check your email to confirm your account, then sign in.', 'success');
      submitBtn.textContent = 'Account created';
      setTimeout(() => { window.location.href = 'login.html'; }, 3000);
    } else {
      showMessage(result.error, 'error');
      submitBtn.disabled = false;
      submitBtn.textContent = 'Create account';
    }
  });
</script>
</body>
</html>
