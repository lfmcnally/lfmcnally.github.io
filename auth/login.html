<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/png" href="/images/favicon.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in — Classicalia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/version2/assets/css/classicalia.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="auth-body">

<div class="dash-header" style="padding:80px 0 60px;">
  <canvas class="header-sky" data-starfield data-seed="616" data-region="0.8"></canvas>
  <nav class="nav">
    <div class="nav-inner">
      <a href="/version2/" class="nav-logo"><img src="/version2/assets/images/classicalia-wordmark.png" alt="Classicalia"></a>
      <div class="nav-links">
        <a href="/version2/subjects/latin/" class="nav-link">Latin</a>
        <a href="/version2/subjects/greek/" class="nav-link">Greek</a>
        <a href="/version2/subjects/classical-civilisation/" class="nav-link">Class. Civ.</a>
        <div class="nav-div"></div>
        <a href="/auth/register.html" class="nav-cta">Sign up</a>
      </div>
    </div>
  </nav>
  <div style="max-width:480px;margin:0 auto;padding:0 24px;position:relative;z-index:2;">
    <div class="dash-eyebrow">Welcome back</div>
    <div class="dash-title" style="font-size:36px;">Sign in</div>
    <div class="dash-subtitle">Pick up where you left off — your progress, classes, and sharing code are waiting.</div>
  </div>
</div>

<div class="auth-wrap">
  <div class="auth-card">

    <div id="message" class="auth-message"></div>

    <form id="loginForm">
      <div class="auth-field">
        <label for="email" class="auth-label">Email address</label>
        <input type="email" id="email" name="email" class="auth-input" required placeholder="you@example.com" autocomplete="email">
      </div>

      <div class="auth-field">
        <label for="password" class="auth-label">Password</label>
        <input type="password" id="password" name="password" class="auth-input" required placeholder="Your password" autocomplete="current-password">
      </div>

      <button type="submit" class="auth-submit" id="submitBtn">Sign in</button>
    </form>

    <div class="auth-foot">
      <div><a href="forgot-password.html">Forgot your password?</a></div>
      <div class="auth-foot-sep">·</div>
      <div>Don't have an account? <a href="register.html">Create one</a></div>
      <div class="auth-foot-sep">·</div>
      <div><a href="/version2/">&larr; Back to Classicalia</a></div>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script src="auth.js"></script>
<script src="/version2/assets/js/starfield.js"></script>
<script>
  const form = document.getElementById('loginForm');
  const messageDiv = document.getElementById('message');
  const submitBtn = document.getElementById('submitBtn');

  function showMessage(text, type) {
    messageDiv.textContent = text;
    messageDiv.className = 'auth-message ' + type;
  }

  document.addEventListener('DOMContentLoaded', async function () {
    await redirectIfLoggedIn();
  });

  form.addEventListener('submit', async function (e) {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    submitBtn.disabled = true;
    submitBtn.textContent = 'Signing in…';

    try {
      const result = await signIn(email, password);
      if (result.success) {
        showMessage('Signed in. Redirecting…', 'success');
        const profile = await getUserProfile();
        setTimeout(function () {
          if (profile && profile.role === 'teacher') {
            window.location.href = '/version2/tracking/teacher.html';
          } else {
            window.location.href = '/version2/tracking/dashboard.html';
          }
        }, 800);
      } else {
        showMessage(result.error || 'Sign in failed. Please try again.', 'error');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign in';
      }
    } catch (err) {
      console.error('Login error:', err);
      showMessage('Unable to connect. Please check your internet connection and try again.', 'error');
      submitBtn.disabled = false;
      submitBtn.textContent = 'Sign in';
    }
  });
</script>
</body>
</html>
