<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/png" href="/images/favicon.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot password — Classicalia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/version2/assets/css/classicalia.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="auth-body">

<div class="dash-header" style="padding:80px 0 60px;">
  <canvas class="header-sky" data-starfield data-seed="828" data-region="0.8"></canvas>
  <nav class="nav">
    <div class="nav-inner">
      <a href="/version2/" class="nav-logo">Classicalia</a>
      <div class="nav-links">
        <a href="/version2/subjects/latin/" class="nav-link">Latin</a>
        <a href="/version2/subjects/greek/" class="nav-link">Greek</a>
        <a href="/version2/subjects/classical-civilisation/" class="nav-link">Class. Civ.</a>
        <div class="nav-div"></div>
        <a href="/auth/login.html" class="nav-cta">Sign in</a>
      </div>
    </div>
  </nav>
  <div style="max-width:480px;margin:0 auto;padding:0 24px;position:relative;z-index:2;">
    <div class="dash-eyebrow">Reset password</div>
    <div class="dash-title" style="font-size:36px;">Forgot your password?</div>
    <div class="dash-subtitle">Pop in the email you signed up with and we'll send you a reset link.</div>
  </div>
</div>

<div class="auth-wrap">
  <div class="auth-card">

    <div id="message" class="auth-message"></div>

    <form id="forgotForm">
      <div class="auth-field">
        <label for="email" class="auth-label">Email address</label>
        <input type="email" id="email" name="email" class="auth-input" required placeholder="you@example.com" autocomplete="email">
        <span class="auth-hint">The link may take a minute or two to arrive. Check spam if it doesn't show up.</span>
      </div>

      <button type="submit" class="auth-submit" id="submitBtn">Send reset link</button>
    </form>

    <div class="auth-foot">
      <div>Remembered it? <a href="login.html">Back to sign in</a></div>
      <div class="auth-foot-sep">·</div>
      <div><a href="/version2/">&larr; Back to Classicalia</a></div>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script src="auth.js"></script>
<script src="/version2/assets/js/starfield.js"></script>
<script>
  const form = document.getElementById('forgotForm');
  const messageDiv = document.getElementById('message');
  const submitBtn = document.getElementById('submitBtn');

  function showMessage(text, type) {
    messageDiv.textContent = text;
    messageDiv.className = 'auth-message ' + type;
  }

  document.addEventListener('DOMContentLoaded', async function () {
    await redirectIfLoggedIn();
  });

  form.addEventListener('submit', async function (e) {
    e.preventDefault();
    const email = document.getElementById('email').value;

    submitBtn.disabled = true;
    submitBtn.textContent = 'Sending…';

    const result = await requestPasswordReset(email);

    if (result.success) {
      showMessage('Check your email for a reset link. It may take a few minutes to arrive.', 'success');
      submitBtn.textContent = 'Email sent';
    } else {
      showMessage(result.error, 'error');
      submitBtn.disabled = false;
      submitBtn.textContent = 'Send reset link';
    }
  });
</script>
</body>
</html>
