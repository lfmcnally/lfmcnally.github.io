<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lesson Canvas</title>
<link rel="stylesheet" href="whiteboard.css">
</head>
<body>
<div id="toolbar">
  <button class="tb-btn active" data-tool="pen" title="Pen (P)"><svg viewBox="0 0 24 24"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="M2 2l7.586 7.586"/><circle cx="11" cy="11" r="2"/></svg></button>
  <button class="tb-btn" data-tool="hl" title="Highlighter (H)"><svg viewBox="0 0 24 24"><path d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4M9 3v18m0 0h10a2 2 0 0 0 2-2V9M9 21H5a2 2 0 0 1-2-2V9m0 0h18"/></svg></button>
  <button class="tb-btn" data-tool="er" title="Eraser (E)"><svg viewBox="0 0 24 24"><path d="M20 20H7L3 16l10-10 7 7-3 4z"/><path d="M6 11l7 7"/></svg></button>
  <button class="tb-btn" data-tool="text" title="Text (T)"><svg viewBox="0 0 24 24"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg></button>
  <button class="tb-btn" data-tool="move" title="Move images (M)"><svg viewBox="0 0 24 24"><polyline points="5 9 2 12 5 15"/><polyline points="9 5 12 2 15 5"/><polyline points="15 19 12 22 9 19"/><polyline points="19 9 22 12 19 15"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="12" y1="2" x2="12" y2="22"/></svg></button>
  <div class="sep"></div>
  <span class="lbl">Size</span><input type="range" id="pen-size" min="1" max="60" value="3" style="width:80px"><span class="val" id="pen-size-val">3</span>
  <div class="sep"></div>
  <span class="lbl">Opacity</span><input type="range" id="opacity-sl" min="10" max="100" value="100" style="width:70px"><span class="val" id="opacity-val">100%</span>
  <div class="sep"></div>
  <div id="swatches">
    <div class="swatch active" style="background:#1a1a1a" data-c="#1a1a1a"></div>
    <div class="swatch" style="background:#ef4444" data-c="#ef4444"></div>
    <div class="swatch" style="background:#f97316" data-c="#f97316"></div>
    <div class="swatch" style="background:#eab308" data-c="#eab308"></div>
    <div class="swatch" style="background:#22c55e" data-c="#22c55e"></div>
    <div class="swatch" style="background:#3b82f6" data-c="#3b82f6"></div>
    <div class="swatch" style="background:#a855f7" data-c="#a855f7"></div>
    <div class="swatch" style="background:#ec4899" data-c="#ec4899"></div>
    <div class="swatch" style="background:#fff;outline:1px solid #aaa;outline-offset:1px" data-c="#ffffff"></div>
    <div id="cpick-wrap"><input type="color" id="colour-pick" value="#1a1a1a"></div>
  </div>
  <div class="sep"></div>
  <button class="tb-btn" id="btn-undo" title="Undo Ctrl+Z"><svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.39"/></svg></button>
  <button class="tb-btn" id="btn-redo" title="Redo Ctrl+Y"><svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-.49-4.39"/></svg></button>
  <button class="tb-btn" id="btn-clear" title="Clear annotations"><svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>
  <input type="text" id="page-title" placeholder="Page name…" maxlength="40">
</div>
<div id="main">
  <div id="sidebar">
    <div id="sb-hdr"><span>Pages</span><button id="btn-add-page">+</button></div>
    <div id="page-list"></div>
    <div id="lesson-panel">
      <div class="lp-t">Lessons</div>
      <input type="text" id="lesson-name" placeholder="Lesson name…" maxlength="60">
      <button class="lb pri" id="btn-save">💾 Save lesson</button>
      <select id="lesson-sel"><option value="">— load a lesson —</option></select>
      <button class="lb" id="btn-load">📂 Load selected</button>
      <button class="lb dan" id="btn-del-lesson">🗑 Delete selected</button>
    </div>
  </div>
  <div id="canvas-area">
    <div id="move-badge">Move mode · drag to reposition · corner to resize</div>
    <div id="scroller">
      <div id="sizer">
        <div id="content-wrap">
          <div id="bg-div"></div>
          <div id="pdf-pages"></div>
          <div id="img-layer"></div>
          <canvas id="draw-canvas"></canvas>
        </div>
      </div>
    </div>
    <div id="loading"><div class="spin"></div><span>Loading…</span></div>
    <div id="zoom-ctrl">
      <button class="zb" id="btn-zi">+</button>
      <div id="zoom-val">100%</div>
      <button class="zb" id="btn-zo">−</button>
      <button class="zb" id="btn-zf" style="font-size:11px;font-weight:600">fit</button>
    </div>
    <div id="bottom-bar">
      <button class="bb-btn" id="btn-blank">＋ New page</button>
      <button class="bb-btn" id="btn-img">🖼 Add image</button>
      <button class="bb-btn" id="btn-pdf">📄 Load PDF</button>
    </div>
  </div>
</div>
<div id="toast"></div>
<div id="modal-overlay">
  <div id="modal">
    <h3 id="modal-title">Enter text</h3>
    <input type="text" id="modal-input" placeholder="">
    <div class="mbtn"><button id="modal-cancel">Cancel</button><button class="ok" id="modal-ok">OK</button></div>
  </div>
</div>
<input type="file" id="file-img" accept="image/*" style="display:none">
<input type="file" id="file-pdf" accept="application/pdf" style="display:none">

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="whiteboard.js"></script>
</body>
</html>
