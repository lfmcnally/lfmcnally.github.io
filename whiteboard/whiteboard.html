<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lesson Whiteboard</title>
<style>
  :root { --bg:#1a1a1f; --sf:#22222a; --bd:#38383f; --ac:#6c8ef5; --tx:#e8e8f0; --txm:#888896; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--tx);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #topbar {
    height: 48px;
    background: var(--sf);
    border-bottom: 1px solid var(--bd);
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 14px;
    flex-shrink: 0;
  }
  #topbar h1 {
    font-size: 14px;
    font-weight: 600;
    color: var(--tx);
    margin-right: 12px;
  }
  .btn {
    background: var(--ac);
    border: none;
    color: #fff;
    font-size: 13px;
    padding: 7px 14px;
    border-radius: 6px;
    cursor: pointer;
  }
  .btn:hover { filter: brightness(1.08); }
  .btn.secondary {
    background: transparent;
    border: 1px solid var(--bd);
    color: var(--txm);
  }
  .btn.secondary:hover { color: var(--tx); }
  #status {
    font-size: 12px;
    color: var(--txm);
    margin-left: auto;
  }
  #pdf-viewer {
    flex: 1;
    min-height: 0;
    background: #e8e8e8;
    position: relative;
  }
  #pdf-viewer:empty::after {
    content: 'Loading PDF viewer…';
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #666;
    font-size: 14px;
  }
</style>
</head>
<body>

<div id="topbar">
  <h1>Lesson Whiteboard</h1>
  <button class="btn" id="btn-load-pdf">📄 Load PDF</button>
  <a class="btn secondary" href="whiteboard-old.html">Old version</a>
  <span id="status"></span>
</div>

<div id="pdf-viewer"></div>

<input type="file" id="file-pdf" accept="application/pdf" style="display:none">

<script type="module">
  import EmbedPDF from 'https://cdn.jsdelivr.net/npm/@embedpdf/snippet/dist/embedpdf.js';

  const status = document.getElementById('status');
  const setStatus = msg => { status.textContent = msg; };

  setStatus('Initialising viewer…');

  const viewer = EmbedPDF.init({
    type: 'container',
    target: document.getElementById('pdf-viewer'),
    theme: { preference: 'system' },
    tabBar: 'always',
    documentManager: { maxDocuments: 5 },
  });

  let docManager;
  try {
    const registry = await viewer.registry;
    docManager = registry.getPlugin('document-manager')?.provides();
    if (!docManager) throw new Error('document-manager plugin not found');
    setStatus('Ready — click "Load PDF" to begin');
  } catch (err) {
    console.error('EmbedPDF failed to initialise:', err);
    setStatus('Failed to load viewer — see console');
  }

  document.getElementById('btn-load-pdf').addEventListener('click', () => {
    document.getElementById('file-pdf').click();
  });

  document.getElementById('file-pdf').addEventListener('change', async e => {
    const file = e.target.files[0];
    if (!file || !docManager) return;
    setStatus(`Loading ${file.name}…`);
    try {
      const buffer = await file.arrayBuffer();
      await docManager.openDocumentBuffer({
        buffer,
        name: file.name,
        autoActivate: true,
      });
      setStatus(`Loaded: ${file.name}`);
    } catch (err) {
      console.error('Failed to open PDF:', err);
      setStatus('Failed to load PDF — see console');
    }
    e.target.value = '';
  });
</script>

</body>
</html>
