<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lessons — Whiteboard</title>
<link rel="stylesheet" href="whiteboard.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../auth/config.js"></script>
<script src="../auth/auth.js"></script>
</head>
<body>

<!-- Top bar -->
<header id="hdr">
  <div class="hdr-left">
    <h1>Lessons</h1>
    <span id="path"></span>
  </div>
  <div class="hdr-right">
    <button class="btn" id="btn-new-folder">+ Folder</button>
    <button class="btn primary" id="btn-new-lesson">+ New lesson</button>
    <span id="user-info"></span>
    <a class="link-old" href="whiteboard-old.html">old</a>
  </div>
</header>

<!-- Main split: folder tree on left, files in main -->
<main id="main">
  <aside id="tree-pane">
    <div id="tree-root">
      <button class="tree-row root active" data-folder="">
        <span class="tree-icon">🏠</span><span>All lessons</span>
      </button>
      <div id="tree"></div>
    </div>
  </aside>

  <section id="files-pane">
    <div id="files-grid"></div>
    <div id="empty">
      <p>No lessons here yet.</p>
      <p>Click <strong>+ New lesson</strong> to start one, or <strong>+ Folder</strong> to organise.</p>
    </div>
  </section>
</main>

<!-- Auth-required overlay (shown if not logged in) -->
<div id="auth-overlay" class="hidden">
  <div class="auth-card">
    <h2>Sign in to save lessons</h2>
    <p>Lessons are saved to your Classicalia account so you can continue them on any device.</p>
    <div class="auth-actions">
      <a class="btn primary" id="btn-login" href="../auth/login.html">Sign in</a>
      <a class="btn" id="btn-skip" href="edit.html?new=1">Continue without saving</a>
    </div>
  </div>
</div>

<!-- Save / rename / new-folder modal -->
<div id="modal-overlay" class="hidden">
  <div class="modal">
    <h3 id="modal-title">Title</h3>
    <input type="text" id="modal-input" placeholder="Name">
    <div class="modal-actions">
      <button class="btn" id="modal-cancel">Cancel</button>
      <button class="btn primary" id="modal-ok">OK</button>
    </div>
  </div>
</div>

<!-- Right-click menu -->
<div id="ctx-menu" class="hidden">
  <button data-action="rename">Rename</button>
  <button data-action="delete" class="danger">Delete</button>
</div>

<div id="toast"></div>

<script type="module" src="whiteboard.js"></script>
</body>
</html>
