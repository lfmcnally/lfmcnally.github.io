<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assessment bank — authoring — Classicalia</title>
<link rel="icon" type="image/png" href="/images/favicon.png">
<link rel="stylesheet" href="/version2/assets/css/classicalia.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/version2/assets/js/supabase-client.js"></script>
<script src="/version2/assets/js/account-menu.js" defer></script>
<style>
/* ── Buttons + form controls ── */
.btn { font-family:'DM Sans',sans-serif; font-size:13px; font-weight:700; padding:9px 16px; border-radius:6px; border:none; background:var(--brand); color:#fff; cursor:pointer; }
.btn:hover { background:#155ee0; }
.btn.ghost { background:var(--paper); color:var(--ink); border:1px solid var(--rule); font-weight:600; }
.btn.ghost:hover { background:var(--cream); }
.btn.danger { background:var(--paper); color:#b91c1c; border:1px solid #fecaca; font-weight:600; }
.btn.sm { font-size:12px; padding:6px 12px; }
.btn:disabled { opacity:.5; cursor:default; }
label.lbl { display:block; font-size:10px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); margin:0 0 5px; }
input.f, select.f, textarea.f { width:100%; box-sizing:border-box; font-family:'DM Sans',sans-serif; font-size:14px; padding:9px 11px; border:1.5px solid var(--rule); border-radius:7px; background:var(--paper); color:var(--ink); outline:none; }
input.f:focus, select.f:focus, textarea.f:focus { border-color:var(--brand); }
textarea.f { resize:vertical; min-height:56px; }
.grid2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.grid3 { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
.type-badge { font-size:9px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; padding:3px 8px; border-radius:2px; white-space:nowrap; }
.type-badge.st-draft { background:#f1f5f9; color:#64748b; }
.type-badge.st-published { background:#dbeafe; color:#1e40af; }
.type-badge.st-archived { background:#fdecec; color:#b91c1c; }

/* ── Search ── */
.search-wrap2 { position:relative; display:flex; align-items:center; max-width:520px; }
.search-wrap2 .search-icon { position:absolute; left:12px; width:16px; height:16px; color:var(--muted); pointer-events:none; }
.search-wrap2 input { width:100%; box-sizing:border-box; padding:10px 36px; border:1px solid var(--rule); border-radius:8px; font-family:'DM Sans',sans-serif; font-size:13px; color:var(--ink); background:var(--paper); outline:none; }
.search-wrap2 input:focus { border-color:var(--brand); }
.search-clear2 { position:absolute; right:10px; background:none; border:none; cursor:pointer; color:var(--muted); font-size:18px; line-height:1; padding:2px 4px; display:none; }
.search-clear2.visible { display:block; }

/* ── Breadcrumbs ── */
.crumbs { display:flex; align-items:center; gap:7px; flex-wrap:wrap; font-size:13px; margin:18px 0 16px; }
.crumb { color:var(--brand); cursor:pointer; font-weight:700; background:none; border:none; padding:0; font-family:'DM Sans',sans-serif; font-size:13px; }
.crumb:hover { text-decoration:underline; }
.crumb.cur { color:var(--ink); cursor:default; }
.crumb.cur:hover { text-decoration:none; }
.crumb-sep { color:var(--muted); }

/* ── Folder / file grid ── */
.grid-cards { display:grid; grid-template-columns:repeat(auto-fill,minmax(212px,1fr)); gap:14px; }
.card-item { position:relative; border:1px solid var(--rule); border-radius:12px; padding:16px; background:var(--paper); cursor:pointer; transition:border-color .12s, box-shadow .12s, transform .06s; display:flex; flex-direction:column; gap:10px; box-shadow:0 1px 2px rgba(14,30,63,.04); }
.card-item:hover { border-color:var(--brand); box-shadow:0 5px 16px rgba(14,30,63,.09); }
.card-item:active { transform:translateY(1px); }
.card-ic { width:42px; height:42px; border-radius:10px; display:flex; align-items:center; justify-content:center; }
.card-ic .ic { width:23px; height:23px; }
.ic-subject { background:#fef3e8; color:#b9650f; }
.ic-level   { background:#eef4ff; color:var(--brand); }
.ic-module  { background:#eef4ff; color:var(--brand); }
.ic-topic   { background:#eef6ee; color:#2a6e2a; }
.ic-sub     { background:#f1f5f9; color:#64748b; }
.ic-test    { background:#f6f1fb; color:#7c3aed; }
.card-name { font-family:'Lora',serif; font-style:italic; font-weight:700; font-size:15px; color:var(--navy); line-height:1.25; word-break:break-word; }
.card-sub { font-size:11.5px; color:var(--muted); margin-top:auto; }
.card-actions { position:absolute; top:10px; right:10px; display:flex; gap:4px; opacity:0; transition:opacity .12s; }
.card-item:hover .card-actions { opacity:1; }
.icon-btn { width:26px; height:26px; border:1px solid var(--rule); background:var(--paper); border-radius:6px; cursor:pointer; color:var(--muted); display:flex; align-items:center; justify-content:center; font-size:12px; line-height:1; }
.icon-btn:hover { color:var(--navy); border-color:var(--brand); }
.card-status { position:absolute; top:12px; right:12px; }
.card-new { border:1.5px dashed var(--rule); background:transparent; box-shadow:none; }
.card-new:hover { border-color:var(--brand); background:#f7faff; box-shadow:none; }
.card-new .card-name { font-style:normal; color:var(--brand); }
.sec-h { font-size:10px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); margin:22px 0 9px; }
.sec-h:first-child { margin-top:2px; }
.empty-note { color:var(--muted); font-size:13px; padding:24px 0; font-family:'Lora',serif; font-style:italic; }
.ctx-line { display:flex; justify-content:space-between; gap:10px; font-size:12px; padding:6px 0; border-bottom:1px solid var(--rule-faint); }
.ctx-line:last-child { border-bottom:none; }
.ctx-line span:first-child { color:var(--muted); } .ctx-line span:last-child { color:var(--ink); font-weight:600; text-align:right; }

/* ── Editor ── */
.back-link { display:inline-flex; align-items:center; gap:6px; font-size:12.5px; font-weight:700; color:var(--brand); background:none; border:none; cursor:pointer; padding:0; margin-bottom:14px; }
.back-link:hover { text-decoration:underline; }
.etitle { width:100%; box-sizing:border-box; font-family:'Lora',serif; font-style:italic; font-weight:700; font-size:26px; color:var(--navy); border:none; border-bottom:2px solid transparent; padding:2px 0 6px; background:transparent; outline:none; }
.etitle:focus { border-bottom-color:var(--brand); }
.ebar { display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin:14px 0 0; padding-bottom:16px; border-bottom:1px solid var(--rule); }
.minilbl { font-size:10px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); }
.inlinesel { width:auto; display:inline-block; padding:7px 9px; font-size:13px; }
.dirty { font-size:12px; font-weight:700; } .dirty.clean { color:#2a8a3e; } .dirty.unsaved { color:#c97a12; }
.loc-bar { display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin:12px 0 2px; padding:10px 12px; background:var(--cream); border:1px solid var(--rule); border-radius:9px; }
.loc-bar .minilbl { margin-right:-4px; }
.seg { display:inline-flex; border:1.5px solid var(--rule); border-radius:8px; overflow:hidden; }
.seg button { font-family:'DM Sans',sans-serif; font-size:12px; font-weight:700; padding:7px 13px; border:none; background:var(--paper); color:var(--muted); cursor:pointer; }
.seg button + button { border-left:1.5px solid var(--rule); }
.seg.s-status button.on.draft { background:#eef0f4; color:var(--navy); }
.seg.s-status button.on.published { background:#dbeafe; color:#1e40af; }
.seg.s-status button.on.archived { background:#fdecec; color:#b91c1c; }
.seg.s-style button.on { background:#eef4ff; color:var(--brand); }
.totbadge { display:inline-block; font-size:12px; font-weight:700; color:var(--navy); background:var(--rule-faint); border-radius:999px; padding:4px 12px; }
.thumb { max-width:160px; max-height:110px; border-radius:6px; border:1px solid var(--rule); display:block; margin-top:8px; }

/* Question cards */
.qcard { border:1px solid var(--rule); border-radius:9px; padding:14px 16px; margin-bottom:12px; background:var(--cream); }
.qhead { display:flex; align-items:center; gap:8px; cursor:pointer; }
.qnum { font-weight:700; color:var(--navy); }
.qtype { font-size:9px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; padding:2px 8px; border-radius:999px; }
.qtype.t-points { background:#eef4ff; color:var(--brand); }
.qtype.t-translation { background:#fef3e8; color:#b9650f; }
.qmarks { font-size:11px; color:var(--muted); font-weight:700; }
.qprev { flex:1; min-width:0; font-size:12.5px; color:var(--muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-family:'Lora',serif; font-style:italic; }
.qcard:not(.collapsed) .qprev { display:none; }
.qchev { color:var(--muted); font-size:12px; transition:transform .15s; }
.qcard.collapsed .qchev { transform:rotate(-90deg); }
.qcard.collapsed .qbody { display:none; }
.qbody { margin-top:14px; }
.qmove { display:inline-flex; flex-direction:column; gap:1px; }
.qmove button { font-size:9px; line-height:1; padding:3px 7px; border:1px solid var(--rule); background:var(--paper); color:var(--muted); cursor:pointer; border-radius:4px; }
.qmove button:hover:not(:disabled) { color:var(--navy); }
.qmove button:disabled { opacity:.35; cursor:default; }
.fieldhint { font-size:11.5px; color:var(--muted); margin:3px 0 7px; line-height:1.45; }
.req { color:#c0392b; font-weight:700; }
.allochint { font-size:11.5px; color:var(--muted); margin-top:7px; font-weight:600; }
.addrow { display:flex; gap:8px; flex-wrap:wrap; }
.sps { display:flex; flex-direction:column; gap:6px; margin-top:6px; }
.sp { display:flex; gap:8px; align-items:center; }
.sp input.txt { flex:1; } .sp input.mk { width:64px; }
.typecard-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin:6px 0; }
@media (max-width:560px){ .typecard-row { grid-template-columns:1fr; } }
.typecard { border:1.5px solid var(--rule); border-radius:10px; padding:16px; cursor:pointer; background:var(--paper); transition:border-color .12s, background .12s; }
.typecard:hover { border-color:var(--brand); background:#f7faff; }
.typecard b { color:var(--navy); font-size:14px; }
.typecard .plus { float:right; color:var(--brand); font-weight:700; }
.typecard p { margin:6px 0 0; font-size:12px; color:var(--muted); line-height:1.5; }

/* Modal */
.modal-bg { position:fixed; inset:0; background:rgba(14,30,63,.45); display:flex; align-items:center; justify-content:center; z-index:200; padding:20px; }
.modal { background:var(--paper); border-radius:12px; padding:22px 24px; width:100%; max-width:440px; box-shadow:0 12px 40px rgba(14,30,63,.25); }
.modal h3 { margin:0 0 14px; font-family:'Lora',serif; font-style:italic; color:var(--navy); font-size:20px; }
.modal .row.end { display:flex; gap:10px; justify-content:flex-end; margin-top:18px; }
.pills { display:flex; gap:7px; flex-wrap:wrap; }
.pill { font-size:12px; font-weight:700; padding:7px 13px; border-radius:999px; border:1.5px solid var(--rule); background:var(--paper); color:var(--muted); cursor:pointer; }
.pill.on { border-color:var(--brand); background:#eef4ff; color:var(--brand); }
.pvq { border:1px solid var(--rule); border-radius:9px; padding:14px 16px; margin-bottom:12px; background:var(--cream); }
.pvq .pp { color:var(--ink); white-space:pre-wrap; }
.pvbox { width:100%; box-sizing:border-box; margin-top:8px; border:1.5px dashed var(--rule); border-radius:7px; padding:12px; min-height:48px; color:var(--muted); font-size:13px; background:var(--paper); }

.toast { position:fixed; bottom:18px; left:50%; transform:translateX(-50%); background:var(--navy); color:#fff; font-size:13px; padding:9px 18px; border-radius:8px; opacity:0; transition:opacity .2s; z-index:300; }
.toast.show { opacity:1; }
.hidden { display:none !important; }
mark { background:#fde68a; color:inherit; padding:0 1px; border-radius:2px; }
</style>
</head>
<body>
<div class="header">
  <canvas class="header-sky" data-starfield data-seed="717" data-region="0.8"></canvas>
  <nav class="nav"><div class="nav-inner">
    <a href="/version2/" class="nav-logo">Classicalia</a>
    <div class="nav-links">
      <a href="/version2/admin/" class="nav-link">Admin</a>
      <a href="/version2/admin/plans.html" class="nav-link">Plans &amp; access</a>
      <a href="/version2/tracking/teacher.html" class="nav-link">Classes</a>
      <div class="nav-div"></div>
      <div data-account-menu></div>
    </div>
  </div></nav>
  <div class="header-inner">
    <div class="header-eyebrow">Admin &middot; Resource bank</div>
    <h1 class="header-title">Assessment bank</h1>
    <p class="header-deck">A folder suite for every test &mdash; open a subject, a level, a module, then a topic or subtopic. Search to jump straight to a test.</p>
  </div>
</div>

<div class="module-body">
  <aside class="context" id="context"></aside>
  <main>
    <div id="gate" class="hidden"></div>

    <div id="browse" class="hidden">
      <div class="search-wrap2">
        <svg class="search-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="8.5" cy="8.5" r="5.5"/><line x1="13" y1="13" x2="17" y2="17"/></svg>
        <input id="search" type="text" placeholder="Search every test&hellip;" autocomplete="off">
        <button class="search-clear2" id="searchClear">&times;</button>
      </div>
      <nav class="crumbs" id="crumbs"></nav>
      <div id="grid"></div>
    </div>

    <div id="editor" class="hidden"></div>
  </main>
</div>

<div class="toast" id="toast"></div>
<script src="/version2/assets/js/starfield.js"></script>
<script>
'use strict';
const sb = window.supabase;
const $ = (id) => document.getElementById(id);
const esc = (s) => String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const slugify = (s) => String(s||'').toLowerCase().trim().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'').slice(0,60) || ('x-'+Math.random().toString(36).slice(2,7));
const norm = (s) => String(s||'').toLowerCase().replace(/[^a-z0-9 ]/g,'');
const SUBJECTS = ['classical-civilisation','latin','greek'];
const SUBJECT_LABEL = { 'classical-civilisation':'Classical Civilisation', 'latin':'Latin', 'greek':'Greek' };
const LEVELS = [['gcse','GCSE'],['alevel','A-Level'],['ks3','KS3']];
const subjLabel = s => SUBJECT_LABEL[s] || s;
const lvlLabel  = l => (LEVELS.find(x=>x[0]===l)||[l,l])[1];
const IC = {
  subject:'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18"/><path d="M5 21V10m4 11V10m6 11V10m4 11V10"/><path d="M3 10h18"/><path d="M12 3 3 7v3h18V7z"/></svg>',
  folder:'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h3.6a2 2 0 0 1 1.4.6L11.8 7H19a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>',
  file:'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/><path d="M14 3v5h5"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="13" y2="17"/></svg>',
  plus:'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>',
};
let toastT;
function toast(msg){ const t=$('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2200); }
function imgSrc(path){ if(!path) return ''; if(/^https?:\/\//.test(path)||path.startsWith('/')) return path; return sb.storage.from('weekly-test-images').getPublicUrl(path).data.publicUrl; }
function modal(html, maxw){ const bg=document.createElement('div'); bg.className='modal-bg'; bg.innerHTML='<div class="modal"'+(maxw?(' style="max-width:'+maxw+'px;max-height:84vh;overflow:auto;"'):'')+'>'+html+'</div>'; document.body.appendChild(bg); bg.addEventListener('click',e=>{ if(e.target===bg) bg.remove(); }); return bg; }
function nameModal(heading, placeholder, initial, cb){
  const m = modal('<h3>'+esc(heading)+'</h3><input class="f" id="nm" placeholder="'+esc(placeholder)+'" value="'+esc(initial||'')+'"><div class="row end"><button class="btn ghost sm" data-x>Cancel</button><button class="btn sm" id="ok">Save</button></div>');
  const inp=m.querySelector('#nm'); inp.focus(); inp.select();
  m.querySelector('[data-x]').onclick=()=>m.remove();
  const go=()=>{ const v=inp.value.trim(); if(!v) return toast('Enter a name'); m.remove(); cb(v); };
  m.querySelector('#ok').onclick=go; inp.addEventListener('keydown',e=>{ if(e.key==='Enter') go(); });
}

let me_id=null, courses=[], topics=[], assessments=[];
let openId=null, q=[], schemes={}, dirty=false, collapsedQ={};
let path = { subject:null, level:null, courseId:null, topicId:null, subId:null };

const topTopicsOf = cid => topics.filter(t=>t.course_id===cid && !t.parent_id);
const subTopicsOf = tid => topics.filter(t=>t.parent_id===tid);
const courseById  = id => courses.find(c=>c.id===id);
const topicById   = id => topics.find(t=>t.id===id);
const moduleTests = cid => assessments.filter(a=>a.course_id===cid && !a.topic_id);
const topicTests  = tid => assessments.filter(a=>a.topic_id===tid);

// ───────────────────────────── INIT ─────────────────────────────
(async function init(){
  const { data: au } = await sb.auth.getUser();
  const user = au?.user;
  if(!user){ return gate('Please <a href="/auth/login.html">sign in</a> as an admin to author the assessment bank.'); }
  me_id = user.id;
  const { data: profile } = await sb.from('users').select('is_admin, can_manage_bank').eq('id', user.id).single();
  if(!profile || !profile.can_manage_bank){ return gate('This page needs <b>assessment permission</b>. Ask a site admin to grant it to your account in <a href="/version2/admin/plans.html">Plans &amp; access</a>. (Row-level security enforces this server-side too.)'); }

  const { data: cs } = await sb.from('bank_courses').select('*').order('subject').order('position');
  courses = cs || [];
  await loadAll();
  $('search').addEventListener('input', renderExplorer);
  $('searchClear').addEventListener('click', ()=>{ $('search').value=''; renderExplorer(); $('search').focus(); });
  $('grid').addEventListener('click', onGridClick);
  window.addEventListener('beforeunload', (e)=>{ if(dirty){ e.preventDefault(); e.returnValue=''; } });
  showExplorer();
})();

function gate(html){ const g=$('gate'); g.innerHTML='<div style="background:var(--paper);border:1px solid var(--rule);border-radius:10px;padding:24px;font-size:15px;color:var(--ink);line-height:1.6;">'+html+'</div>'; g.classList.remove('hidden'); $('context').innerHTML=''; }

async function loadAll(){
  const cids = courses.map(c=>c.id);
  if(!cids.length){ topics=[]; assessments=[]; return; }
  const [{ data: ts }, { data: as }] = await Promise.all([
    sb.from('bank_topics').select('*').in('course_id', cids).order('position'),
    sb.from('bank_assessments').select('*').in('course_id', cids).order('created_at',{ascending:false}),
  ]);
  topics = ts || []; assessments = as || [];
  const ids = assessments.map(a=>a.id);
  const { data: qcs } = await sb.from('bank_assessment_questions').select('assessment_id, marks').in('assessment_id', ids.length?ids:['00000000-0000-0000-0000-000000000000']);
  const agg = {}; (qcs||[]).forEach(r=>{ const a=agg[r.assessment_id]||(agg[r.assessment_id]={n:0,m:0}); a.n++; a.m+=(r.marks||0); });
  assessments.forEach(a=>{ a._n = agg[a.id]?.n||0; a._m = agg[a.id]?.m||0; });
}

// ───────────────────────────── EXPLORER ─────────────────────────────
function showExplorer(){
  openId=null;
  $('editor').classList.add('hidden');
  $('gate').classList.add('hidden');
  $('browse').classList.remove('hidden');
  renderExplorer();
}

function renderExplorer(){
  const raw = $('search').value.trim();
  $('searchClear').classList.toggle('visible', !!raw);
  if(raw) return renderSearch(raw);
  renderCrumbs();
  renderCtx();
  const g = $('grid');
  if(path.subId)      return renderSubtopicView(g);
  if(path.topicId)    return renderTopicView(g);
  if(path.courseId)   return renderModuleView(g);
  if(path.level)      return renderLevelView(g);
  if(path.subject)    return renderSubjectView(g);
  return renderRoot(g);
}

function cards(html){ return '<div class="grid-cards">'+html+'</div>'; }
function folderCard(tint, ic, name, sub, dataAttr, actions){
  return '<div class="card-item" '+dataAttr+'>' +
    (actions||'') +
    '<div class="card-ic '+tint+'">'+ic+'</div>' +
    '<div class="card-name">'+esc(name)+'</div>' +
    '<div class="card-sub">'+esc(sub)+'</div>' +
  '</div>';
}
function folderActions(renameAttr, delAttr){
  if(!renameAttr && !delAttr) return '';
  return '<div class="card-actions">' +
    (renameAttr?'<button class="icon-btn" '+renameAttr+' title="Rename">&#9998;</button>':'') +
    (delAttr?'<button class="icon-btn" '+delAttr+' title="Delete">&times;</button>':'') +
  '</div>';
}
function testCard(a){
  const meta = a._n ? (a._n+' Q · '+a._m+' mk') : 'no questions yet';
  return '<div class="card-item" data-a="'+a.id+'">' +
    '<span class="card-status type-badge st-'+a.status+'">'+a.status+'</span>' +
    '<div class="card-ic ic-test">'+IC.file+'</div>' +
    '<div class="card-name">'+esc(a.title)+'</div>' +
    '<div class="card-sub">'+esc(meta)+'</div>' +
  '</div>';
}
function newCard(label, dataAttr){
  return '<div class="card-item card-new" '+dataAttr+'><div class="card-ic ic-module">'+IC.plus+'</div><div class="card-name">'+esc(label)+'</div></div>';
}
const pl = (n,w) => n+' '+w+(n!==1?'s':'');

function renderRoot(g){
  g.innerHTML = '<div class="sec-h">Subjects</div>' + cards(SUBJECTS.map(s=>{
    const n = courses.filter(c=>c.subject===s).length;
    return folderCard('ic-subject', IC.subject, subjLabel(s), pl(n,'module'), 'data-go-subject="'+s+'"');
  }).join(''));
}
function renderSubjectView(g){
  g.innerHTML = '<div class="sec-h">Levels</div>' + cards(LEVELS.map(L=>{
    const n = courses.filter(c=>c.subject===path.subject && (c.level||'gcse')===L[0]).length;
    return folderCard('ic-level', IC.folder, L[1], pl(n,'module'), 'data-go-level="'+L[0]+'"');
  }).join(''));
}
function renderLevelView(g){
  const mods = courses.filter(c=>c.subject===path.subject && (c.level||'gcse')===path.level);
  const tiles = mods.map(c=>{
    const n = assessments.filter(a=>a.course_id===c.id).length;
    return folderCard('ic-module', IC.folder, c.title, pl(n,'test'), 'data-go-course="'+c.id+'"',
      folderActions('data-rename-course="'+c.id+'"', 'data-del-course="'+c.id+'"'));
  }).join('');
  g.innerHTML = '<div class="sec-h">Modules</div>' + cards(tiles + newCard('New module', 'data-new-course="'+path.subject+'|'+path.level+'"'));
}
function renderModuleView(g){
  const c = courseById(path.courseId); if(!c) { path.courseId=null; return renderExplorer(); }
  const tops = topTopicsOf(c.id);
  const tTiles = tops.map(t=>{
    const n = topicTests(t.id).length + subTopicsOf(t.id).reduce((s,st)=>s+topicTests(st.id).length,0);
    return folderCard('ic-topic', IC.folder, t.title, pl(n,'test'), 'data-go-topic="'+t.id+'"',
      folderActions('data-rename-topic="'+t.id+'"', 'data-del-topic="'+t.id+'"'));
  }).join('');
  const direct = moduleTests(c.id);
  let html = '<div class="sec-h">Topics</div>' + cards(tTiles + newCard('New topic', 'data-new-topic="'+c.id+'"'));
  html += '<div class="sec-h">Tests filed directly in this module</div>' +
    cards((direct.map(testCard).join('')) + newCard('New test', 'data-new-test="'+c.id+'|"'));
  g.innerHTML = html;
}
function renderTopicView(g){
  const t = topicById(path.topicId); if(!t){ path.topicId=null; return renderExplorer(); }
  const subs = subTopicsOf(t.id);
  const sTiles = subs.map(st=>{
    const n = topicTests(st.id).length;
    return folderCard('ic-sub', IC.folder, st.title, pl(n,'test'), 'data-go-sub="'+st.id+'"',
      folderActions('data-rename-topic="'+st.id+'"', 'data-del-topic="'+st.id+'"'));
  }).join('');
  const whole = topicTests(t.id);
  let html = '<div class="sec-h">Subtopics</div>' + cards(sTiles + newCard('New subtopic', 'data-new-sub="'+t.id+'"'));
  html += '<div class="sec-h">Whole-topic tests</div>' +
    cards((whole.map(testCard).join('')) + newCard('New test', 'data-new-test="'+t.course_id+'|'+t.id+'"'));
  g.innerHTML = html;
}
function renderSubtopicView(g){
  const st = topicById(path.subId); if(!st){ path.subId=null; return renderExplorer(); }
  const tests = topicTests(st.id);
  g.innerHTML = '<div class="sec-h">Tests in this subtopic</div>' +
    cards((tests.map(testCard).join('')) + newCard('New test', 'data-new-test="'+st.course_id+'|'+st.id+'"'));
}

function renderSearch(raw){
  const query = norm(raw);
  $('crumbs').innerHTML = '<button class="crumb" data-home>Home</button><span class="crumb-sep">/</span><span class="crumb cur">Search “'+esc(raw)+'”</span>';
  $('crumbs').querySelector('[data-home]').addEventListener('click', ()=>{ $('search').value=''; renderExplorer(); });
  const hits = assessments.filter(a=>norm(a.title+' '+locText(a)+' '+a.status).includes(query));
  const g = $('grid');
  g.innerHTML = hits.length
    ? '<div class="sec-h">'+pl(hits.length,'result')+'</div>' + cards(hits.map(a=>{
        const meta = (a._n?(a._n+' Q · '+a._m+' mk · '):'') + locText(a);
        return '<div class="card-item" data-a="'+a.id+'"><span class="card-status type-badge st-'+a.status+'">'+a.status+'</span><div class="card-ic ic-test">'+IC.file+'</div><div class="card-name">'+esc(a.title)+'</div><div class="card-sub">'+esc(meta)+'</div></div>';
      }).join(''))
    : '<div class="empty-note">No tests match “'+esc(raw)+'”.</div>';
  renderCtx();
}

function locText(a){
  const c = courseById(a.course_id);
  let s = c ? (subjLabel(c.subject)+' · '+lvlLabel(c.level||'gcse')+' · '+c.title) : '';
  const t = topicById(a.topic_id);
  if(t){ if(t.parent_id){ const p=topicById(t.parent_id); s += ' › '+(p?p.title:'?')+' › '+t.title; } else s += ' › '+t.title; }
  return s;
}

// breadcrumbs
function renderCrumbs(){
  const parts = [['Home', ()=>{ path={subject:null,level:null,courseId:null,topicId:null,subId:null}; renderExplorer(); }]];
  if(path.subject) parts.push([subjLabel(path.subject), ()=>{ path.level=path.courseId=path.topicId=path.subId=null; renderExplorer(); }]);
  if(path.level)   parts.push([lvlLabel(path.level), ()=>{ path.courseId=path.topicId=path.subId=null; renderExplorer(); }]);
  if(path.courseId){ const c=courseById(path.courseId); parts.push([c?c.title:'?', ()=>{ path.topicId=path.subId=null; renderExplorer(); }]); }
  if(path.topicId){ const t=topicById(path.topicId); parts.push([t?t.title:'?', ()=>{ path.subId=null; renderExplorer(); }]); }
  if(path.subId){ const s=topicById(path.subId); parts.push([s?s.title:'?', null]); }
  const c=$('crumbs'); c.innerHTML='';
  parts.forEach((p,i)=>{
    const last=i===parts.length-1;
    const b=document.createElement('button'); b.className='crumb'+(last?' cur':''); b.textContent=p[0];
    if(!last && p[1]) b.addEventListener('click', p[1]);
    c.appendChild(b);
    if(!last){ const sep=document.createElement('span'); sep.className='crumb-sep'; sep.textContent='/'; c.appendChild(sep); }
  });
}

function renderCtx(){
  const total=assessments.length, pub=assessments.filter(a=>a.status==='published').length;
  let where='Everything';
  if(path.subId) where=topicById(path.subId)?.title||'Subtopic';
  else if(path.topicId) where=topicById(path.topicId)?.title||'Topic';
  else if(path.courseId) where=courseById(path.courseId)?.title||'Module';
  else if(path.level) where=lvlLabel(path.level);
  else if(path.subject) where=subjLabel(path.subject);
  $('context').innerHTML =
    '<div class="context-eyebrow">Resource bank</div>' +
    '<div class="context-title">'+esc(where)+'</div>' +
    '<div class="context-rule"></div>' +
    '<p class="context-desc">Open a folder to drill in. Publish a test to make it available to teachers and self-serve students; drafts stay admin-only. Rename or move anything — hover a folder for its controls, or change a test’s location from inside it.</p>' +
    '<div style="margin-top:16px;">' +
      '<div class="ctx-line"><span>Modules</span><span>'+courses.length+'</span></div>' +
      '<div class="ctx-line"><span>Tests</span><span>'+total+'</span></div>' +
      '<div class="ctx-line"><span>Published</span><span>'+pub+'</span></div>' +
    '</div>';
}

// ───────────────────────────── GRID CLICKS ─────────────────────────────
function onGridClick(e){
  const find = sel => e.target.closest(sel);
  let el;
  if((el=find('[data-rename-course]'))){ e.stopPropagation(); return renameCourse(el.dataset.renameCourse); }
  if((el=find('[data-del-course]'))){ e.stopPropagation(); return deleteCourse(el.dataset.delCourse); }
  if((el=find('[data-rename-topic]'))){ e.stopPropagation(); return renameTopic(el.dataset.renameTopic); }
  if((el=find('[data-del-topic]'))){ e.stopPropagation(); return deleteTopic(el.dataset.delTopic); }
  if((el=find('[data-new-course]'))) return addCourse(el.dataset.newCourse);
  if((el=find('[data-new-topic]'))) return addTopic(el.dataset.newTopic, null);
  if((el=find('[data-new-sub]'))) return addTopic(null, el.dataset.newSub);
  if((el=find('[data-new-test]'))){ const [cid,tid]=el.dataset.newTest.split('|'); return newAssessment(cid, tid||null); }
  if((el=find('[data-go-subject]'))){ path={subject:el.dataset.goSubject,level:null,courseId:null,topicId:null,subId:null}; return renderExplorer(); }
  if((el=find('[data-go-level]'))){ path.level=el.dataset.goLevel; path.courseId=path.topicId=path.subId=null; return renderExplorer(); }
  if((el=find('[data-go-course]'))){ path.courseId=el.dataset.goCourse; path.topicId=path.subId=null; return renderExplorer(); }
  if((el=find('[data-go-topic]'))){ path.topicId=el.dataset.goTopic; path.subId=null; return renderExplorer(); }
  if((el=find('[data-go-sub]'))){ path.subId=el.dataset.goSub; return renderExplorer(); }
  if((el=find('[data-a]'))) return selectAssessment(el.dataset.a);
}

// ───────────────────────────── CREATE / RENAME / DELETE ─────────────────────────────
function addCourse(prefill){
  let subj=SUBJECTS[0], lvl='gcse';
  if(prefill){ const [s,l]=prefill.split('|'); if(s) subj=s; if(l) lvl=l; }
  const m = modal('<h3>New module</h3>' +
    '<label class="lbl">Subject</label><div class="pills" id="m_subj">'+SUBJECTS.map(s=>'<span class="pill'+(s===subj?' on':'')+'" data-s="'+s+'">'+esc(subjLabel(s))+'</span>').join('')+'</div>' +
    '<div style="margin-top:14px;"><label class="lbl">Level</label><div class="pills" id="m_lvl">'+LEVELS.map(L=>'<span class="pill'+(L[0]===lvl?' on':'')+'" data-l="'+L[0]+'">'+L[1]+'</span>').join('')+'</div></div>' +
    '<div style="margin-top:14px;"><label class="lbl">Module title</label><input class="f" id="m_title" placeholder="e.g. The Homeric World"></div>' +
    '<div class="row end"><button class="btn ghost sm" data-x>Cancel</button><button class="btn sm" id="m_ok">Add module</button></div>');
  m.querySelectorAll('#m_subj .pill').forEach(p=>p.onclick=()=>{ m.querySelectorAll('#m_subj .pill').forEach(x=>x.classList.remove('on')); p.classList.add('on'); subj=p.dataset.s; });
  m.querySelectorAll('#m_lvl .pill').forEach(p=>p.onclick=()=>{ m.querySelectorAll('#m_lvl .pill').forEach(x=>x.classList.remove('on')); p.classList.add('on'); lvl=p.dataset.l; });
  m.querySelector('[data-x]').onclick=()=>m.remove(); m.querySelector('#m_title').focus();
  m.querySelector('#m_ok').onclick=async ()=>{
    const title=m.querySelector('#m_title').value.trim(); if(!title) return toast('Enter a module title');
    const { data, error } = await sb.from('bank_courses').insert({ subject:subj, level:lvl, title, slug:slugify(subj+'-'+lvl+'-'+title), position:courses.length*10 }).select().single();
    if(error) return toast('Could not add module: '+error.message);
    courses.push(data); m.remove();
    path={ subject:subj, level:lvl, courseId:data.id, topicId:null, subId:null };
    renderExplorer(); toast('Module “'+title+'” added');
  };
}

function addTopic(courseId, parentId){
  const parent = parentId ? topicById(parentId) : null;
  const cid = parent ? parent.course_id : courseId;
  const heading = parent ? 'New subtopic in “'+parent.title+'”' : 'New topic';
  nameModal(heading, parent?'e.g. The Cyclops':'e.g. Tombs and burial', '', async (title)=>{
    const sibs = topics.filter(t=>t.course_id===cid && (t.parent_id||null)===(parentId||null)).length;
    const { data, error } = await sb.from('bank_topics').insert({ course_id:cid, parent_id:parentId||null, title, slug:slugify(title), position:sibs*10 }).select().single();
    if(error) return toast('Could not add: '+error.message);
    topics.push(data); renderExplorer(); toast((parent?'Subtopic':'Topic')+' “'+title+'” added');
  });
}

function renameCourse(id){ const c=courseById(id); if(!c) return; nameModal('Rename module', 'Module title', c.title, async (v)=>{ const {error}=await sb.from('bank_courses').update({title:v}).eq('id',id); if(error) return toast(error.message); c.title=v; renderExplorer(); toast('Renamed'); }); }
function renameTopic(id){ const t=topicById(id); if(!t) return; nameModal('Rename '+(t.parent_id?'subtopic':'topic'), 'Title', t.title, async (v)=>{ const {error}=await sb.from('bank_topics').update({title:v}).eq('id',id); if(error) return toast(error.message); t.title=v; renderExplorer(); toast('Renamed'); }); }

async function deleteCourse(id){
  const n = assessments.filter(a=>a.course_id===id).length;
  if(n) return toast('Move or delete its '+pl(n,'test')+' first.');
  if(!confirm('Delete this module and its topics?')) return;
  const { error } = await sb.from('bank_courses').delete().eq('id', id);
  if(error) return toast(error.message);
  courses = courses.filter(c=>c.id!==id); topics = topics.filter(t=>t.course_id!==id);
  if(path.courseId===id){ path.courseId=path.topicId=path.subId=null; }
  renderExplorer(); toast('Module deleted');
}
async function deleteTopic(id){
  const t=topicById(id); const isSub=!!t?.parent_id;
  const affected = assessments.filter(a=>a.topic_id===id || subTopicsOf(id).some(s=>s.id===a.topic_id)).length;
  if(!confirm('Delete this '+(isSub?'subtopic':'topic')+(affected?' — '+pl(affected,'test')+' will become unfiled':'')+'?')) return;
  const { error } = await sb.from('bank_topics').delete().eq('id', id);
  if(error) return toast(error.message);
  await loadAll();
  if(path.topicId===id){ path.topicId=path.subId=null; } if(path.subId===id){ path.subId=null; }
  renderExplorer(); toast('Deleted');
}

async function newAssessment(courseId, topicId){
  if(dirty) await saveAll(true);
  const course_id = courseId || path.courseId || courses[0]?.id;
  if(!course_id) return toast('Create a module first.');
  const { data, error } = await sb.from('bank_assessments').insert({ course_id, topic_id: topicId||null, created_by:me_id, title:'Untitled test' }).select().single();
  if(error) return toast('Could not create: '+error.message);
  data._n=0; data._m=0; assessments.unshift(data);
  await selectAssessment(data.id);
  const t=$('e_title'); if(t){ t.focus(); t.select(); }
}

// ───────────────────────────── SELECT + EDIT ─────────────────────────────
async function selectAssessment(id){
  if(dirty && id!==openId) await saveAll(true);
  openId = id;
  const a = assessments.find(x=>x.id===id);
  // park the explorer on this test's folder so "back" returns there
  if(a){ const c=courseById(a.course_id); const t=topicById(a.topic_id);
    path = { subject:c?c.subject:null, level:c?(c.level||'gcse'):null, courseId:a.course_id,
             topicId: t? (t.parent_id||t.id) : null, subId: (t&&t.parent_id)? t.id : null }; }
  const { data: qs } = await sb.from('bank_assessment_questions').select('*').eq('assessment_id', id).order('position');
  q = qs || []; schemes = {};
  if(q.length){ const { data: sc } = await sb.from('bank_assessment_mark_schemes').select('*').in('question_id', q.map(x=>x.id)); (sc||[]).forEach(s=>schemes[s.question_id]=s); }
  q.forEach(x=>{ if(!schemes[x.id]) schemes[x.id]={ question_id:x.id, scheme_points:[], model_answer:'', marking_notes:'' }; });
  collapsedQ = {}; q.forEach(x=>{ collapsedQ[x.id]=true; });
  dirty=false;
  $('browse').classList.add('hidden');
  $('editor').classList.remove('hidden');
  openEditor();
}

function currentA(){ return assessments.find(x=>x.id===openId); }
function markDirty(){ if(!dirty){ dirty=true; const d=$('dirtyTag'); if(d){ d.textContent='● Unsaved changes'; d.className='dirty unsaved'; } } }
function statusVal(){ return $('e_status').querySelector('button.on')?.dataset.s || 'draft'; }
function attachVal(){ return $('e_sub').value || $('e_topic').value || null; }
function resolveAttach(a){ const t=topicById(a.topic_id); if(!t) return {topicId:'',subId:''}; return t.parent_id?{topicId:t.parent_id,subId:t.id}:{topicId:t.id,subId:''}; }

function renderContextEdit(a){
  const total=q.reduce((s,qq)=>s+(+qq.marks||0),0);
  const c=courseById(a.course_id); const t=topicById(a.topic_id);
  let topicName='—', subName='—';
  if(t){ if(t.parent_id){ subName=t.title; const p=topicById(t.parent_id); topicName=p?p.title:'—'; } else topicName=t.title; }
  $('context').innerHTML =
    '<div class="context-eyebrow">Editing</div>' +
    '<div class="context-title">'+esc(a.title||'Untitled test')+'</div>' +
    '<div class="context-rule"></div>' +
    '<div style="margin-top:6px;">' +
      '<div class="ctx-line"><span>Subject</span><span>'+esc(c?subjLabel(c.subject):'—')+'</span></div>' +
      '<div class="ctx-line"><span>Level</span><span>'+esc(c?lvlLabel(c.level||'gcse'):'—')+'</span></div>' +
      '<div class="ctx-line"><span>Module</span><span>'+esc(c?c.title:'—')+'</span></div>' +
      '<div class="ctx-line"><span>Topic</span><span>'+esc(topicName)+'</span></div>' +
      '<div class="ctx-line"><span>Subtopic</span><span>'+esc(subName)+'</span></div>' +
      '<div class="ctx-line"><span>Status</span><span>'+esc(a.status)+'</span></div>' +
      '<div class="ctx-line"><span>Questions</span><span>'+q.length+'</span></div>' +
      '<div class="ctx-line"><span>Total marks</span><span>'+total+'</span></div>' +
    '</div>';
}

  $('back').addEventListener('click', async ()=>{ if(dirty) await saveAll(true); await loadAll(); showExplorer(); });
  $('e_title').addEventListener('input', ()=>{ markDirty(); renderContextEdit(currentA()); });
  $('e_course').addEventListener('change', ()=>{ markDirty(); const a2=currentA(); a2.course_id=$('e_course').value; a2.topic_id=null; openEditor(); });
  $('e_topic').addEventListener('change', ()=>{ markDirty(); const tid=$('e_topic').value; const sub=$('e_sub'); sub.innerHTML='<option value="">— whole topic —</option>'+subTopicsOf(tid).map(t=>'<option value="'+t.id+'">'+esc(t.title)+'</option>').join(''); const a2=currentA(); a2.topic_id=attachVal(); renderContextEdit(a2); });

  $('e_status').querySelectorAll('button').forEach(b=>b.addEventListener('click', ()=>{ $('e_status').querySelectorAll('button').forEach(x=>x.classList.remove('on')); b.classList.add('on'); markDirty(); const a2=currentA(); a2.status=statusVal(); renderContextEdit(a2); }));
  $('saveBtn').addEventListener('click', ()=>saveAll(false));
  $('previewBtn').addEventListener('click', preview);
  $('addPoints').addEventListener('click', ()=>addQuestion('points'));

  if(dirty){ const d=$('dirtyTag'); d.textContent='● Unsaved changes'; d.className='dirty unsaved'; }
}

// ───────────────────────────── QUESTIONS ─────────────────────────────
function drawQuestions(){
  const list = $('qlist');
  if(!q.length){
    list.innerHTML =
      '<div class="typecard-row">' +
        '<div class="typecard" data-new="points"><span class="plus">+ add</span><b>Points-based question</b><p>Civ, comprehension and source questions. Write the question, set the marks, then list the creditworthy points — the AI gives a mark for each idea the student conveys.</p></div>' +
        '<div class="typecard" data-new="translation"><span class="plus">+ add</span><b>Translation question</b><p>Latin or Greek into English. Give the passage and the correct translation — the AI bands the answer holistically out of 5 (OCR grid).</p></div>' +
      '</div>';
    list.querySelectorAll('[data-new]').forEach(c=>c.addEventListener('click', ()=>addQuestion(c.dataset.new)));
    updateTotal(); return;
  }
  list.innerHTML = q.map((qq,i)=>qHTML(qq, schemes[qq.id]||{scheme_points:[]}, i)).join('');
  q.forEach(qq=>wireQ(qq));
  updateTotal();
}
function qHTML(qq, sc, i){
  const pts = Array.isArray(sc.scheme_points)?sc.scheme_points:[];
  const tr = qq.mark_style==='translation';
  const collapsed = !!collapsedQ[qq.id];
  const prev = (qq.prompt||'').replace(/\s+/g,' ').trim().slice(0,90) || '(empty — tap to fill in)';
  let body;
  if(tr){
    body =
      '<div><label class="lbl">Passage to translate <span class="req">*</span></label><div class="fieldhint">The Latin or Greek the student must translate into English.</div><textarea class="f" data-f="prompt" placeholder="e.g. puella in viā ambulat et cantat.">'+esc(qq.prompt)+'</textarea></div>' +
      '<div style="margin-top:12px;"><label class="lbl">Correct translation <span class="req">*</span></label><div class="fieldhint">The accepted English. The AI bands the student holistically out of 5 against this — it doesn’t have to be word-for-word. <button class="btn ghost sm" type="button" data-aitr style="margin-left:4px;">✨ AI translate</button></div><textarea class="f" data-f="model" placeholder="e.g. The girl walks in the road and sings.">'+esc(sc.model_answer||'')+'</textarea></div>' +
      '<input type="hidden" data-f="marks" value="5">' +
      '<details style="margin-top:12px;"><summary class="minilbl" style="cursor:pointer;">Optional · marking notes</summary><div style="margin-top:8px;"><textarea class="f" data-f="notes" placeholder="Anything the marker should know.">'+esc(sc.marking_notes||'')+'</textarea></div></details>';
  } else {
    body =
      '<div><label class="lbl">Question <span class="req">*</span></label><div class="fieldhint">Exactly what the student reads and answers.</div><textarea class="f" data-f="prompt" placeholder="e.g. Describe two ways the Mycenaeans buried their dead.">'+esc(qq.prompt)+'</textarea></div>' +
      '<div class="grid3" style="margin-top:12px;align-items:end;"><div><label class="lbl">Marks <span class="req">*</span></label><input class="f" type="number" min="1" max="10" data-f="marks" value="'+qq.marks+'"></div><div style="grid-column:span 2;"><label class="lbl">Image (optional)</label><input class="f" type="file" accept="image/*" data-f="imgfile"></div></div>' +
      (qq.image_path?('<img class="thumb" src="'+imgSrc(qq.image_path)+'" alt="">'):'') +
      '<div style="margin-top:12px;"><label class="lbl">Mark scheme — creditworthy points <span class="req">*</span></label><div class="fieldhint">One idea per row. The AI awards a mark whenever the student conveys that idea (synonyms and paraphrase are fine). Use the small “mk” box only if a single point is worth more than one mark.</div><div class="sps" data-pts>'+pts.map(p=>spRow(p)).join('')+'</div><button class="btn ghost sm" data-addpt style="margin-top:6px;">+ point</button><div class="allochint" data-alloc></div></div>' +
      '<details style="margin-top:12px;"><summary class="minilbl" style="cursor:pointer;">Optional · model answer &amp; notes</summary><div class="grid2" style="margin-top:8px;"><div><label class="lbl">Model answer</label><textarea class="f" data-f="model" placeholder="A full-mark answer — helps the AI calibrate.">'+esc(sc.model_answer||'')+'</textarea></div><div><label class="lbl">Marking notes</label><textarea class="f" data-f="notes" placeholder="Anything the marker should know.">'+esc(sc.marking_notes||'')+'</textarea></div></div></details>';
  }
  return '<div class="qcard'+(collapsed?' collapsed':'')+'" data-q="'+qq.id+'">' +
    '<div class="qhead" data-toggle>' +
      '<span class="qnum">Q'+(i+1)+'</span>' +
      '<span class="qtype t-'+(tr?'translation':'points')+'">'+(tr?'Translation':'Points')+'</span>' +
      '<span class="qmarks">'+(tr?'/5':(qq.marks+' mk'))+'</span>' +
      '<span class="qprev">'+esc(prev)+'</span>' +
      '<span class="qmove"><button type="button" data-up'+(i===0?' disabled':'')+'>▲</button><button type="button" data-down'+(i===q.length-1?' disabled':'')+'>▼</button></span>' +
      '<button class="btn danger sm" data-del>Delete</button>' +
      '<span class="qchev">⌄</span>' +
    '</div>' +
    '<div class="qbody">' +
      '<div style="margin-bottom:12px;"><span class="minilbl">Type</span>&nbsp; <span class="seg s-style" data-style><button type="button" data-v="points" class="'+(tr?'':'on')+'">Points-based</button><button type="button" data-v="translation" class="'+(tr?'on':'')+'">Translation /5</button></span></div>' +
      body +
    '</div></div>';
}
function spRow(p){ return '<div class="sp"><input class="f txt" placeholder="e.g. shaft graves were deep rectangular pits" value="'+esc(p&&p.text||'')+'"><input class="f mk" type="number" min="1" placeholder="mk" value="'+(p&&p.marks||'')+'"><button class="btn danger sm" data-rmpt title="remove point">×</button></div>'; }

function wireQ(qq){
  const card = $('qlist').querySelector('[data-q="'+qq.id+'"]'); if(!card) return;
  card.querySelector('[data-toggle]').addEventListener('click', (e)=>{ if(e.target.closest('button')) return; collapsedQ[qq.id]=!collapsedQ[qq.id]; card.classList.toggle('collapsed'); });
  card.querySelectorAll('textarea, input[data-f]').forEach(el=>el.addEventListener('input', markDirty));
  card.querySelector('[data-up]').addEventListener('click', (e)=>{ e.stopPropagation(); moveQ(qq.id,-1); });
  card.querySelector('[data-down]').addEventListener('click', (e)=>{ e.stopPropagation(); moveQ(qq.id,1); });
  card.querySelector('[data-del]').addEventListener('click', async (e)=>{
    e.stopPropagation();
    if(!confirm('Delete this question?')) return;
    await sb.from('bank_assessment_questions').delete().eq('id', qq.id);
    const idx=q.findIndex(x=>x.id===qq.id); if(idx>=0) q.splice(idx,1); delete schemes[qq.id]; delete collapsedQ[qq.id];
    drawQuestions(); renderContextEdit(currentA()); toast('Question deleted');
  });
  const seg = card.querySelector('[data-style]');
  seg.querySelectorAll('button').forEach(b=>b.addEventListener('click', ()=>{
    if(b.classList.contains('on')) return;
    harvest(); qq.mark_style=b.dataset.v; if(qq.mark_style==='translation') qq.marks=5;
    collapsedQ[qq.id]=false; drawQuestions(); renderContextEdit(currentA()); markDirty();
  }));
  const mk = card.querySelector('input[data-f="marks"]');
  if(mk) mk.addEventListener('input', ()=>{ updateTotal(); const s=card.querySelector('.qmarks'); if(s) s.textContent=(+mk.value||0)+' mk'; renderContextEdit(currentA()); });
  const ptsBox = card.querySelector('[data-pts]');
  if(ptsBox){
    const alloc = card.querySelector('[data-alloc]');
    const updateAlloc = ()=>{
      const rows=[...card.querySelectorAll('.sp')];
      const n=rows.filter(r=>r.querySelector('.txt').value.trim()).length;
      const sum=rows.reduce((s,r)=>s+(+r.querySelector('.mk').value||0),0);
      const qm=+card.querySelector('input[data-f="marks"]').value||0;
      if(!n){ alloc.textContent='No points yet — add at least one so the AI knows what earns a mark.'; return; }
      let msg=n+' point'+(n!==1?'s':'');
      if(sum>0){ msg+=' · worth '+sum+' mark'+(sum!==1?'s':''); if(qm && sum!==qm) msg+=' (question is '+qm+')'; }
      alloc.textContent=msg;
    };
    const bindPts=()=>card.querySelectorAll('[data-rmpt]').forEach(b=>b.onclick=()=>{ b.closest('.sp').remove(); updateAlloc(); markDirty(); });
    card.querySelector('[data-addpt]').addEventListener('click', ()=>{ ptsBox.insertAdjacentHTML('beforeend', spRow({})); bindPts(); updateAlloc(); markDirty(); ptsBox.lastElementChild.querySelector('.txt').focus(); });
    card.addEventListener('input', updateAlloc);
    bindPts(); updateAlloc();
  }
  const fileInput = card.querySelector('[data-f="imgfile"]');
  if(fileInput) fileInput.addEventListener('change', async ()=>{
    const file = fileInput.files[0]; if(!file) return;
    const p = me_id+'/'+openId+'/'+crypto.randomUUID()+'-'+file.name.replace(/[^a-zA-Z0-9._-]/g,'_');
    const { error } = await sb.storage.from('weekly-test-images').upload(p, file);
    if(error) return toast('Upload failed: '+error.message);
    harvest(); qq.image_path = p; await sb.from('bank_assessment_questions').update({ image_path: p }).eq('id', qq.id); drawQuestions(); toast('Image uploaded');
  });
  const aitr = card.querySelector('[data-aitr]');
  if(aitr) aitr.addEventListener('click', async ()=>{
    const passage = card.querySelector('[data-f="prompt"]').value.trim();
    if(!passage) return toast('Type the passage first');
    const c = courseById(currentA().course_id);
    aitr.disabled = true; const label = aitr.textContent; aitr.textContent = 'Translating…';
    const { data, error } = await sb.functions.invoke('bank-translate', { body: { text: passage, subject: c?c.subject:'latin' } });
    aitr.disabled = false; aitr.textContent = label;
    if(error || !data?.translation){ return toast('Could not translate — try again'); }
    card.querySelector('[data-f="model"]').value = data.translation; markDirty(); toast('Translation filled in');
  });
}
function styleOf(card){ return card.querySelector('[data-style] button.on')?.dataset.v || 'points'; }

function harvest(){
  q.forEach(qq=>{
    const card = $('qlist').querySelector('[data-q="'+qq.id+'"]'); if(!card) return;
    qq.prompt = card.querySelector('[data-f="prompt"]').value.trim();
    qq.marks = Math.max(1, Math.min(10, +card.querySelector('[data-f="marks"]').value||1));
    qq.mark_style = styleOf(card);
    const pts = [...card.querySelectorAll('.sp')].map(r=>({ text:r.querySelector('.txt').value.trim(), marks:+r.querySelector('.mk').value||undefined })).filter(p=>p.text);
    const sc = schemes[qq.id] || (schemes[qq.id]={ question_id:qq.id });
    sc.scheme_points = pts;
    sc.model_answer = card.querySelector('[data-f="model"]').value.trim();
    sc.marking_notes = card.querySelector('[data-f="notes"]').value.trim();
  });
}
function updateTotal(){ const t=[...$('qlist').querySelectorAll('[data-f="marks"]')].reduce((s,el)=>s+(+el.value||0),0); const b=$('totBadge'); if(b) b.textContent=t+' mark'+(t===1?'':'s'); }

async function addQuestion(style){
  if($('qlist').querySelector('.qcard')) harvest();
  const mark_style = style==='translation' ? 'translation' : 'points';
  const marks = mark_style==='translation' ? 5 : 1;
  const { data, error } = await sb.from('bank_assessment_questions').insert({ assessment_id: openId, position:q.length, prompt:'', marks, mark_style }).select().single();
  if(error) return toast('Could not add: '+error.message);
  q.push(data); schemes[data.id]={ question_id:data.id, scheme_points:[], model_answer:'', marking_notes:'' };
  collapsedQ[data.id]=false;
  drawQuestions(); renderContextEdit(currentA());
  const card=$('qlist').querySelector('[data-q="'+data.id+'"]'); const ta=card&&card.querySelector('textarea[data-f="prompt"]');
  if(ta){ ta.focus(); ta.scrollIntoView({block:'center', behavior:'smooth'}); }
}
async function moveQ(id, dir){
  harvest();
  const i=q.findIndex(x=>x.id===id), j=i+dir; if(i<0||j<0||j>=q.length) return;
  [q[i],q[j]]=[q[j],q[i]]; q.forEach((qq,idx)=>qq.position=idx);
  drawQuestions();
  await Promise.all(q.map(qq=>sb.from('bank_assessment_questions').update({ position:qq.position }).eq('id', qq.id)));
}
async function saveAll(silent){
  const a = currentA(); if(!a) return;
  harvest();
  const patch = {
    title: ($('e_title').value.trim()||'Untitled test'),
    course_id: $('e_course').value,
    topic_id: ($('e_sub').value || $('e_topic').value || null),
    status: statusVal(),
    max_attempts_per_question: Math.max(1, Math.min(5, +$('e_att').value||1)),
    max_answer_chars: Math.max(100, Math.min(4000, +$('e_len').value||1200)),
    updated_at: new Date().toISOString(),
  };
  const { error } = await sb.from('bank_assessments').update(patch).eq('id', openId);
  if(error){ toast('Save failed: '+error.message); return; }
  Object.assign(a, patch);
  for(const qq of q){
    await sb.from('bank_assessment_questions').update({ prompt:qq.prompt, marks:qq.marks, mark_style:qq.mark_style, position:qq.position }).eq('id', qq.id);
    const sc = schemes[qq.id]||{ question_id:qq.id, scheme_points:[] };
    await sb.from('bank_assessment_mark_schemes').upsert({ question_id:qq.id, scheme_points:sc.scheme_points||[], model_answer:sc.model_answer||'', marking_notes:sc.marking_notes||'', updated_at:new Date().toISOString() }, { onConflict:'question_id' });
  }
  a._n = q.length; a._m = q.reduce((s,qq)=>s+(+qq.marks||0),0);
  dirty=false; const d=$('dirtyTag'); if(d){ d.textContent='✓ Saved'; d.className='dirty clean'; }
  renderContextEdit(a);
  if(!silent) toast('Saved');
}
function preview(){
  harvest();
  const a = currentA();
  const total = q.reduce((s,qq)=>s+(+qq.marks||0),0);
  const body = q.length ? q.map((qq,i)=>(
    '<div class="pvq"><div style="display:flex;align-items:center;"><b style="color:var(--navy);">Q'+(i+1)+'</b><span style="flex:1;"></span><span class="fieldhint" style="margin:0;">'+qq.marks+' mark'+(qq.marks>1?'s':'')+'</span></div>' +
    '<div class="pp" style="margin-top:6px;">'+esc(qq.prompt||'(no prompt yet)')+'</div>' +
    (qq.image_path?'<img class="thumb" src="'+imgSrc(qq.image_path)+'">':'') +
    '<div class="pvbox">Student types their answer here…</div></div>'
  )).join('') : '<p class="empty-note">No questions yet.</p>';
  const m = modal('<h3>'+esc($('e_title').value||a.title)+'</h3><div class="fieldhint" style="margin:-8px 0 14px;">Student preview · '+total+' marks total</div>'+body+'<div class="row end"><button class="btn sm" data-x>Close preview</button></div>', 640);
  m.querySelector('[data-x]').onclick=()=>m.remove();
}
</script>
</body>
