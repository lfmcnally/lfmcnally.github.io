<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assessment bank — authoring — Classicalia</title>
<link rel="icon" type="image/png" href="/images/favicon.png">
<link rel="stylesheet" href="/version2/assets/css/classicalia.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/version2/assets/js/supabase-client.js"></script>
<script src="/version2/assets/js/account-menu.js" defer></script>
<style>
/* Status badges reuse the site .type-badge shell, just recoloured */
.type-badge.st-draft     { background: #f1f5f9; color: #64748b; }
.type-badge.st-published { background: #dbeafe; color: #1e40af; }
.type-badge.st-archived  { background: #fdecec; color: #b91c1c; }
.mini-badge { margin-left: auto; margin-right: 8px; font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; padding: 2px 8px; border-radius: 2px; background: #f1f5f9; color: #64748b; }

/* Group labels inside a course (topics), styled like the civ Section A/B labels */
.acc-group-label { list-style: none; font-family: 'Lora', serif; font-style: italic; font-weight: 700; font-size: 15px; color: var(--navy); padding: 22px 0 8px; display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
.acc-group-label:first-child { padding-top: 4px; }
.acc-group-label .agl-tag { font-family: 'DM Sans', sans-serif; font-style: normal; font-weight: 700; font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: #1e40af; background: #dbeafe; padding: 3px 8px; border-radius: 2px; }

.resource-row--link { cursor: pointer; border-radius: 4px; transition: background .12s; }
.resource-row--link:hover { background: #f0f4ff; }
.row-meta { font-size: 11px; color: var(--muted); margin-top: 3px; }
.toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
.newchip { color: var(--brand); font-weight: 700; font-size: 12px; cursor: pointer; }
.newchip:hover { text-decoration: underline; }
.empty-note { color: var(--muted); font-size: 13px; padding: 24px 0; font-family: 'Lora', serif; font-style: italic; }

/* Buttons + form controls (editor) */
.btn { font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 700; padding: 9px 16px; border-radius: 6px; border: none; background: var(--brand); color: #fff; cursor: pointer; }
.btn:hover { background: #155ee0; }
.btn.ghost { background: var(--paper); color: var(--ink); border: 1px solid var(--rule); font-weight: 600; }
.btn.ghost:hover { background: var(--cream); }
.btn.danger { background: var(--paper); color: #b91c1c; border: 1px solid #fecaca; font-weight: 600; }
.btn.sm { font-size: 12px; padding: 6px 12px; }
.btn:disabled { opacity: .5; cursor: default; }
label.lbl { display: block; font-size: 10px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); margin: 0 0 5px; }
input.f, select.f, textarea.f { width: 100%; box-sizing: border-box; font-family: 'DM Sans', sans-serif; font-size: 14px; padding: 9px 11px; border: 1.5px solid var(--rule); border-radius: 7px; background: var(--paper); color: var(--ink); outline: none; }
input.f:focus, select.f:focus, textarea.f:focus { border-color: var(--brand); }
textarea.f { resize: vertical; min-height: 56px; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.grid3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }

.back-link { display: inline-flex; align-items: center; gap: 6px; font-size: 12.5px; font-weight: 700; color: var(--brand); background: none; border: none; cursor: pointer; padding: 0; margin-bottom: 14px; }
.back-link:hover { text-decoration: underline; }
.etitle { width: 100%; box-sizing: border-box; font-family: 'Lora', serif; font-style: italic; font-weight: 700; font-size: 26px; color: var(--navy); border: none; border-bottom: 2px solid transparent; padding: 2px 0 6px; background: transparent; outline: none; }
.etitle:focus { border-bottom-color: var(--brand); }
.ebar { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin: 14px 0 0; padding-bottom: 16px; border-bottom: 1px solid var(--rule); }
.minilbl { font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); }
.inlinesel { width: auto; display: inline-block; padding: 7px 9px; font-size: 13px; }
.dirty { font-size: 12px; font-weight: 700; } .dirty.clean { color: #2a8a3e; } .dirty.unsaved { color: #c97a12; }

/* Segmented toggle (status, marking style) — replaces dropdowns */
.seg { display: inline-flex; border: 1.5px solid var(--rule); border-radius: 8px; overflow: hidden; }
.seg button { font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 700; padding: 7px 13px; border: none; background: var(--paper); color: var(--muted); cursor: pointer; }
.seg button + button { border-left: 1.5px solid var(--rule); }
.seg.s-status button.on.draft { background: #eef0f4; color: var(--navy); }
.seg.s-status button.on.published { background: #dbeafe; color: #1e40af; }
.seg.s-status button.on.archived { background: #fdecec; color: #b91c1c; }
.seg.s-style button.on { background: #eef4ff; color: var(--brand); }

.totbadge { display: inline-block; font-size: 12px; font-weight: 700; color: var(--navy); background: var(--rule-faint); border-radius: 999px; padding: 4px 12px; }
.qcard { border: 1px solid var(--rule); border-radius: 9px; padding: 14px 16px; margin-bottom: 12px; background: var(--cream); }
.qhead { display: flex; align-items: center; gap: 8px; }
.qmove { display: inline-flex; flex-direction: column; gap: 1px; }
.qmove button { font-size: 9px; line-height: 1; padding: 3px 7px; border: 1px solid var(--rule); background: var(--paper); color: var(--muted); cursor: pointer; border-radius: 4px; }
.qmove button:hover:not(:disabled) { color: var(--navy); }
.qmove button:disabled { opacity: .35; cursor: default; }
.sps { display: flex; flex-direction: column; gap: 6px; margin-top: 6px; }
.sp { display: flex; gap: 8px; align-items: center; }
.sp input.txt { flex: 1; } .sp input.mk { width: 64px; }
.thumb { max-width: 160px; max-height: 110px; border-radius: 6px; border: 1px solid var(--rule); display: block; margin-top: 8px; }

/* Editor context panel (left aside while editing) */
.ctx-line { display: flex; justify-content: space-between; gap: 10px; font-size: 12px; padding: 6px 0; border-bottom: 1px solid var(--rule-faint); }
.ctx-line:last-child { border-bottom: none; }
.ctx-line span:first-child { color: var(--muted); } .ctx-line span:last-child { color: var(--ink); font-weight: 600; text-align: right; }

/* Modal */
.modal-bg { position: fixed; inset: 0; background: rgba(14,30,63,.45); display: flex; align-items: center; justify-content: center; z-index: 200; padding: 20px; }
.modal { background: var(--paper); border-radius: 12px; padding: 22px 24px; width: 100%; max-width: 440px; box-shadow: 0 12px 40px rgba(14,30,63,.25); }
.modal h3 { margin: 0 0 14px; font-family: 'Lora', serif; font-style: italic; color: var(--navy); font-size: 20px; }
.modal .row.end { display: flex; gap: 10px; justify-content: flex-end; margin-top: 18px; }
.pills { display: flex; gap: 7px; flex-wrap: wrap; }
.pill { font-size: 12px; font-weight: 700; padding: 7px 13px; border-radius: 999px; border: 1.5px solid var(--rule); background: var(--paper); color: var(--muted); cursor: pointer; }
.pill.on { border-color: var(--brand); background: #eef4ff; color: var(--brand); }
.pvq { border: 1px solid var(--rule); border-radius: 9px; padding: 14px 16px; margin-bottom: 12px; background: var(--cream); }
.pvq .pp { color: var(--ink); white-space: pre-wrap; }
.pvbox { width: 100%; box-sizing: border-box; margin-top: 8px; border: 1.5px dashed var(--rule); border-radius: 7px; padding: 12px; min-height: 48px; color: var(--muted); font-size: 13px; background: var(--paper); }

.toast { position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%); background: var(--navy); color: #fff; font-size: 13px; padding: 9px 18px; border-radius: 8px; opacity: 0; transition: opacity .2s; z-index: 300; }
.toast.show { opacity: 1; }
.hidden { display: none !important; }
mark { background: #fde68a; color: inherit; padding: 0 1px; border-radius: 2px; }
</style>
</head>
<body>
<div class="header">
  <canvas class="header-sky" data-starfield data-seed="717" data-region="0.8"></canvas>
  <nav class="nav"><div class="nav-inner">
    <a href="/version2/" class="nav-logo">Classicalia</a>
    <div class="nav-links">
      <a href="/version2/admin/" class="nav-link">Admin</a>
      <a href="/version2/tracking/teacher.html" class="nav-link">Classes</a>
      <div class="nav-div"></div>
      <div data-account-menu></div>
    </div>
  </div></nav>
  <div class="header-inner">
    <div class="header-eyebrow">Admin &middot; Resource bank</div>
    <h1 class="header-title">Assessment bank</h1>
    <p class="header-deck">The curated tests teachers assign and students take &mdash; organised by course and topic. Search to find one, click to edit, or start a new test.</p>
  </div>
</div>

<div class="module-tabs">
  <div class="module-tabs-inner">
    <a href="/version2/admin/" class="module-tab">&larr; Admin</a>
    <a href="#" class="module-tab active">Assessment bank</a>
  </div>
</div>

<div class="module-body">
  <aside class="context" id="context"></aside>
  <main>
    <div id="gate" class="hidden"></div>

    <!-- BROWSE: search + accordion grouped by course -> topic -->
    <div id="browse" class="hidden">
      <div class="search-bar">
        <div class="search-wrap">
          <svg class="search-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="8.5" cy="8.5" r="5.5"/><line x1="13" y1="13" x2="17" y2="17"/></svg>
          <input class="search-input" id="search" type="text" placeholder="Search tests&hellip;" autocomplete="off">
          <button class="search-clear" id="searchClear">&times;</button>
        </div>
        <div class="search-meta" id="searchMeta"></div>
      </div>
      <div class="toolbar">
        <button class="btn sm" id="newA">+ New test</button>
        <span class="newchip" id="addCourse">+ Course</span>
        <span class="newchip" id="addTopic">+ Topic</span>
      </div>
      <ul class="accordion" id="accordion"></ul>
    </div>

    <!-- EDITOR: focused, full-width -->
    <div id="editor" class="hidden"></div>
  </main>
</div>

<div class="toast" id="toast"></div>
<script src="/version2/assets/js/starfield.js"></script>
<script>
'use strict';
const sb = window.supabase;
const $ = (id) => document.getElementById(id);
const esc = (s) => String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const slugify = (s) => String(s||'').toLowerCase().trim().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'').slice(0,60) || ('x-'+Math.random().toString(36).slice(2,7));
const norm = (s) => String(s||'').toLowerCase().replace(/[^a-z0-9 ]/g,'');
const SUBJECTS = ['classical-civilisation','latin','greek'];
let toastT;
function toast(msg){ const t=$('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2200); }
function imgSrc(path){ if(!path) return ''; if(/^https?:\/\//.test(path)||path.startsWith('/')) return path; return sb.storage.from('weekly-test-images').getPublicUrl(path).data.publicUrl; }
function modal(html, maxw){ const bg=document.createElement('div'); bg.className='modal-bg'; bg.innerHTML='<div class="modal"'+(maxw?(' style="max-width:'+maxw+'px;max-height:84vh;overflow:auto;"'):'')+'>'+html+'</div>'; document.body.appendChild(bg); bg.addEventListener('click',e=>{ if(e.target===bg) bg.remove(); }); return bg; }

let me_id=null, courses=[], topics=[], assessments=[];
let openId=null, q=[], schemes={}, dirty=false;

// ───────────────────────────── INIT ─────────────────────────────
(async function init(){
  const { data: au } = await sb.auth.getUser();
  const user = au?.user;
  if(!user){ return gate('Please <a href="/auth/login.html">sign in</a> as an admin to author the assessment bank.'); }
  me_id = user.id;
  const { data: profile } = await sb.from('users').select('is_admin').eq('id', user.id).single();
  if(!profile || !profile.is_admin){ return gate('This page is for site admins — the bank is curated. (Row-level security also enforces this server-side.)'); }

  const { data: cs } = await sb.from('bank_courses').select('*').order('subject').order('position');
  courses = cs || [];
  if(!courses.length){ return gate('No courses yet. Apply migration 061 (which seeds the course list), or add one once the table exists.'); }

  await loadAll();
  $('search').addEventListener('input', runSearch);
  $('searchClear').addEventListener('click', ()=>{ $('search').value=''; runSearch(); $('search').focus(); });
  $('newA').addEventListener('click', ()=>newAssessment());
  $('addCourse').addEventListener('click', addCourse);
  $('addTopic').addEventListener('click', addTopic);
  window.addEventListener('beforeunload', (e)=>{ if(dirty){ e.preventDefault(); e.returnValue=''; } });
  showBrowse();
})();

function gate(html){ const g=$('gate'); g.innerHTML='<div style="background:var(--paper);border:1px solid var(--rule);border-radius:10px;padding:24px;font-size:15px;color:var(--ink);line-height:1.6;">'+html+'</div>'; g.classList.remove('hidden'); $('context').innerHTML=''; }

async function loadAll(){
  const cids = courses.map(c=>c.id);
  const [{ data: ts }, { data: as }] = await Promise.all([
    sb.from('bank_topics').select('*').in('course_id', cids).order('position'),
    sb.from('bank_assessments').select('*').in('course_id', cids).order('created_at',{ascending:false}),
  ]);
  topics = ts || []; assessments = as || [];
  // question counts + marks per assessment (for the row meta)
  const { data: qcs } = await sb.from('bank_assessment_questions').select('assessment_id, marks').in('assessment_id', assessments.map(a=>a.id).length?assessments.map(a=>a.id):['00000000-0000-0000-0000-000000000000']);
  const agg = {}; (qcs||[]).forEach(r=>{ const a=agg[r.assessment_id]||(agg[r.assessment_id]={n:0,m:0}); a.n++; a.m+=(r.marks||0); });
  assessments.forEach(a=>{ a._n = agg[a.id]?.n||0; a._m = agg[a.id]?.m||0; });
}

// ───────────────────────────── BROWSE (accordion + search) ─────────────────────────────
function showBrowse(){
  openId=null;
  $('editor').classList.add('hidden');
  $('gate').classList.add('hidden');
  $('browse').classList.remove('hidden');
  renderContextBrowse();
  renderAccordion();
  runSearch();
}

function renderContextBrowse(){
  const total = assessments.length, pub = assessments.filter(a=>a.status==='published').length;
  $('context').innerHTML =
    '<div class="context-eyebrow">Resource bank</div>' +
    '<div class="context-title">Assessments</div>' +
    '<div class="context-rule"></div>' +
    '<p class="context-desc">Build the curated tests, grouped by course and topic. Set a test to <strong>Published</strong> to make it available to teachers and self-serve students; drafts stay admin-only.</p>' +
    '<div style="margin-top:16px;">' +
      '<div class="ctx-line"><span>Courses</span><span>'+courses.length+'</span></div>' +
      '<div class="ctx-line"><span>Tests</span><span>'+total+'</span></div>' +
      '<div class="ctx-line"><span>Published</span><span>'+pub+'</span></div>' +
    '</div>';
}

function renderAccordion(){
  const acc = $('accordion'); acc.innerHTML='';
  courses.forEach((c, ci)=>{
    const cAss = assessments.filter(a=>a.course_id===c.id);
    const cTopics = topics.filter(t=>t.course_id===c.id);
    const li = document.createElement('li'); li.className='accordion-item'; li.dataset.course=c.id;

    let panel = '';
    const groups = [...cTopics.map(t=>({id:t.id,title:t.title})), {id:null,title:'No topic'}];
    groups.forEach(g=>{
      const items = cAss.filter(a=>(a.topic_id||null)===g.id);
      if(!items.length) return;
      panel += '<div class="acc-group-label" data-group="'+(g.id||'none')+'"><span class="agl-tag">Topic</span> '+esc(g.title)+'</div>';
      items.forEach(a=>{
        const meta = (a._n? (a._n+' question'+(a._n!==1?'s':'')+' · '+a._m+' mark'+(a._m!==1?'s':'')) : 'No questions yet');
        const search = norm(a.title+' '+g.title+' '+c.title+' '+c.subject+' '+a.status);
        panel +=
          '<div class="resource-row resource-row--link" data-a="'+a.id+'" data-search="'+esc(search)+'">' +
            '<span class="type-badge st-'+a.status+'">'+a.status+'</span>' +
            '<div class="row-body"><div class="row-title">'+esc(a.title)+'</div><div class="row-meta">'+meta+'</div></div>' +
            '<span class="newchip" style="align-self:center;">Edit &rarr;</span>' +
          '</div>';
      });
    });
    if(!panel) panel = '<div class="empty-note">No tests in this course yet &mdash; <span class="newchip" data-newin="'+c.id+'">add the first</span>.</div>';

    li.innerHTML =
      '<button class="accordion-trigger" type="button">' +
        '<span class="acc-n">'+(ci+1)+'</span>' +
        '<span class="acc-title">'+esc(c.subject)+' &middot; '+esc(c.title)+'</span>' +
        '<span class="mini-badge">'+cAss.length+' test'+(cAss.length!==1?'s':'')+'</span>' +
        '<svg class="acc-chevron" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="5 8 10 13 15 8"/></svg>' +
      '</button>' +
      '<div class="accordion-panel">'+panel+'</div>';
    acc.appendChild(li);

    li.querySelector('.accordion-trigger').addEventListener('click', ()=>li.classList.toggle('open'));
    li.querySelectorAll('[data-a]').forEach(r=>r.addEventListener('click', ()=>selectAssessment(r.dataset.a)));
    const ni = li.querySelector('[data-newin]'); if(ni) ni.addEventListener('click', (e)=>{ e.stopPropagation(); newAssessment(c.id); });
  });
  if(!assessments.length) acc.innerHTML = '<div class="empty-note">No tests yet — create your first with <b>+ New test</b>.</div>';
}

function runSearch(){
  const raw = $('search').value.trim();
  const query = norm(raw);
  $('searchClear').classList.toggle('visible', !!raw);
  let total = 0;

  document.querySelectorAll('#accordion .accordion-item').forEach(item=>{
    let itemMatch = false;
    item.querySelectorAll('.resource-row').forEach(row=>{
      const hit = !query || (row.dataset.search||'').includes(query);
      row.classList.toggle('search-hidden', !hit);
      if(hit){ itemMatch = true; total++; }
      const t = row.querySelector('.row-title'); if(t) hl(t, raw);
    });
    // hide topic group-labels whose rows are all hidden
    item.querySelectorAll('.acc-group-label').forEach(lbl=>{
      let any=false; let n=lbl.nextElementSibling;
      while(n && n.classList.contains('resource-row')){ if(!n.classList.contains('search-hidden')) any=true; n=n.nextElementSibling; }
      lbl.style.display = (query && !any) ? 'none' : '';
    });
    if(!query){ item.classList.remove('search-hidden','search-match'); }
    else if(itemMatch){ item.classList.remove('search-hidden'); item.classList.add('search-match'); }
    else { item.classList.add('search-hidden'); item.classList.remove('search-match'); }
  });

  const meta = $('searchMeta');
  if(!query) meta.innerHTML='';
  else if(!total) meta.innerHTML = 'No tests match <span class="match">&ldquo;'+esc(raw)+'&rdquo;</span>';
  else meta.innerHTML = '<span class="match">'+total+'</span> test'+(total!==1?'s':'')+' for &ldquo;'+esc(raw)+'&rdquo;';
}
function hl(el, raw){
  const orig = el.dataset.orig || el.textContent; el.dataset.orig = orig;
  if(!raw){ el.textContent = orig; return; }
  const re = new RegExp('('+raw.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
  el.innerHTML = esc(orig).replace(re,'<mark>$1</mark>');
}

// ───────────────────────────── CREATE ─────────────────────────────
function activeCourseId(){ if(openId){ const a=assessments.find(x=>x.id===openId); if(a) return a.course_id; } return courses[0]?.id; }

function addCourse(){
  let subj = SUBJECTS[0];
  const m = modal('<h3>New course</h3>' +
    '<label class="lbl">Subject</label><div class="pills" id="m_subj">'+SUBJECTS.map((s,i)=>'<span class="pill'+(i===0?' on':'')+'" data-s="'+s+'">'+s+'</span>').join('')+'</div>' +
    '<div style="margin-top:14px;"><label class="lbl">Course title</label><input class="f" id="m_title" placeholder="e.g. Roman City Life"></div>' +
    '<div class="row end"><button class="btn ghost sm" data-x>Cancel</button><button class="btn sm" id="m_ok">Add course</button></div>');
  m.querySelectorAll('#m_subj .pill').forEach(p=>p.addEventListener('click',()=>{ m.querySelectorAll('#m_subj .pill').forEach(x=>x.classList.remove('on')); p.classList.add('on'); subj=p.dataset.s; }));
  m.querySelector('[data-x]').onclick=()=>m.remove(); m.querySelector('#m_title').focus();
  m.querySelector('#m_ok').onclick=async ()=>{
    const title=m.querySelector('#m_title').value.trim(); if(!title) return toast('Enter a course title');
    const { data, error } = await sb.from('bank_courses').insert({ subject:subj, title, slug:slugify(subj+'-'+title), position:courses.length*10 }).select().single();
    if(error) return toast('Could not add course: '+error.message);
    courses.push(data); m.remove(); renderContextBrowse(); renderAccordion(); runSearch(); toast('Course “'+title+'” added');
  };
}

function addTopic(){
  const cid = activeCourseId();
  const m = modal('<h3>New topic</h3>' +
    '<label class="lbl">Course</label><select class="f" id="m_course">'+courses.map(c=>'<option value="'+c.id+'"'+(c.id===cid?' selected':'')+'>'+esc(c.subject)+' · '+esc(c.title)+'</option>').join('')+'</select>' +
    '<div style="margin-top:14px;"><label class="lbl">Topic title</label><input class="f" id="m_title" placeholder="e.g. Death and burial"></div>' +
    '<div class="row end"><button class="btn ghost sm" data-x>Cancel</button><button class="btn sm" id="m_ok">Add topic</button></div>');
  m.querySelector('[data-x]').onclick=()=>m.remove(); m.querySelector('#m_title').focus();
  m.querySelector('#m_ok').onclick=async ()=>{
    const title=m.querySelector('#m_title').value.trim(); const course_id=m.querySelector('#m_course').value;
    if(!title) return toast('Enter a topic title');
    const count = topics.filter(t=>t.course_id===course_id).length;
    const { data, error } = await sb.from('bank_topics').insert({ course_id, title, slug:slugify(title), position:count*10 }).select().single();
    if(error) return toast('Could not add topic: '+error.message);
    topics.push(data); m.remove();
    if(openId) openEditor(); else { renderAccordion(); runSearch(); }
    toast('Topic “'+title+'” added');
  };
}

async function newAssessment(courseId){
  if(dirty) await saveAll(true);
  const course_id = (typeof courseId==='string' && courseId) ? courseId : activeCourseId();
  const { data, error } = await sb.from('bank_assessments').insert({ course_id, topic_id:null, created_by:me_id, title:'Untitled test' }).select().single();
  if(error) return toast('Could not create: '+error.message);
  data._n=0; data._m=0; assessments.unshift(data);
  await selectAssessment(data.id);
  const t=$('e_title'); if(t){ t.focus(); t.select(); }
}

// ───────────────────────────── SELECT + EDIT ─────────────────────────────
async function selectAssessment(id){
  if(dirty && id!==openId) await saveAll(true);
  openId = id;
  const { data: qs } = await sb.from('bank_assessment_questions').select('*').eq('assessment_id', id).order('position');
  q = qs || []; schemes = {};
  if(q.length){ const { data: sc } = await sb.from('bank_assessment_mark_schemes').select('*').in('question_id', q.map(x=>x.id)); (sc||[]).forEach(s=>schemes[s.question_id]=s); }
  q.forEach(x=>{ if(!schemes[x.id]) schemes[x.id]={ question_id:x.id, scheme_points:[], model_answer:'', marking_notes:'' }; });
  dirty=false;
  $('browse').classList.add('hidden');
  $('editor').classList.remove('hidden');
  openEditor();
}

function markDirty(){ if(!dirty){ dirty=true; const d=$('dirtyTag'); if(d){ d.textContent='● Unsaved changes'; d.className='dirty unsaved'; } } }
function statusVal(){ return $('e_status').querySelector('button.on')?.dataset.s || 'draft'; }

function renderContextEdit(a){
  const total = q.reduce((s,qq)=>s+(+qq.marks||0),0);
  const course = courses.find(c=>c.id===a.course_id);
  const topic = topics.find(t=>t.id===a.topic_id);
  $('context').innerHTML =
    '<div class="context-eyebrow">Editing</div>' +
    '<div class="context-title">'+esc(a.title||'Untitled test')+'</div>' +
    '<div class="context-rule"></div>' +
    '<div style="margin-top:6px;">' +
      '<div class="ctx-line"><span>Course</span><span>'+esc(course?course.title:'—')+'</span></div>' +
      '<div class="ctx-line"><span>Topic</span><span>'+esc(topic?topic.title:'—')+'</span></div>' +
      '<div class="ctx-line"><span>Status</span><span>'+esc(a.status)+'</span></div>' +
      '<div class="ctx-line"><span>Questions</span><span>'+q.length+'</span></div>' +
      '<div class="ctx-line"><span>Total marks</span><span>'+total+'</span></div>' +
    '</div>';
}

function openEditor(){
  const a = assessments.find(x=>x.id===openId); if(!a) return;
  renderContextEdit(a);
  const cTopics = topics.filter(t=>t.course_id===a.course_id);
  const ed = $('editor');
  ed.innerHTML =
    '<button class="back-link" id="back">&larr; All tests</button>' +
    '<input class="etitle" id="e_title" value="'+esc(a.title)+'" placeholder="Test title">' +
    '<div class="ebar">' +
      '<div class="seg s-status" id="e_status">'+['draft','published','archived'].map(s=>'<button type="button" class="'+s+(a.status===s?' on':'')+'" data-s="'+s+'">'+s+'</button>').join('')+'</div>' +
      '<div><span class="minilbl">Course</span>&nbsp; <select class="f inlinesel" id="e_course">'+courses.map(c=>'<option value="'+c.id+'"'+(c.id===a.course_id?' selected':'')+'>'+esc(c.subject)+' · '+esc(c.title)+'</option>').join('')+'</select></div>' +
      '<div><span class="minilbl">Topic</span>&nbsp; <select class="f inlinesel" id="e_topic"><option value="">— none —</option>'+cTopics.map(t=>'<option value="'+t.id+'"'+(a.topic_id===t.id?' selected':'')+'>'+esc(t.title)+'</option>').join('')+'</select></div>' +
      '<span style="flex:1;"></span>' +
      '<span class="dirty clean" id="dirtyTag">✓ Saved</span>' +
      '<button class="btn" id="saveBtn">Save</button>' +
    '</div>' +
    '<details style="margin:12px 0 2px;"><summary class="minilbl" style="cursor:pointer;">Settings</summary>' +
      '<div class="grid2" style="margin-top:10px;max-width:420px;">' +
        '<div><label class="lbl">Attempts / question</label><input class="f" id="e_att" type="number" min="1" max="5" value="'+a.max_attempts_per_question+'"></div>' +
        '<div><label class="lbl">Max answer length</label><input class="f" id="e_len" type="number" min="100" max="4000" value="'+a.max_answer_chars+'"></div>' +
      '</div></details>' +
    '<div style="display:flex;align-items:center;gap:12px;margin:18px 0 10px;"><h3 style="font-family:Lora,serif;font-style:italic;color:var(--navy);margin:0;">Questions</h3><span class="totbadge" id="totBadge">0 marks</span><span style="flex:1;"></span><button class="btn ghost sm" id="previewBtn">Preview as student</button><button class="btn sm" id="addQ">+ Question</button></div>' +
    '<div id="qlist"></div>';

  $('back').addEventListener('click', async ()=>{ if(dirty) await saveAll(true); await loadAll(); showBrowse(); });
  $('e_title').addEventListener('input', ()=>{ markDirty(); renderContextEdit(currentA()); });
  $('e_topic').addEventListener('change', ()=>{ markDirty(); const a2=currentA(); a2.topic_id=$('e_topic').value||null; renderContextEdit(a2); });
  $('e_course').addEventListener('change', ()=>{ markDirty(); const a2=currentA(); a2.course_id=$('e_course').value; a2.topic_id=null; openEditor(); });
  $('e_att').addEventListener('input', markDirty);
  $('e_len').addEventListener('input', markDirty);
  $('e_status').querySelectorAll('button').forEach(b=>b.addEventListener('click', ()=>{ $('e_status').querySelectorAll('button').forEach(x=>x.classList.remove('on')); b.classList.add('on'); markDirty(); const a2=currentA(); a2.status=statusVal(); renderContextEdit(a2); }));
  $('saveBtn').addEventListener('click', ()=>saveAll(false));
  $('previewBtn').addEventListener('click', preview);
  $('addQ').addEventListener('click', addQuestion);
  drawQuestions();
  if(dirty){ const d=$('dirtyTag'); d.textContent='● Unsaved changes'; d.className='dirty unsaved'; }
}
function currentA(){ return assessments.find(x=>x.id===openId); }

// ───────────────────────────── QUESTIONS ─────────────────────────────
function drawQuestions(){
  const list = $('qlist');
  list.innerHTML = q.length ? q.map((qq,i)=>qHTML(qq, schemes[qq.id]||{scheme_points:[]}, i)).join('') : '<p class="empty-note">No questions yet — add the first one above.</p>';
  q.forEach(qq=>wireQ(qq));
  updateTotal();
}
function qHTML(qq, sc, i){
  const pts = Array.isArray(sc.scheme_points)?sc.scheme_points:[];
  const tr = qq.mark_style==='translation';
  return '<div class="qcard" data-q="'+qq.id+'">' +
    '<div class="qhead"><b style="color:var(--navy);">Q'+(i+1)+'</b>' +
      '<span class="qmove"><button type="button" data-up'+(i===0?' disabled':'')+'>▲</button><button type="button" data-down'+(i===q.length-1?' disabled':'')+'>▼</button></span>' +
      '<span style="flex:1;"></span><button class="btn danger sm" data-del>Delete</button></div>' +
    '<div style="margin-top:8px;"><label class="lbl">Question / prompt</label><textarea class="f" data-f="prompt">'+esc(qq.prompt)+'</textarea></div>' +
    '<div style="margin-top:10px;"><label class="lbl">Marking style</label><br>' +
      '<div class="seg s-style" data-style><button type="button" data-v="points" class="'+(tr?'':'on')+'">Points-based</button><button type="button" data-v="translation" class="'+(tr?'on':'')+'">Translation /5</button></div>' +
      '<div class="row-desc" data-styhint style="margin-top:6px;">'+styleHint(qq.mark_style)+'</div></div>' +
    '<div class="grid3" style="margin-top:10px;">' +
      '<div><label class="lbl">Marks</label><input class="f" type="number" min="1" max="10" data-f="marks" value="'+qq.marks+'"></div>' +
      '<div style="grid-column:span 2;"><label class="lbl">Image (optional)</label><input class="f" type="file" accept="image/*" data-f="imgfile"></div>' +
    '</div>' +
    (qq.image_path?('<img class="thumb" src="'+imgSrc(qq.image_path)+'" alt="">'):'') +
    '<div style="margin-top:10px;"><label class="lbl">Mark scheme — creditworthy points</label><div class="sps" data-pts>'+pts.map(p=>spRow(p)).join('')+'</div><button class="btn ghost sm" data-addpt style="margin-top:6px;">+ point</button></div>' +
    '<div class="grid2" style="margin-top:10px;">' +
      '<div><label class="lbl" data-modellabel>'+(tr?'Correct translation (required)':'Model answer (optional)')+'</label><textarea class="f" data-f="model">'+esc(sc.model_answer||'')+'</textarea></div>' +
      '<div><label class="lbl">Marking notes (optional)</label><textarea class="f" data-f="notes">'+esc(sc.marking_notes||'')+'</textarea></div>' +
    '</div></div>';
}
function spRow(p){ return '<div class="sp"><input class="f txt" placeholder="creditworthy point" value="'+esc(p&&p.text||'')+'"><input class="f mk" type="number" min="1" placeholder="mk" value="'+(p&&p.marks||'')+'"><button class="btn danger sm" data-rmpt>×</button></div>'; }
function styleHint(style){
  return style==='translation'
    ? 'Latin/Greek in the prompt, correct English in <b>Correct translation</b>. Marked holistically out of 5 (OCR grid) — set marks to <b>5</b>. Creditworthy points are ignored.'
    : 'The AI credits each creditworthy point the student conveys, allowing synonyms and paraphrase.';
}
function wireQ(qq){
  const card = $('qlist').querySelector('[data-q="'+qq.id+'"]'); if(!card) return;
  card.querySelectorAll('textarea, input[data-f]').forEach(el=>el.addEventListener('input', markDirty));
  card.querySelector('[data-up]').addEventListener('click', ()=>moveQ(qq.id,-1));
  card.querySelector('[data-down]').addEventListener('click', ()=>moveQ(qq.id,1));
  card.querySelector('[data-del]').addEventListener('click', async ()=>{
    if(!confirm('Delete this question?')) return;
    await sb.from('bank_assessment_questions').delete().eq('id', qq.id);
    const idx=q.findIndex(x=>x.id===qq.id); if(idx>=0) q.splice(idx,1); delete schemes[qq.id];
    drawQuestions(); renderContextEdit(currentA()); toast('Question deleted');
  });
  const seg = card.querySelector('[data-style]');
  seg.querySelectorAll('button').forEach(b=>b.addEventListener('click', ()=>{
    seg.querySelectorAll('button').forEach(x=>x.classList.remove('on')); b.classList.add('on');
    const tr = b.dataset.v==='translation';
    card.querySelector('[data-styhint]').innerHTML = styleHint(b.dataset.v);
    const ml = card.querySelector('[data-modellabel]'); if(ml) ml.textContent = tr ? 'Correct translation (required)' : 'Model answer (optional)';
    const mk = card.querySelector('[data-f="marks"]'); if(tr && (+mk.value||1)<2){ mk.value=5; updateTotal(); }
    markDirty();
  }));
  card.querySelector('[data-f="marks"]').addEventListener('input', ()=>{ updateTotal(); renderContextEdit(currentA()); });
  card.querySelector('[data-addpt]').addEventListener('click', ()=>{ card.querySelector('[data-pts]').insertAdjacentHTML('beforeend', spRow({})); bindPts(); markDirty(); });
  function bindPts(){ card.querySelectorAll('[data-rmpt]').forEach(b=>b.onclick=()=>{ b.closest('.sp').remove(); markDirty(); }); }
  bindPts();
  const fileInput = card.querySelector('[data-f="imgfile"]');
  fileInput.addEventListener('change', async ()=>{
    const file = fileInput.files[0]; if(!file) return;
    const path = me_id+'/'+openId+'/'+crypto.randomUUID()+'-'+file.name.replace(/[^a-zA-Z0-9._-]/g,'_');
    const { error } = await sb.storage.from('weekly-test-images').upload(path, file);
    if(error) return toast('Upload failed: '+error.message);
    harvest(); qq.image_path = path; await sb.from('bank_assessment_questions').update({ image_path: path }).eq('id', qq.id); drawQuestions(); toast('Image uploaded');
  });
}
function styleOf(card){ return card.querySelector('[data-style] button.on')?.dataset.v || 'points'; }

function harvest(){
  q.forEach(qq=>{
    const card = $('qlist').querySelector('[data-q="'+qq.id+'"]'); if(!card) return;
    qq.prompt = card.querySelector('[data-f="prompt"]').value.trim();
    qq.marks = Math.max(1, Math.min(10, +card.querySelector('[data-f="marks"]').value||1));
    qq.mark_style = styleOf(card);
    const pts = [...card.querySelectorAll('.sp')].map(r=>({ text:r.querySelector('.txt').value.trim(), marks:+r.querySelector('.mk').value||undefined })).filter(p=>p.text);
    const sc = schemes[qq.id] || (schemes[qq.id]={ question_id:qq.id });
    sc.scheme_points = pts;
    sc.model_answer = card.querySelector('[data-f="model"]').value.trim();
    sc.marking_notes = card.querySelector('[data-f="notes"]').value.trim();
  });
}
function updateTotal(){ const t=[...$('qlist').querySelectorAll('[data-f="marks"]')].reduce((s,el)=>s+(+el.value||0),0); const b=$('totBadge'); if(b) b.textContent=t+' mark'+(t===1?'':'s'); }

async function addQuestion(){
  harvest();
  const { data, error } = await sb.from('bank_assessment_questions').insert({ assessment_id: openId, position:q.length, prompt:'', marks:1 }).select().single();
  if(error) return toast('Could not add: '+error.message);
  q.push(data); schemes[data.id]={ question_id:data.id, scheme_points:[], model_answer:'', marking_notes:'' };
  drawQuestions(); renderContextEdit(currentA());
}
async function moveQ(id, dir){
  harvest();
  const i=q.findIndex(x=>x.id===id), j=i+dir; if(i<0||j<0||j>=q.length) return;
  [q[i],q[j]]=[q[j],q[i]]; q.forEach((qq,idx)=>qq.position=idx);
  drawQuestions();
  await Promise.all(q.map(qq=>sb.from('bank_assessment_questions').update({ position:qq.position }).eq('id', qq.id)));
}
async function saveAll(silent){
  const a = currentA(); if(!a) return;
  harvest();
  const patch = {
    title: ($('e_title').value.trim()||'Untitled test'),
    course_id: $('e_course').value,
    topic_id: $('e_topic').value || null,
    status: statusVal(),
    max_attempts_per_question: Math.max(1, Math.min(5, +$('e_att').value||1)),
    max_answer_chars: Math.max(100, Math.min(4000, +$('e_len').value||1200)),
    updated_at: new Date().toISOString(),
  };
  const { error } = await sb.from('bank_assessments').update(patch).eq('id', openId);
  if(error){ toast('Save failed: '+error.message); return; }
  Object.assign(a, patch);
  for(const qq of q){
    await sb.from('bank_assessment_questions').update({ prompt:qq.prompt, marks:qq.marks, mark_style:qq.mark_style, position:qq.position }).eq('id', qq.id);
    const sc = schemes[qq.id]||{ question_id:qq.id, scheme_points:[] };
    await sb.from('bank_assessment_mark_schemes').upsert({ question_id:qq.id, scheme_points:sc.scheme_points||[], model_answer:sc.model_answer||'', marking_notes:sc.marking_notes||'', updated_at:new Date().toISOString() }, { onConflict:'question_id' });
  }
  a._n = q.length; a._m = q.reduce((s,qq)=>s+(+qq.marks||0),0);
  dirty=false; const d=$('dirtyTag'); if(d){ d.textContent='✓ Saved'; d.className='dirty clean'; }
  renderContextEdit(a);
  if(!silent) toast('Saved');
}
function preview(){
  harvest();
  const a = currentA();
  const total = q.reduce((s,qq)=>s+(+qq.marks||0),0);
  const body = q.length ? q.map((qq,i)=>(
    '<div class="pvq"><div style="display:flex;align-items:center;"><b style="color:var(--navy);">Q'+(i+1)+'</b><span style="flex:1;"></span><span class="row-desc">'+qq.marks+' mark'+(qq.marks>1?'s':'')+'</span></div>' +
    '<div class="pp" style="margin-top:6px;">'+esc(qq.prompt||'(no prompt yet)')+'</div>' +
    (qq.image_path?'<img class="thumb" src="'+imgSrc(qq.image_path)+'">':'') +
    '<div class="pvbox">Student types their answer here…</div></div>'
  )).join('') : '<p class="empty-note">No questions yet.</p>';
  const m = modal('<h3>'+esc($('e_title').value||a.title)+'</h3><div class="row-desc" style="margin:-8px 0 14px;">Student preview · '+total+' marks total</div>'+body+'<div class="row end"><button class="btn sm" data-x>Close preview</button></div>', 640);
  m.querySelector('[data-x]').onclick=()=>m.remove();
}
</script>
</body>
</html>
