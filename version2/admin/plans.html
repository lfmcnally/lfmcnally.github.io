<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plans &amp; access — admin — Classicalia</title>
<link rel="icon" type="image/png" href="/images/favicon.png">
<link rel="stylesheet" href="/version2/assets/css/classicalia.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/version2/assets/js/supabase-client.js"></script>
<script src="/version2/assets/js/account-menu.js" defer></script>
<style>
body { background: var(--cream); }
.wrap { max-width: 1000px; margin: 0 auto; padding: 26px 20px 90px; }
.gate { max-width:520px; margin:60px auto; background:var(--paper); border:1px solid var(--rule); border-radius:10px; padding:28px; text-align:center; font-size:15px; line-height:1.6; }
.tabs { display:flex; gap:8px; margin-bottom:18px; }
.tab { font-family:'DM Sans',sans-serif; font-size:13px; font-weight:700; padding:8px 16px; border-radius:8px; border:1px solid var(--rule); background:var(--paper); color:var(--muted); cursor:pointer; }
.tab.on { background:var(--navy); color:#fff; border-color:var(--navy); }
.btn { font-family:'DM Sans',sans-serif; font-size:13px; font-weight:700; padding:8px 14px; border-radius:6px; border:none; background:var(--brand); color:#fff; cursor:pointer; }
.btn:hover { background:#155ee0; }
.btn.ghost { background:var(--paper); color:var(--ink); border:1px solid var(--rule); font-weight:600; }
.btn.ghost:hover { background:var(--cream); }
.btn.danger { background:var(--paper); color:#b91c1c; border:1px solid #fecaca; font-weight:600; }
.btn.sm { font-size:12px; padding:6px 11px; }
.btn.on { background:#2a8a3e; }
input.f, select.f { box-sizing:border-box; font-family:'DM Sans',sans-serif; font-size:14px; padding:8px 11px; border:1.5px solid var(--rule); border-radius:7px; background:var(--paper); color:var(--ink); outline:none; }
input.f:focus, select.f:focus { border-color:var(--brand); }
label.lbl { display:block; font-size:10px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); margin:0 0 5px; }
.searchrow { margin-bottom:14px; }
.searchrow input { width:100%; max-width:420px; }
.card { background:var(--paper); border:1px solid var(--rule); border-radius:10px; padding:14px 16px; margin-bottom:10px; box-shadow:0 1px 2px rgba(14,30,63,.04); }
.row { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
.spacer { flex:1; }
.nm { font-weight:700; color:var(--ink); font-size:14px; }
.em { color:var(--muted); font-size:12px; }
.muted { color:var(--muted); font-size:12.5px; }
.badge { font-size:9.5px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; padding:2px 8px; border-radius:999px; }
.badge.role { background:var(--rule-faint); color:var(--muted); }
.badge.admin { background:#fff7ed; color:#b9650f; }
.badge.comp { background:#eef6ee; color:#2a6e2a; }
.badge.none { background:#f1f5f9; color:#64748b; }
.access-on { color:#2a8a3e; font-weight:700; font-size:12px; }
.access-off { color:var(--muted); font-size:12px; }
.mgr { border-top:1px solid var(--rule-faint); margin-top:12px; padding-top:12px; }
.member { display:flex; align-items:center; gap:10px; padding:6px 0; }
.section-h { font-family:'Lora',serif; font-style:italic; color:var(--navy); font-size:21px; margin:6px 0 14px; }
.hint { font-size:12px; color:var(--muted); line-height:1.5; margin-bottom:16px; }
.modal-bg { position:fixed; inset:0; background:rgba(14,30,63,.45); display:flex; align-items:center; justify-content:center; z-index:200; padding:20px; }
.modal { background:var(--paper); border-radius:12px; padding:22px 24px; width:100%; max-width:440px; box-shadow:0 12px 40px rgba(14,30,63,.25); }
.modal h3 { margin:0 0 14px; font-family:'Lora',serif; font-style:italic; color:var(--navy); font-size:20px; }
.modal .end { display:flex; gap:10px; justify-content:flex-end; margin-top:18px; }
.toast { position:fixed; bottom:18px; left:50%; transform:translateX(-50%); background:var(--navy); color:#fff; font-size:13px; padding:9px 18px; border-radius:8px; opacity:0; transition:opacity .2s; z-index:300; }
.toast.show { opacity:1; }
.hidden { display:none !important; }
</style>
</head>
<body>
<div class="header">
  <canvas class="header-sky" data-starfield data-seed="731" data-region="0.8"></canvas>
  <nav class="nav"><div class="nav-inner">
    <a href="/version2/" class="nav-logo">Classicalia</a>
    <div class="nav-links">
      <a href="/version2/admin/" class="nav-link">Admin</a>
      <a href="/version2/admin/bank.html" class="nav-link">Bank</a>
      <div class="nav-div"></div>
      <div data-account-menu></div>
    </div>
  </div></nav>
  <div class="header-inner">
    <div class="header-eyebrow">Admin &middot; Tiers</div>
    <h1 class="header-title">Plans &amp; access</h1>
    <p class="header-deck">Gift bank access to anyone, and manage schools and their plans — comp now, Stripe later.</p>
  </div>
</div>

<div class="wrap">
  <div id="gate" class="gate hidden"></div>
  <div id="app" class="hidden">
    <div class="tabs">
      <button class="tab on" data-tab="people">People &amp; access</button>
      <button class="tab" data-tab="orgs">Organisations</button>
    </div>
    <div id="people"></div>
    <div id="orgs" class="hidden"></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="/version2/assets/js/starfield.js"></script>
<script>
'use strict';
const sb = window.supabase;
const $ = (id)=>document.getElementById(id);
const esc = (s)=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
let toastT; function toast(m){ const t=$('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2200); }
function modal(html){ const bg=document.createElement('div'); bg.className='modal-bg'; bg.innerHTML='<div class="modal">'+html+'</div>'; document.body.appendChild(bg); bg.addEventListener('click',e=>{ if(e.target===bg) bg.remove(); }); return bg; }

let users=[], access={}, manage={}, orgs=[], members=[], subs=[], plans={}, ledger=[], budgets={};
let peopleTerm='';
const SELF_SERVE_DEFAULT_CAP = 10000000; // £10/mo default (matches mark-test fallback)
const poundsOf = micros => (Number(micros||0)/1000000);

function planFor(kind, id){ return subs.find(s=>s.account_kind===kind && (kind==='user'?s.user_id:s.org_id)===id && s.status==='active'); }
function periodStart(period){ const d=new Date(); if(period==='month') d.setUTCDate(1); else { const dow=(d.getUTCDay()+6)%7; d.setUTCDate(d.getUTCDate()-dow); } d.setUTCHours(0,0,0,0); return d; }
function used(kind, id, period){ const start=periodStart(period||'week').toISOString(); return ledger.filter(r=>r.account_kind===kind && r.account_id===id && r.created_at>=start).reduce((s,r)=>s+Math.max(0,-(+r.delta||0)),0); }

(async function init(){
  const { data: au } = await sb.auth.getUser();
  if(!au?.user){ return gate('Please <a href="/auth/login.html">sign in</a> as an admin.'); }
  const { data: prof } = await sb.from('users').select('is_admin').eq('id', au.user.id).maybeSingle();
  if(!prof?.is_admin){ return gate('This area is for site admins only.'); }
  await loadAll();
  $('app').classList.remove('hidden');
  document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click', ()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on')); t.classList.add('on');
    const on=t.dataset.tab; $('people').classList.toggle('hidden', on!=='people'); $('orgs').classList.toggle('hidden', on!=='orgs');
  }));
  renderPeople(); renderOrgs();
})();

function gate(html){ $('gate').innerHTML='<p>'+html+'</p>'; $('gate').classList.remove('hidden'); }

async function loadAll(){
  const [{ data: us }, { data: acc }, { data: og }, { data: mem }, { data: sb_ }, { data: pl }, { data: led }] = await Promise.all([
    sb.rpc('admin_list_users'),
    sb.from('users').select('id, can_self_serve_bank, can_manage_bank'),
    sb.from('organisations').select('*').order('name'),
    sb.from('org_members').select('*'),
    sb.from('subscriptions').select('*'),
    sb.from('subscription_plans').select('*'),
    sb.from('credit_ledger').select('account_kind, account_id, delta, created_at').gte('created_at', new Date(Date.now()-40*864e5).toISOString()),
  ]);
  users = us || []; orgs = og || []; members = mem || []; subs = sb_ || []; ledger = led || [];
  access = {}; manage = {}; (acc||[]).forEach(u=>{ access[u.id]=!!u.can_self_serve_bank; manage[u.id]=!!u.can_manage_bank; });
  plans = {}; (pl||[]).forEach(p=>plans[p.tier]=p);
  const { data: bud } = await sb.from('weekly_test_budget').select('teacher_id, monthly_cost_cap_micros');
  budgets = {}; (bud||[]).forEach(b=>budgets[b.teacher_id]=b.monthly_cost_cap_micros);
}

// ───────────────────────────── PEOPLE & ACCESS ─────────────────────────────
function renderPeople(){
  const root = $('people');
  const term = peopleTerm.trim().toLowerCase();
  let list = users.slice();
  if(term) list = list.filter(u=>((u.full_name||'')+' '+(u.email||'')).toLowerCase().includes(term));
  list = list.slice(0, 80);
  root.innerHTML =
    '<div class="hint"><b>Assessment permission</b> lets an admin author and view the bank (drafts included). <b>Bank access</b> gives someone unlimited self-study practice (fair use 300 marked assessments/month). <b>Cap</b> is their monthly £ safety backstop (default £10 — well above real use). <b>Gift plan</b> is an optional comp record for later billing.</div>' +
    '<div class="searchrow"><input class="f" id="psearch" placeholder="Search people by name or email…" value="'+esc(peopleTerm)+'"></div>' +
    (list.length? list.map(personRow).join('') : '<div class="card muted">No matching people.</div>');
  const ps=$('psearch'); ps.addEventListener('input', ()=>{ peopleTerm=ps.value; const pos=ps.selectionStart; renderPeople(); const n=$('psearch'); n.focus(); n.setSelectionRange(pos,pos); });
  root.querySelectorAll('[data-toggle]').forEach(b=>b.addEventListener('click', ()=>toggleAccess(b.dataset.toggle)));
  root.querySelectorAll('[data-perm]').forEach(b=>b.addEventListener('click', ()=>togglePerm(b.dataset.perm)));
  root.querySelectorAll('[data-cap]').forEach(b=>b.addEventListener('click', ()=>setCap(b.dataset.cap)));
  root.querySelectorAll('[data-gift]').forEach(b=>b.addEventListener('click', ()=>giftPersonal(b.dataset.gift)));
  root.querySelectorAll('[data-ungift]').forEach(b=>b.addEventListener('click', ()=>removePlan(b.dataset.ungift)));
}
function personRow(u){
  const on = !!access[u.id];
  const mng = !!manage[u.id];
  const sub = planFor('user', u.id);
  const roleBadge = u.is_admin ? '<span class="badge admin">admin</span>' : '<span class="badge role">'+esc(u.role||'student')+'</span>';
  const planBit = sub
    ? '<span class="badge comp">comp · '+sub.credits_per_period+'/'+ (sub.period==='month'?'mo':'wk') +'</span> <button class="btn ghost sm" data-ungift="'+u.id+'">Remove plan</button>'
    : '<button class="btn ghost sm" data-gift="'+u.id+'">Gift plan</button>';
  const capChip = on
    ? '<button class="btn ghost sm" data-cap="'+u.id+'" title="Monthly £ safety cap (COGS backstop)">Cap: £'+(budgets[u.id]!=null?poundsOf(budgets[u.id]):'10')+(budgets[u.id]!=null?'':' · default')+'</button>'
    : '';
  return '<div class="card"><div class="row">' +
    '<div><div class="nm">'+esc(u.full_name||'(no name)')+' '+roleBadge+'</div><div class="em">'+esc(u.email||'')+'</div></div>' +
    '<span class="spacer"></span>' +
    '<button class="btn '+(mng?'on':'ghost')+' sm" data-perm="'+u.id+'" title="Author + view the bank">'+(mng?'✓ Assessment permission':'Give permission')+'</button>' +
    '<button class="btn '+(on?'on':'ghost')+' sm" data-toggle="'+u.id+'">'+(on?'✓ Bank access':'Grant access')+'</button>' +
    capChip +
    planBit +
  '</div></div>';
}
async function toggleAccess(uid){
  const next = !access[uid];
  const { error } = await sb.from('users').update({ can_self_serve_bank: next }).eq('id', uid);
  if(error) return toast('Failed: '+error.message);
  access[uid]=next; renderPeople(); toast(next?'Access granted':'Access removed');
}
async function togglePerm(uid){
  const next = !manage[uid];
  const { error } = await sb.from('users').update({ can_manage_bank: next }).eq('id', uid);
  if(error) return toast('Failed: '+error.message);
  manage[uid]=next; renderPeople(); toast(next?'Assessment permission granted':'Permission removed');
}
function setCap(uid){
  const cur = budgets[uid]!=null ? poundsOf(budgets[uid]) : 10;
  const m = modal('<h3>Monthly safety cap</h3><div class="hint" style="margin-bottom:10px;">The most this account can cost you in AI marking per month. Marking pauses if it’s hit. Default for a personal account is £10 — well above normal use.</div><label class="lbl">Cap (£ / month)</label><input class="f" id="cv" type="number" min="0" step="0.5" value="'+cur+'" style="width:140px;"><div class="end"><button class="btn ghost sm" data-x>Cancel</button><button class="btn sm" id="ok">Save</button></div>');
  const inp=m.querySelector('#cv'); inp.focus(); inp.select();
  m.querySelector('[data-x]').onclick=()=>m.remove();
  m.querySelector('#ok').onclick=async ()=>{
    const pounds = Math.max(0, +inp.value||0); const micros = Math.round(pounds*1000000);
    const { error } = await sb.from('weekly_test_budget').upsert({ teacher_id:uid, monthly_cost_cap_micros:micros, updated_at:new Date().toISOString() }, { onConflict:'teacher_id' });
    if(error) return toast('Failed: '+error.message);
    budgets[uid]=micros; m.remove(); renderPeople(); toast('Safety cap set to £'+pounds+'/mo');
  };
}
async function giftPersonal(uid){
  const credits = plans.personal?.credits_per_period ?? 10;
  const period = plans.personal?.period || 'week';
  const existing = subs.find(s=>s.account_kind==='user' && s.user_id===uid);
  const patch = { account_kind:'user', user_id:uid, tier:'personal', status:'active', credits_per_period:credits, period, note:'comp (gifted by admin)', updated_at:new Date().toISOString() };
  let res;
  if(existing) res = await sb.from('subscriptions').update(patch).eq('id', existing.id).select().single();
  else res = await sb.from('subscriptions').insert(patch).select().single();
  if(res.error) return toast('Failed: '+res.error.message);
  // also ensure they can actually use the bank
  if(!access[uid]){ await sb.from('users').update({ can_self_serve_bank:true }).eq('id', uid); access[uid]=true; }
  subs = subs.filter(s=>s.id!==res.data.id); subs.push(res.data);
  renderPeople(); toast('Comp plan gifted ('+credits+' credits/'+(period==='month'?'mo':'wk')+')');
}
async function removePlan(uid){
  const sub = planFor('user', uid); if(!sub) return;
  if(!confirm('Remove this comp plan? (Bank access stays on.)')) return;
  const { error } = await sb.from('subscriptions').update({ status:'canceled', updated_at:new Date().toISOString() }).eq('id', sub.id);
  if(error) return toast('Failed: '+error.message);
  sub.status='canceled'; renderPeople(); toast('Plan removed');
}

// ───────────────────────────── ORGANISATIONS ─────────────────────────────
let openOrg=null;
function renderOrgs(){
  const root=$('orgs');
  root.innerHTML =
    '<div class="hint">A school shares one weekly allowance across its teachers. Add the teachers, then gift or set its plan. (Teachers’ class assignments draw on the school’s credits once billing is live.)</div>' +
    '<div class="searchrow"><button class="btn sm" id="newOrg">+ New organisation</button></div>' +
    (orgs.length? orgs.map(orgRow).join('') : '<div class="card muted">No organisations yet.</div>');
  $('newOrg').addEventListener('click', newOrg);
  root.querySelectorAll('[data-manage]').forEach(b=>b.addEventListener('click', ()=>{ openOrg = openOrg===b.dataset.manage?null:b.dataset.manage; renderOrgs(); }));
  root.querySelectorAll('[data-renorg]').forEach(b=>b.addEventListener('click', ()=>renameOrg(b.dataset.renorg)));
  root.querySelectorAll('[data-delorg]').forEach(b=>b.addEventListener('click', ()=>deleteOrg(b.dataset.delorg)));
  root.querySelectorAll('[data-addmem]').forEach(b=>b.addEventListener('click', ()=>addMember(b.dataset.addmem)));
  root.querySelectorAll('[data-rmmem]').forEach(b=>b.addEventListener('click', ()=>removeMember(b.dataset.rmmem.split('|')[0], b.dataset.rmmem.split('|')[1])));
  root.querySelectorAll('[data-savesub]').forEach(b=>b.addEventListener('click', ()=>saveOrgPlan(b.dataset.savesub)));
}
function orgRow(o){
  const sub = planFor('org', o.id);
  const memCount = members.filter(m=>m.org_id===o.id).length;
  const planBadge = sub ? '<span class="badge comp">'+esc(sub.tier)+' · '+sub.credits_per_period+'/'+(sub.period==='month'?'mo':'wk')+'</span>' : '<span class="badge none">no plan</span>';
  let body = '<div class="row"><div><div class="nm">'+esc(o.name)+' '+planBadge+'</div><div class="em">'+memCount+' teacher'+(memCount!==1?'s':'')+'</div></div>' +
    '<span class="spacer"></span>' +
    '<button class="btn ghost sm" data-manage="'+o.id+'">'+(openOrg===o.id?'Close':'Manage')+'</button>' +
    '<button class="btn ghost sm" data-renorg="'+o.id+'">Rename</button>' +
    '<button class="btn danger sm" data-delorg="'+o.id+'">Delete</button></div>';
  if(openOrg===o.id) body += orgManager(o, sub);
  return '<div class="card">'+body+'</div>';
}
function orgManager(o, sub){
  const mem = members.filter(m=>m.org_id===o.id).map(m=>{
    const u = users.find(x=>x.id===m.user_id);
    return '<div class="member"><div><div class="nm" style="font-size:13px;">'+esc(u?u.full_name:'(unknown)')+'</div><div class="em">'+esc(u?u.email:m.user_id)+'</div></div><span class="spacer"></span><button class="btn ghost sm" data-rmmem="'+o.id+'|'+m.user_id+'">Remove</button></div>';
  }).join('') || '<div class="muted" style="padding:6px 0;">No teachers yet.</div>';
  const credits = sub?sub.credits_per_period:(plans.school?.credits_per_period ?? 50);
  const status = sub?sub.status:'inactive';
  const period = sub?sub.period:(plans.school?.period||'week');
  const usedN = sub?used('org', o.id, period):0;
  return '<div class="mgr">' +
    '<label class="lbl">Teachers</label>' + mem +
    '<div style="margin-top:8px;"><button class="btn ghost sm" data-addmem="'+o.id+'">+ Add teacher</button></div>' +
    '<div class="mgr" style="border:none;padding-top:14px;"><label class="lbl">Plan</label>' +
      '<div class="row">' +
        '<div><div class="lbl">Credits / week</div><input class="f" id="oc_'+o.id+'" type="number" min="0" style="width:110px;" value="'+credits+'"></div>' +
        '<div><div class="lbl">Status</div><select class="f" id="os_'+o.id+'">'+['active','inactive','past_due','canceled'].map(s=>'<option'+(status===s?' selected':'')+'>'+s+'</option>').join('')+'</select></div>' +
        '<div style="align-self:flex-end;"><button class="btn sm" data-savesub="'+o.id+'">Save plan</button></div>' +
        (sub?'<div style="align-self:flex-end;" class="muted">'+usedN+' / '+credits+' used this period</div>':'') +
      '</div>' +
      '<div class="muted" style="margin-top:6px;">Set status to <b>active</b> to gift the school a comp plan now (Stripe can take it over later).</div>' +
    '</div>' +
  '</div>';
}
function newOrg(){
  const m=modal('<h3>New organisation</h3><label class="lbl">School name</label><input class="f" id="on" placeholder="e.g. St Aidan’s College" style="width:100%;"><div class="end"><button class="btn ghost sm" data-x>Cancel</button><button class="btn sm" id="ok">Create</button></div>');
  const inp=m.querySelector('#on'); inp.focus();
  m.querySelector('[data-x]').onclick=()=>m.remove();
  m.querySelector('#ok').onclick=async ()=>{ const name=inp.value.trim(); if(!name) return toast('Enter a name'); const {data,error}=await sb.from('organisations').insert({name}).select().single(); if(error) return toast('Failed: '+error.message); orgs.push(data); orgs.sort((a,b)=>a.name.localeCompare(b.name)); m.remove(); openOrg=data.id; renderOrgs(); toast('Organisation created'); };
}
function renameOrg(id){
  const o=orgs.find(x=>x.id===id);
  const m=modal('<h3>Rename organisation</h3><input class="f" id="on" value="'+esc(o.name)+'" style="width:100%;"><div class="end"><button class="btn ghost sm" data-x>Cancel</button><button class="btn sm" id="ok">Save</button></div>');
  const inp=m.querySelector('#on'); inp.focus(); inp.select();
  m.querySelector('[data-x]').onclick=()=>m.remove();
  m.querySelector('#ok').onclick=async ()=>{ const name=inp.value.trim(); if(!name) return toast('Enter a name'); const {error}=await sb.from('organisations').update({name}).eq('id',id); if(error) return toast('Failed: '+error.message); o.name=name; m.remove(); renderOrgs(); toast('Renamed'); };
}
async function deleteOrg(id){
  if(!confirm('Delete this organisation, its members and plan?')) return;
  const { error } = await sb.from('organisations').delete().eq('id', id);
  if(error) return toast('Failed: '+error.message);
  orgs=orgs.filter(o=>o.id!==id); members=members.filter(m=>m.org_id!==id); subs=subs.filter(s=>s.org_id!==id); if(openOrg===id) openOrg=null;
  renderOrgs(); toast('Organisation deleted');
}
function addMember(orgId){
  const taken = new Set(members.filter(m=>m.org_id===orgId).map(m=>m.user_id));
  const cand = users.filter(u=>!taken.has(u.id) && (u.is_admin || u.role==='teacher' || true)); // any user can be added as a teacher
  const m=modal('<h3>Add teacher</h3><label class="lbl">Find by name or email</label><input class="f" id="mf" list="ulist" placeholder="type to search…" style="width:100%;"><datalist id="ulist">'+cand.map(u=>'<option value="'+esc((u.email||u.full_name||u.id))+'">'+esc(u.full_name||'')+'</option>').join('')+'</datalist><div class="end"><button class="btn ghost sm" data-x>Cancel</button><button class="btn sm" id="ok">Add</button></div>');
  const inp=m.querySelector('#mf'); inp.focus();
  m.querySelector('[data-x]').onclick=()=>m.remove();
  m.querySelector('#ok').onclick=async ()=>{
    const v=inp.value.trim().toLowerCase(); const u=cand.find(x=>(x.email||'').toLowerCase()===v || (x.full_name||'').toLowerCase()===v || x.id===v);
    if(!u) return toast('No matching user');
    const {data,error}=await sb.from('org_members').insert({ org_id:orgId, user_id:u.id, role:'teacher' }).select().single();
    if(error) return toast('Failed: '+error.message);
    members.push(data); m.remove(); renderOrgs(); toast('Teacher added');
  };
}
async function removeMember(orgId, userId){
  const { error } = await sb.from('org_members').delete().eq('org_id', orgId).eq('user_id', userId);
  if(error) return toast('Failed: '+error.message);
  members = members.filter(m=>!(m.org_id===orgId && m.user_id===userId)); renderOrgs(); toast('Removed');
}
async function saveOrgPlan(orgId){
  const credits = Math.max(0, +$('oc_'+orgId).value||0);
  const status = $('os_'+orgId).value;
  const existing = subs.find(s=>s.account_kind==='org' && s.org_id===orgId && s.status!=='canceled') || subs.find(s=>s.account_kind==='org' && s.org_id===orgId);
  const patch = { account_kind:'org', org_id:orgId, tier:'school', status, credits_per_period:credits, period:(plans.school?.period||'week'), note:'comp (gifted by admin)', updated_at:new Date().toISOString() };
  let res;
  if(existing) res = await sb.from('subscriptions').update(patch).eq('id', existing.id).select().single();
  else res = await sb.from('subscriptions').insert(patch).select().single();
  if(res.error) return toast('Failed: '+res.error.message);
  subs = subs.filter(s=>s.id!==res.data.id); subs.push(res.data);
  renderOrgs(); toast('Plan saved');
}
</script>
