<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assessment bank — Classicalia</title>
<link rel="icon" type="image/png" href="/images/favicon.png">
<link rel="stylesheet" href="/version2/assets/css/classicalia.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/version2/assets/js/supabase-client.js"></script>
<script src="/version2/assets/js/account-menu.js" defer></script>
<style>
body { background: var(--cream); }
.wrap { max-width: 760px; margin: 0 auto; padding: 28px 20px 90px; }
.gate { max-width: 520px; margin: 60px auto; background: var(--paper); border: 1px solid var(--rule); border-radius: 10px; padding: 28px; text-align: center; font-size: 15px; line-height: 1.6; }
.card { background: var(--paper); border: 1px solid var(--rule); border-radius: 10px; padding: 18px 20px; margin-bottom: 14px; box-shadow: 0 1px 2px rgba(14,30,63,.04); }
.row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.spacer { flex: 1; }
.tt { font-family: 'Lora', serif; font-style: italic; font-weight: 700; font-size: 18px; color: var(--navy); }
.muted { color: var(--muted); font-size: 12.5px; }
.section-h { font-family:'Lora',serif; font-style:italic; color:var(--navy); margin: 22px 0 10px; font-size: 20px; }
label.lbl { display: block; font-size: 10.5px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); margin: 0 0 5px; }
select.f, input.f { font-family: 'DM Sans', sans-serif; font-size: 14px; padding: 9px 11px; border: 1.5px solid var(--rule); border-radius: 7px; background: var(--paper); color: var(--ink); outline: none; }
.qprompt { font-size: 15px; color: var(--ink); line-height: 1.5; }
.qmarks { font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); }
.qimg { max-width: 100%; border-radius: 8px; border: 1px solid var(--rule); margin: 10px 0; }
textarea.f { width: 100%; font-family: 'DM Sans', sans-serif; font-size: 15px; padding: 11px 13px; border: 1.5px solid var(--rule); border-radius: 8px; resize: vertical; min-height: 70px; color: var(--ink); outline: none; }
textarea.f:focus { border-color: var(--brand); }
textarea.f:disabled { background: var(--cream); color: var(--muted); }
.btn { font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 700; padding: 11px 20px; border-radius: 7px; border: none; background: var(--brand); color: #fff; cursor: pointer; }
.btn:hover { background: #155ee0; }
.btn:disabled { background: var(--rule); color: var(--muted); cursor: default; }
.btn.ghost { background: var(--paper); color: var(--ink); border: 1px solid var(--rule); }
.btn.dark { background: var(--navy); }
.btn.sm { font-size: 12.5px; padding: 7px 13px; }
.fb { margin-top: 12px; padding: 12px 15px; border-radius: 9px; border: 1px solid var(--rule); font-size: 13.5px; line-height: 1.5; }
.fb.good { background: #ecfdf3; border-color: #a7f3d0; color: #15803d; }
.fb.part { background: #fffbeb; border-color: #fde68a; color: #92500e; }
.fb.zero { background: #fef2f2; border-color: #fecaca; color: #b91c1c; }
.fb.info { background: #eff6ff; border-color: #bfdbfe; color: #1e40af; }
.total { font-family: 'Lora', serif; font-style: italic; font-weight: 700; font-size: 30px; color: var(--navy); }
.ans { margin-top: 6px; font-size: 14px; color: var(--ink); }
.ans .lab { color: var(--muted); font-size: 12px; }
.markpill { float: right; font-family: 'Lora', serif; font-style: italic; font-weight: 700; font-size: 18px; }
.spin { display: inline-block; width: 18px; height: 18px; border: 3px solid rgba(255,255,255,.4); border-top-color: #fff; border-radius: 50%; animation: spin .8s linear infinite; vertical-align: -3px; margin-right: 8px; }
@keyframes spin { to { transform: rotate(360deg); } }
.pill { display:inline-block; font-size:9.5px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; padding:2px 8px; border-radius:999px; background: var(--rule-faint); color: var(--muted); }
/* folder explorer */
.bank-search { position:relative; display:flex; align-items:center; max-width:480px; margin-bottom:6px; }
.bank-search .si { position:absolute; left:12px; width:16px; height:16px; color:var(--muted); pointer-events:none; }
.bank-search input { width:100%; box-sizing:border-box; padding:10px 34px; border:1px solid var(--rule); border-radius:8px; font-family:'DM Sans',sans-serif; font-size:13px; color:var(--ink); background:var(--paper); outline:none; }
.bank-search input:focus { border-color:var(--brand); }
.bank-search .sx { position:absolute; right:10px; background:none; border:none; cursor:pointer; color:var(--muted); font-size:18px; line-height:1; padding:2px 4px; display:none; }
.bank-search .sx.on { display:block; }
.crumbs { display:flex; align-items:center; gap:7px; flex-wrap:wrap; font-size:13px; margin:12px 0 14px; }
.crumb { color:var(--brand); cursor:pointer; font-weight:700; background:none; border:none; padding:0; font-family:'DM Sans',sans-serif; font-size:13px; }
.crumb:hover { text-decoration:underline; }
.crumb.cur { color:var(--ink); cursor:default; } .crumb.cur:hover { text-decoration:none; }
.crumb-sep { color:var(--muted); }
.grid-cards { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:13px; }
.fcard { position:relative; border:1px solid var(--rule); border-radius:12px; padding:15px; background:var(--paper); cursor:pointer; transition:border-color .12s, box-shadow .12s, transform .06s; display:flex; flex-direction:column; gap:9px; box-shadow:0 1px 2px rgba(14,30,63,.04); }
.fcard:hover { border-color:var(--brand); box-shadow:0 5px 16px rgba(14,30,63,.09); }
.fcard:active { transform:translateY(1px); }
.fcard.notclick { cursor:default; } .fcard.notclick:hover { border-color:var(--rule); box-shadow:0 1px 2px rgba(14,30,63,.04); transform:none; }
.fic { width:40px; height:40px; border-radius:10px; display:flex; align-items:center; justify-content:center; }
.fic svg { width:22px; height:22px; }
.fic.subject { background:#fef3e8; color:#b9650f; } .fic.folder { background:#eef4ff; color:var(--brand); }
.fic.topic { background:#eef6ee; color:#2a6e2a; } .fic.sub { background:#f1f5f9; color:#64748b; } .fic.test { background:#f6f1fb; color:#7c3aed; }
.fname { font-family:'Lora',serif; font-style:italic; font-weight:700; font-size:15px; color:var(--navy); line-height:1.25; word-break:break-word; }
.fsub { font-size:11.5px; color:var(--muted); }
.factions { display:flex; gap:8px; flex-wrap:wrap; margin-top:2px; }
.fstatus { position:absolute; top:12px; right:12px; }
.hidden { display: none !important; }
/* result report */
.correct { margin-top: 6px; font-size: 14px; color: #15803d; }
.correct .lab { color: var(--muted); font-size: 12px; }
.errs { list-style: none; margin: 8px 0 0; padding: 0; display: flex; flex-direction: column; gap: 4px; }
.errs .err { font-size: 12.5px; line-height: 1.4; padding: 4px 9px; border-radius: 6px; border-left: 3px solid; }
.errs .err.serious { background: #fef2f2; border-color: #dc2626; color: #991b1b; }
.errs .err.minor { background: #fffbeb; border-color: #d97706; color: #92500e; }
.concepts { margin-top: 9px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.concepts .ck { font-size: 9.5px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); }
.ctag { font-size: 11.5px; font-weight: 600; color: #5b3aa6; background: #f3eefb; border: 1px solid #e4d9f7; border-radius: 999px; padding: 3px 10px; }
.revise { background: #fbf7ee; border: 1px solid #ecdcb8; border-radius: 10px; padding: 14px 16px; margin-bottom: 14px; }
.revise .rh { font-weight: 700; color: #8a5a12; }
.revise .rc { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 8px; }
.revise .rc span { font-size: 12px; font-weight: 600; color: #8a5a12; background: #fff; border: 1px solid #ecdcb8; border-radius: 999px; padding: 4px 11px; }
.revise .rc b { color: #b9650f; }
.errs .err .et { font-weight: 700; letter-spacing: .04em; text-transform: uppercase; font-size: 9.5px; margin-right: 6px; }
.print-head { display: none; }
.rep-head { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; flex-wrap: wrap; border-bottom: 2px solid var(--navy); padding-bottom: 10px; margin-bottom: 16px; }
.rep-head .rh-title { font-family: 'Lora', serif; font-style: italic; font-weight: 700; font-size: 22px; color: var(--navy); }
.rep-head .rh-score { font-family: 'Lora', serif; font-style: italic; font-weight: 700; font-size: 22px; color: var(--brand); }
@media print {
  .header, .nav, .btn, .no-print, .module-tabs, .footer { display: none !important; }
  body { background: #fff; color: #111; }
  .wrap { max-width: 100%; padding: 0; }
  .print-head { display: block !important; border-bottom: 2px solid #0e1e3f; padding-bottom: 8px; margin-bottom: 16px; }
  .print-head .ph-brand { font-family: 'Lora', serif; font-style: italic; font-weight: 700; font-size: 18px; color: #0e1e3f; }
  .print-head .ph-meta { font-size: 12px; color: #555; margin-top: 2px; }
  .card { box-shadow: none; border: 1px solid #ddd; break-inside: avoid; page-break-inside: avoid; margin-bottom: 10px; }
  .total { color: #0e1e3f !important; }
}
/* App shell + sidebar nav live in classicalia.css; only the page background is page-local. */
body { background: #f4f6fa; }
</style>
</head>
<body>
<!-- APP SHELL -->
<div class="app">
  <aside class="sidebar" data-tracking-nav data-role="auto" data-active="bank" data-seed="719"></aside>
  <script src="/version2/assets/js/tracking-nav.js"></script>
  <main class="main">
    <header class="topbar">
      <div class="crumbs" id="topbarTitle"><b>Assessment bank</b></div>
      <div class="top-actions"><div data-account-menu></div></div>
    </header>

<div class="wrap">
  <div id="gate" class="gate hidden"></div>
  <div id="home" class="hidden"></div>
  <div id="take" class="hidden"></div>
</div>
  </main>
</div>

<!-- assign modal -->
<div id="assignModal" class="hidden" style="position:fixed;inset:0;background:rgba(14,30,63,.4);display:flex;align-items:center;justify-content:center;z-index:50;">
  <div class="card" style="max-width:420px;width:92%;">
    <div class="tt" id="assignTitle" style="margin-bottom:10px;"></div>
    <label class="lbl">Class</label>
    <select id="assignClass" class="f" style="width:100%;margin-bottom:12px;"></select>
    <label class="lbl">Due date (optional)</label>
    <input id="assignDue" class="f" type="datetime-local" style="width:100%;margin-bottom:14px;">
    <div class="row"><span class="spacer"></span><button class="btn ghost sm" id="assignCancel">Cancel</button><button class="btn sm" id="assignGo">Assign</button></div>
  </div>
</div>

<script src="/version2/assets/js/starfield.js"></script>
<script>
'use strict';
const sb = window.supabase;
const $ = (id)=>document.getElementById(id);
const esc = (s)=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function imgSrc(path){ if(!path) return ''; if(/^https?:\/\//.test(path)||path.startsWith('/')) return path; return sb.storage.from('weekly-test-images').getPublicUrl(path).data.publicUrl; }
const draftKey = (sid)=>'bank-draft-'+sid;

let me_id=null, myName='Student', canSelfServe=false, myClasses=[], ownedClasses=[];
let courses=[], topics=[], assessments=[], assignments=[];
let studentChapter=0;   // furthest Latin-to-GCSE chapter my classes have reached
let canManageBank=false;
// A browse item is visible if it has no chapter ceiling, I'm within it, or I can
// manage the bank. Assigned tests bypass this (they don't go through here).
const visibleToMe = a => canManageBank || !(a.grammar_ceiling>0) || a.grammar_ceiling<=studentChapter;
let viewIsTeacher=false, myWeakConcepts=[];
let path = { subject:null, level:null, courseId:null, topicId:null, subId:null };

const SUBJECTS = ['classical-civilisation','latin','greek'];
const SUBJECT_LABEL = { 'classical-civilisation':'Classical Civilisation', 'latin':'Latin', 'greek':'Greek' };
const LEVELS = [['gcse','GCSE'],['alevel','A-Level'],['ks3','KS3']];
const subjLabel = s => SUBJECT_LABEL[s] || s;
const lvlLabel  = l => (LEVELS.find(x=>x[0]===l)||[l,l])[1];
const norm = s => String(s||'').toLowerCase().replace(/[^a-z0-9 ]/g,'');
const FIC = {
  subject:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18"/><path d="M5 21V10m4 11V10m6 11V10m4 11V10"/><path d="M3 10h18"/><path d="M12 3 3 7v3h18V7z"/></svg>',
  folder:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h3.6a2 2 0 0 1 1.4.6L11.8 7H19a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>',
  file:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/><path d="M14 3v5h5"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="13" y2="17"/></svg>',
};
const topTopicsOf = cid => topics.filter(t=>t.course_id===cid && !t.parent_id);
const subTopicsOf = tid => topics.filter(t=>t.parent_id===tid);
const courseById  = id => courses.find(c=>c.id===id);
const topicById   = id => topics.find(t=>t.id===id);
const inCourse = cid => assessments.filter(a=>a.course_id===cid && visibleToMe(a));
const inTopic  = tid => assessments.filter(a=>a.topic_id===tid && visibleToMe(a));
const moduleTests = cid => assessments.filter(a=>a.course_id===cid && !a.topic_id && visibleToMe(a));
const topicTestCount = tid => inTopic(tid).length + subTopicsOf(tid).reduce((s,st)=>s+inTopic(st.id).length,0);

(async function init(){
  const { data: au } = await sb.auth.getUser();
  if(!au?.user){ return gate('Please <a href="/auth/login.html">sign in</a> to use the assessment bank.'); }
  me_id = au.user.id;
  const { data: prof } = await sb.from('users').select('full_name, can_self_serve_bank, can_manage_bank').eq('id', me_id).maybeSingle();
  canSelfServe = !!prof?.can_self_serve_bank;
  const canManage = !!prof?.can_manage_bank; canManageBank = canManage;
  myName = (prof?.full_name || '').trim() || (au.user.email || 'Student');

  const { data: cls } = await sb.from('v2_classes').select('*');
  myClasses = cls || [];
  ownedClasses = myClasses.filter(c=>c.teacher_id===me_id);
  // Furthest chapter any of my classes has reached (gates the browse).
  myClasses.filter(c=>c.teacher_id!==me_id).forEach(c=>{ if((c.grammar_chapter||0) > studentChapter) studentChapter = c.grammar_chapter; });

  const [{ data: cs }, { data: ts }, { data: as }] = await Promise.all([
    sb.from('bank_courses').select('*').order('subject').order('position'),
    sb.from('bank_topics').select('*').order('position'),
    sb.from('bank_assessments').select('*').eq('status','published'),
  ]);
  courses = cs||[]; topics = ts||[];
  // Hide auto-generated practice sets from the browse catalogue entirely.
  assessments = (as||[]).filter(a=>!a.is_practice);

  // test sizes for the catalogue cards (questions + marks)
  const aids = assessments.map(a=>a.id);
  if(aids.length){
    const { data: qcs } = await sb.from('bank_assessment_questions').select('assessment_id, marks').in('assessment_id', aids);
    const agg={}; (qcs||[]).forEach(r=>{ const x=agg[r.assessment_id]||(agg[r.assessment_id]={n:0,m:0}); x.n++; x.m+=(r.marks||0); });
    assessments.forEach(a=>{ a._n=agg[a.id]?.n||0; a._m=agg[a.id]?.m||0; });
  }

  // assignments visible to me (students see open ones for their classes)
  const { data: asg } = await sb.from('bank_class_assignments').select('*').eq('status','open');
  assignments = asg || [];

  // concepts to revise — most-flagged grammar nuggets across my marked work
  try {
    const { data: ev } = await sb.from('student_nugget_events').select('nugget_id, grammar_nuggets(title)').eq('student_id', me_id).eq('correct', false);
    const counts={}; (ev||[]).forEach(e=>{ const tt=e.grammar_nuggets&&e.grammar_nuggets.title; if(tt) counts[tt]=(counts[tt]||0)+1; });
    myWeakConcepts = Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,8);
  } catch(_e){ myWeakConcepts = []; }

  // Interim access lock: the bank is open to entitled accounts (admins + anyone
  // granted access), plus students who actually have a test assigned to them.
  const studentClassIds = myClasses.filter(c=>c.teacher_id!==me_id).map(c=>c.id);
  const hasAssignment = assignments.some(a=>studentClassIds.includes(a.class_id));
  if(!canSelfServe && !canManage && !hasAssignment){
    return gate('The assessment bank isn’t open to your account yet. If you think it should be, please <a href="mailto:lawrencefmcnally@gmail.com">get in touch</a>.');
  }

  renderHome();
})();

function gate(html){ $('gate').innerHTML='<p>'+html+'</p>'; $('gate').classList.remove('hidden'); }
function show(which){ ['home','take'].forEach(id=>$(id).classList.toggle('hidden', id!==which)); }

function renderHome(){
  show('home');
  viewIsTeacher = ownedClasses.length>0;
  const studentClassIds = myClasses.filter(c=>c.teacher_id!==me_id).map(c=>c.id);
  const myAssignments = assignments.filter(a=>studentClassIds.includes(a.class_id));
  const assignedOnly = new URLSearchParams(location.search).get('view')==='assigned';

  const assignedCard = (a)=>{
    const ass = assessments.find(x=>x.id===a.assessment_id);
    const title = ass ? ass.title : 'Assessment';
    return '<div class="card"><div class="row" data-asg="'+a.id+'" data-ass="'+a.assessment_id+'" style="cursor:pointer;">' +
      '<div><div class="tt">'+esc(title)+'</div><div class="muted">'+(a.due_at?('Due '+new Date(a.due_at).toLocaleString()):'No due date')+'</div></div>' +
      '<span class="spacer"></span><span class="btn ghost sm">Open →</span></div></div>';
  };

  // Focused "Assigned Assessment" view — just what a teacher has set for you.
  if(assignedOnly){
    let h = '<div class="section-h">Set for you</div>';
    if(myAssignments.length){
      h += myAssignments.map(assignedCard).join('');
    } else {
      h += '<div class="card" style="text-align:center;"><div class="muted" style="padding:8px 4px;">No assessments assigned to you right now. When a teacher sets one, it’ll appear here.</div></div>';
    }
    h += '<div style="margin-top:16px;"><a class="btn ghost sm" href="/version2/tracking/bank.html">Browse the bank →</a></div>';
    $('home').innerHTML = h;
    $('home').querySelectorAll('[data-asg]').forEach(r=>r.addEventListener('click',()=>startAssignment(r.dataset.asg, r.dataset.ass)));
    return;
  }

  let html = '';
  if(myAssignments.length){
    html += '<div class="section-h">Set for you</div>';
    html += myAssignments.map(assignedCard).join('');
  }

  if(myWeakConcepts.length){
    html += '<div class="revise"><div class="rh">Concepts to revise</div><div class="muted" style="margin-top:2px;">Where your translation marks have slipped most — worth a recap.</div>'+
      '<div class="rc">'+myWeakConcepts.map(([t,n])=>'<span>'+esc(t)+' <b>×'+n+'</b></span>').join('')+'</div></div>';
  }

  html += '<div class="section-h">Browse the bank</div>';
  if(canSelfServe) html += '<div class="card" style="background:#eef6ee;border-color:#cfe8cf;margin-bottom:14px;"><div class="nm" style="color:#2a6e2a;">Unlimited practice ✓</div><div class="muted" style="margin-top:2px;">Pick any test below and mark yourself instantly — as often as you like. Fair use: up to 300 marked assessments a month.</div></div>';
  html += '<div class="bank-search"><svg class="si" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="8.5" cy="8.5" r="5.5"/><line x1="13" y1="13" x2="17" y2="17"/></svg>' +
      '<input id="bsearch" placeholder="Search every test…" autocomplete="off"><button class="sx" id="bclear">&times;</button></div>' +
    '<nav class="crumbs" id="crumbs"></nav><div id="grid"></div>';
  $('home').innerHTML = html;

  $('home').querySelectorAll('[data-asg]').forEach(r=>r.addEventListener('click',()=>startAssignment(r.dataset.asg, r.dataset.ass)));
  $('bsearch').addEventListener('input', renderGrid);
  $('bclear').addEventListener('click', ()=>{ $('bsearch').value=''; renderGrid(); $('bsearch').focus(); });
  $('grid').addEventListener('click', onGridClick);
  renderGrid();
}

// ─────────────── folder explorer (read-only) ───────────────
function fcard(tint, ic, name, sub, dataAttr){ return '<div class="fcard" '+dataAttr+'><div class="fic '+tint+'">'+ic+'</div><div class="fname">'+esc(name)+'</div><div class="fsub">'+esc(sub)+'</div></div>'; }
function sizeOf(a){ return a._n ? (a._n+' question'+(a._n!==1?'s':'')+' · '+a._m+' mark'+(a._m!==1?'s':'')) : ''; }
function testActs(a){
  const acts = [];
  if(viewIsTeacher) acts.push('<button class="btn ghost sm" data-assign="'+a.id+'">Assign to class</button>');
  if(canSelfServe) acts.push('<button class="btn sm" data-take="'+a.id+'">Test yourself →</button>');
  if(!acts.length) acts.push('<span class="muted">assigned tests only</span>');
  return acts.join('');
}
function testCard(a){
  const meta = sizeOf(a);
  return '<div class="fcard notclick"><div class="fic test">'+FIC.file+'</div><div class="fname">'+esc(a.title)+'</div>'+(meta?'<div class="fsub">'+esc(meta)+'</div>':'')+'<div class="factions">'+testActs(a)+'</div></div>';
}
const pl = (n,w)=> n+' '+w+(n!==1?'s':'');
function cards(h){ return '<div class="grid-cards">'+h+'</div>'; }
function secH(t){ return '<div class="section-h" style="font-size:13px;margin:16px 0 8px;">'+esc(t)+'</div>'; }

function renderGrid(){
  const raw = ($('bsearch')?.value||'').trim();
  $('bclear')?.classList.toggle('on', !!raw);
  if(raw) return renderSearch(raw);
  renderCrumbs();
  const g = $('grid');
  if(path.subId)    return g.innerHTML = inTopic(path.subId).length ? cards(inTopic(path.subId).map(testCard).join('')) : '<div class="card muted">No tests here yet.</div>';
  if(path.topicId)  return renderTopicInside(g);
  if(path.courseId) return renderModuleInside(g);
  if(path.level)    return renderModules(g);
  if(path.subject)  return renderLevels(g);
  return renderSubjects(g);
}
function renderSubjects(g){
  const items = SUBJECTS.filter(s=>courses.some(c=>c.subject===s && inCourse(c.id).length));
  if(!items.length) return g.innerHTML='<div class="card muted">No published assessments yet.</div>';
  g.innerHTML = cards(items.map(s=>{
    const n = courses.filter(c=>c.subject===s).reduce((x,c)=>x+inCourse(c.id).length,0);
    return fcard('subject', FIC.subject, subjLabel(s), pl(n,'test'), 'data-go-subject="'+s+'"');
  }).join(''));
}
function renderLevels(g){
  const items = LEVELS.filter(L=>courses.some(c=>c.subject===path.subject && (c.level||'gcse')===L[0] && inCourse(c.id).length));
  g.innerHTML = cards(items.map(L=>{
    const n = courses.filter(c=>c.subject===path.subject && (c.level||'gcse')===L[0]).reduce((x,c)=>x+inCourse(c.id).length,0);
    return fcard('folder', FIC.folder, L[1], pl(n,'test'), 'data-go-level="'+L[0]+'"');
  }).join('')) || (g.innerHTML='<div class="card muted">Nothing here yet.</div>');
}
function renderModules(g){
  const mods = courses.filter(c=>c.subject===path.subject && (c.level||'gcse')===path.level && inCourse(c.id).length);
  g.innerHTML = cards(mods.map(c=>fcard('folder', FIC.folder, c.title, pl(inCourse(c.id).length,'test'), 'data-go-course="'+c.id+'"')).join(''));
}
function renderModuleInside(g){
  const c = courseById(path.courseId); if(!c){ path.courseId=null; return renderGrid(); }
  const tops = topTopicsOf(c.id).filter(t=>topicTestCount(t.id));
  const direct = moduleTests(c.id);
  let html='';
  if(tops.length) html += secH('Topics') + cards(tops.map(t=>fcard('topic', FIC.folder, t.title, pl(topicTestCount(t.id),'test'), 'data-go-topic="'+t.id+'"')).join(''));
  if(direct.length) html += secH('Tests in this module') + cards(direct.map(testCard).join(''));
  g.innerHTML = html || '<div class="card muted">No published tests in this module yet.</div>';
}
function renderTopicInside(g){
  const t = topicById(path.topicId); if(!t){ path.topicId=null; return renderGrid(); }
  const subs = subTopicsOf(t.id).filter(st=>inTopic(st.id).length);
  const whole = inTopic(t.id);
  let html='';
  if(subs.length) html += secH('Subtopics') + cards(subs.map(st=>fcard('sub', FIC.folder, st.title, pl(inTopic(st.id).length,'test'), 'data-go-sub="'+st.id+'"')).join(''));
  if(whole.length) html += secH('Whole-topic tests') + cards(whole.map(testCard).join(''));
  g.innerHTML = html || '<div class="card muted">No published tests in this topic yet.</div>';
}
function locText(a){
  const c=courseById(a.course_id); let s=c?(subjLabel(c.subject)+' · '+lvlLabel(c.level||'gcse')+' · '+c.title):'';
  const t=topicById(a.topic_id); if(t){ if(t.parent_id){ const p=topicById(t.parent_id); s+=' › '+(p?p.title:'?')+' › '+t.title; } else s+=' › '+t.title; }
  return s;
}
function renderSearch(raw){
  const query=norm(raw);
  const c=$('crumbs'); c.innerHTML='<button class="crumb" id="chome">Home</button><span class="crumb-sep">/</span><span class="crumb cur">Search “'+esc(raw)+'”</span>';
  $('chome').addEventListener('click', ()=>{ $('bsearch').value=''; renderGrid(); });
  const hits = assessments.filter(a=>visibleToMe(a) && norm(a.title+' '+locText(a)).includes(query));
  const g=$('grid');
  g.innerHTML = hits.length ? cards(hits.map(a=>
    '<div class="fcard notclick"><div class="fic test">'+FIC.file+'</div><div class="fname">'+esc(a.title)+'</div><div class="fsub">'+esc(locText(a))+(sizeOf(a)?(' · '+sizeOf(a)):'')+'</div><div class="factions">'+testActs(a)+'</div></div>'
  ).join('')) : '<div class="card muted">No tests match “'+esc(raw)+'”.</div>';
}
function renderCrumbs(){
  const parts=[['Home',()=>{ path={subject:null,level:null,courseId:null,topicId:null,subId:null}; renderGrid(); }]];
  if(path.subject) parts.push([subjLabel(path.subject),()=>{ path.level=path.courseId=path.topicId=path.subId=null; renderGrid(); }]);
  if(path.level) parts.push([lvlLabel(path.level),()=>{ path.courseId=path.topicId=path.subId=null; renderGrid(); }]);
  if(path.courseId){ const c=courseById(path.courseId); parts.push([c?c.title:'?',()=>{ path.topicId=path.subId=null; renderGrid(); }]); }
  if(path.topicId){ const t=topicById(path.topicId); parts.push([t?t.title:'?',()=>{ path.subId=null; renderGrid(); }]); }
  if(path.subId){ const s=topicById(path.subId); parts.push([s?s.title:'?',null]); }
  const c=$('crumbs'); c.innerHTML='';
  parts.forEach((p,i)=>{ const last=i===parts.length-1; const b=document.createElement('button'); b.className='crumb'+(last?' cur':''); b.textContent=p[0]; if(!last&&p[1]) b.addEventListener('click',p[1]); c.appendChild(b); if(!last){ const s=document.createElement('span'); s.className='crumb-sep'; s.textContent='/'; c.appendChild(s); } });
}
function onGridClick(e){
  let el;
  if((el=e.target.closest('[data-take]'))){ e.stopPropagation(); return startSelfServe(el.dataset.take); }
  if((el=e.target.closest('[data-assign]'))){ e.stopPropagation(); return openAssign(el.dataset.assign); }
  if((el=e.target.closest('[data-go-subject]'))){ path={subject:el.dataset.goSubject,level:null,courseId:null,topicId:null,subId:null}; return renderGrid(); }
  if((el=e.target.closest('[data-go-level]'))){ path.level=el.dataset.goLevel; path.courseId=path.topicId=path.subId=null; return renderGrid(); }
  if((el=e.target.closest('[data-go-course]'))){ path.courseId=el.dataset.goCourse; path.topicId=path.subId=null; return renderGrid(); }
  if((el=e.target.closest('[data-go-topic]'))){ path.topicId=el.dataset.goTopic; path.subId=null; return renderGrid(); }
  if((el=e.target.closest('[data-go-sub]'))){ path.subId=el.dataset.goSub; return renderGrid(); }
}

// ─────────────── teacher: assign to class ───────────────
let assignId=null;
function openAssign(assessmentId){
  assignId = assessmentId;
  const ass = assessments.find(a=>a.id===assessmentId);
  $('assignTitle').textContent = 'Assign: '+(ass?ass.title:'');
  $('assignClass').innerHTML = ownedClasses.map(c=>'<option value="'+c.id+'">'+esc(c.name)+'</option>').join('');
  $('assignModal').classList.remove('hidden');
}
$('assignCancel').addEventListener('click',()=>$('assignModal').classList.add('hidden'));
$('assignGo').addEventListener('click', async ()=>{
  const class_id = $('assignClass').value;
  const due = $('assignDue').value ? new Date($('assignDue').value).toISOString() : null;
  const { error } = await sb.from('bank_class_assignments').upsert(
    { class_id, assessment_id: assignId, teacher_id: me_id, status:'open', due_at: due },
    { onConflict:'class_id,assessment_id' }
  );
  $('assignModal').classList.add('hidden');
  if(error) return alert('Could not assign: '+error.message);
  alert('Assigned. Students in that class will see it in their bank.');
});

// ─────────────── start a take (self-serve / assignment) ───────────────
async function startSelfServe(assessmentId){
  // resume an in-progress attempt, else create one
  let { data: sub } = await sb.from('weekly_test_submissions')
    .select('*').eq('bank_assessment_id', assessmentId).eq('student_id', me_id).is('submitted_at', null).maybeSingle();
  if(!sub){
    const ins = await sb.from('weekly_test_submissions').insert({ source_kind:'self_serve', bank_assessment_id: assessmentId, student_id: me_id }).select().single();
    if(ins.error) return alert('Could not start: '+ins.error.message); sub = ins.data;
  }
  loadTake(sub, assessmentId);
}
async function startAssignment(assignmentId, assessmentId){
  let { data: sub } = await sb.from('weekly_test_submissions')
    .select('*').eq('assignment_id', assignmentId).eq('student_id', me_id).maybeSingle();
  if(!sub){
    const ins = await sb.from('weekly_test_submissions').insert({ source_kind:'assignment', assignment_id: assignmentId, student_id: me_id }).select().single();
    if(ins.error) return alert('Could not start: '+ins.error.message); sub = ins.data;
  }
  loadTake(sub, assessmentId);
}

async function loadTake(sub, assessmentId){
  const ass = assessments.find(a=>a.id===assessmentId) || { title:'Assessment' };
  const { data: qs } = await sb.from('bank_assessment_questions').select('id,position,prompt,marks,image_path,mark_style').eq('assessment_id', assessmentId).order('position');
  const questions = qs||[];
  const { data: ans } = await sb.from('weekly_test_answers').select('*').eq('submission_id', sub.id);
  const answers={}; (ans||[]).forEach(a=>answers[a.question_id]=a);
  show('take');
  if(sub.submitted_at){
    const results = questions.map(q=>{ const a=answers[q.id]; return { question_id:q.id, status: a&&a.attempts>0?'marked':'blank', marks: a?a.final_marks:0, max:q.marks, rationale: a?a.ai_rationale:null, correct: a?a.ai_correct:null, errors: a&&Array.isArray(a.ai_matched)?a.ai_matched:null, concepts: a&&Array.isArray(a.ai_concepts)?a.ai_concepts:null }; });
    renderReport(ass, questions, answers, results, sub);
  } else {
    renderTake(ass, sub, questions, answers);
  }
}

function renderTake(ass, sub, questions, answers){
  const totalMarks = questions.reduce((s,q)=>s+q.marks,0);
  let draft={}; try{ draft=JSON.parse(localStorage.getItem(draftKey(sub.id))||'{}'); }catch(e){}
  $('take').innerHTML =
    '<button class="btn ghost sm no-print" id="back" style="margin-bottom:12px;">← Back to bank</button>' +
    '<h2 class="tt" style="font-size:24px;">'+esc(ass.title)+'</h2>' +
    '<p class="muted" style="margin-bottom:14px;">'+questions.length+' questions · '+totalMarks+' marks. Answer them, then submit once to get your marks.</p>' +
    questions.map((q,i)=>{
      const saved = (answers[q.id]&&answers[q.id].answer_text)||draft[q.id]||'';
      return '<div class="card" data-q="'+q.id+'">' +
        '<div class="row"><span class="qmarks">Q'+(i+1)+'</span><span class="spacer"></span><span class="qmarks">'+q.marks+' mark'+(q.marks>1?'s':'')+'</span></div>' +
        '<div class="qprompt" style="margin-top:6px;">'+esc(q.prompt)+'</div>' +
        (q.image_path?('<img class="qimg" src="'+imgSrc(q.image_path)+'" alt="source image">'):'') +
        '<textarea class="f" data-input="'+q.id+'" placeholder="Your answer…">'+esc(saved)+'</textarea>' +
      '</div>';
    }).join('') +
    '<div class="card" style="text-align:center;"><button class="btn dark" id="submit">Submit &amp; get my marks</button>' +
      '<div class="muted" style="margin-top:8px;">You can\'t change your answers once you submit.</div>' +
      '<div class="fb hidden" id="submitFb"></div></div>';
  $('back').addEventListener('click', renderHome);
  $('take').querySelectorAll('[data-input]').forEach(ta=>ta.addEventListener('input',()=>{
    draft[ta.dataset.input]=ta.value; try{ localStorage.setItem(draftKey(sub.id), JSON.stringify(draft)); }catch(e){}
  }));
  $('submit').addEventListener('click', ()=>submitTake(ass, sub, questions));
}

async function submitTake(ass, sub, questions){
  const inputs = [...$('take').querySelectorAll('[data-input]')];
  const payloadAnswers = inputs.map(ta=>({ question_id: ta.dataset.input, answer_text: ta.value.trim() }));
  const answered = payloadAnswers.filter(a=>a.answer_text).length;
  const fb = $('submitFb');
  if(answered===0){ fb.className='fb info'; fb.classList.remove('hidden'); fb.textContent='Write at least one answer before submitting.'; return; }
  if(answered<questions.length && !confirm((questions.length-answered)+' question(s) are blank. Submit anyway?')) return;
  const btn=$('submit'); btn.disabled=true; btn.innerHTML='<span class="spin"></span>Marking your paper…';
  fb.className='fb info'; fb.classList.remove('hidden'); fb.textContent='This can take up to a minute — please wait.';
  inputs.forEach(ta=>ta.disabled=true);
  const { data, error } = await sb.functions.invoke('mark-test', { body: { submission_id: sub.id, answers: payloadAnswers } });
  if(error){
    let msg='Could not mark — please try again.'; try{ const j=await error.context.json(); if(j&&(j.error||j.message)) msg=j.error||j.message; }catch(_){}
    btn.disabled=false; btn.textContent='Submit & get my marks'; inputs.forEach(ta=>ta.disabled=false);
    fb.className='fb zero'; fb.textContent=msg; return;
  }
  try{ localStorage.removeItem(draftKey(sub.id)); }catch(e){}
  const ansMap={}; payloadAnswers.forEach(a=>ansMap[a.question_id]={ answer_text:a.answer_text });
  renderReport(ass, questions, ansMap, data.results||[], { submitted_at:new Date().toISOString() }, data);
}

function errBits(errors){
  if(!Array.isArray(errors)||!errors.length) return '';
  const items = errors.map(e=>{
    e = String(e);
    const sev = /^serious:/i.test(e) ? 'serious' : (/^minor:/i.test(e) ? 'minor' : 'minor');
    const txt = e.replace(/^(serious|minor):\s*/i,'');
    if(!txt) return '';
    return '<li class="err '+sev+'"><span class="et">'+(sev==='serious'?'Serious':'Minor')+'</span>'+esc(txt)+'</li>';
  }).join('');
  return items ? '<ul class="errs">'+items+'</ul>' : '';
}
function conceptTags(concepts){
  if(!Array.isArray(concepts)||!concepts.length) return '';
  return '<div class="concepts"><span class="ck">Relates to</span>'+concepts.map(c=>'<span class="ctag">'+esc(c)+'</span>').join('')+'</div>';
}
function renderReport(ass, questions, answers, results, sub, meta){
  const byId={}; results.forEach(r=>byId[r.question_id]=r);
  const total = (meta&&meta.total_awarded!=null)?meta.total_awarded:results.reduce((s,r)=>s+(r.marks||0),0);
  const totalMarks = (meta&&meta.total_marks!=null)?meta.total_marks:questions.reduce((s,q)=>s+q.marks,0);
  const paused = meta&&meta.paused;
  const when = sub.submitted_at ? new Date(sub.submitted_at).toLocaleString() : new Date().toLocaleString();
  const summary = (meta&&meta.summary) || sub.ai_summary || '';
  const focus = (meta&&meta.focus) || (Array.isArray(sub.ai_focus)?sub.ai_focus:[]) || [];
  sub.ai_summary = summary; sub.ai_focus = focus;   // so the PDF picks them up
  $('take').innerHTML =
    '<div class="row no-print" style="margin-bottom:12px;"><button class="btn ghost sm" id="back">← Back to bank</button><span class="spacer"></span><button class="btn sm" id="pdf">Download summary (PDF)</button></div>' +
    '<div class="print-head"><div class="ph-brand">Classicalia · Assessment summary</div><div class="ph-meta">'+esc(ass.title)+' · '+esc(when)+' · Marked by AI</div></div>' +
    '<div class="rep-head no-print"><div class="rh-title">'+esc(ass.title)+'</div><div class="rh-score">'+total+' / '+totalMarks+'</div></div>' +
    '<div class="muted no-print" style="margin:-8px 0 14px;">'+esc(when)+(paused?' · some answers couldn\'t be marked this time':'')+'</div>' +
    ((summary||focus.length)?('<div class="card no-print" style="margin-bottom:16px;">'+
      (summary?'<div style="font-size:14.5px;color:var(--ink);line-height:1.55;">'+esc(summary)+'</div>':'')+
      (focus.length?'<div class="concepts" style="margin-top:'+(summary?'11px':'0')+';"><span class="ck">Work on</span>'+focus.map(c=>'<span class="ctag">'+esc(c)+'</span>').join('')+'</div>':'')+
    '</div>'):'') +
    '<div class="section-h no-print" style="font-size:15px;margin:4px 0 8px;">Question by question</div>' +
    questions.map((q,i)=>{
      const r = byId[q.id]||{ status:'blank', marks:0, max:q.marks };
      const a = (answers[q.id]&&answers[q.id].answer_text)||'';
      const isTr = q.mark_style==='translation';
      let cls='info', mark='—';
      if(r.status==='marked'){ mark=(r.marks==null?'—':r.marks)+' / '+q.marks; cls=r.marks>=q.marks?'good':(r.marks>0?'part':'zero'); }
      else if(r.status==='blank'){ mark='0 / '+q.marks; cls='zero'; }
      const note = r.status==='blank'?'You left this blank.':r.status==='paused'?'Not marked this time.':r.status==='error'?'Couldn\'t mark this automatically.':(r.rationale||'');
      return '<div class="card"><span class="markpill" style="color:'+(cls==='good'?'#15803d':cls==='part'?'#92500e':cls==='zero'?'#b91c1c':'#1e40af')+'">'+mark+'</span>' +
        '<span class="qmarks">Q'+(i+1)+'</span>' +
        '<div class="qprompt" style="margin-top:6px;">'+esc(q.prompt)+'</div>' +
        (a?('<div class="ans"><span class="lab">Your answer:</span> '+esc(a)+'</div>'):'<div class="ans muted">No answer given.</div>') +
        (isTr && r.correct ? '<div class="correct"><span class="lab">Correct translation:</span> '+esc(r.correct)+'</div>' : '') +
        (isTr ? errBits(r.errors) : '') +
        (note?('<div class="fb '+cls+'" style="margin-top:8px;">'+esc(note)+'</div>'):'') +
        (isTr ? conceptTags(r.concepts) : '') +
      '</div>';
    }).join('');
  $('back').addEventListener('click', renderHome);
  $('pdf').addEventListener('click', ()=>buildReportDoc(ass, questions, answers, results, sub));
}

// Build a proper standalone PDF document (not a screenshot of the page).
function buildReportDoc(ass, questions, answers, results, sub){
  const byId={}; results.forEach(r=>byId[r.question_id]=r);
  const total = results.reduce((s,r)=>s+(r.marks||0),0);
  const totalMarks = questions.reduce((s,q)=>s+q.marks,0);
  const pc = totalMarks ? Math.round(100*total/totalMarks) : 0;
  const when = new Date(sub.submitted_at || Date.now()).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});
  const course = courseById(ass.course_id);
  const t = topicById(ass.topic_id);
  let topicPath = '';
  if(t){ if(t.parent_id){ const p=topicById(t.parent_id); topicPath = (p?p.title+' › ':'')+t.title; } else topicPath = t.title; }
  const subjLine = course ? (subjLabel(course.subject)+' · '+lvlLabel(course.level||'gcse')+' · '+course.title) : '';

  // counts + "to review" list
  let nFull=0, nPart=0, nReview=0; const review=[];
  questions.forEach((q,i)=>{
    const r = byId[q.id]; const m = r&&r.status==='marked'?(r.marks||0):0;
    if(r&&r.status==='marked'&&m>=q.marks) nFull++;
    else if(m>0){ nPart++; review.push({i:i+1,q,r}); }
    else { nReview++; review.push({i:i+1,q,r}); }
  });
  const verdict = pc>=80 ? 'a strong result — keep it up.' : pc>=50 ? 'a solid effort with a few things to tighten up.' : 'a good start — the points below are where to focus next.';

  const stripSev = e => String(e).replace(/^(serious|minor):\s*/i,'');
  const isSerious = e => /^serious:/i.test(String(e));
  const qDetail = (q,i) => {
    const r = byId[q.id]||{status:'blank',marks:0};
    const a = (answers[q.id]&&answers[q.id].answer_text)||'';
    const isTr = q.mark_style==='translation';
    let mk='—'; if(r.status==='marked') mk=(r.marks==null?'—':r.marks)+' / '+q.marks; else if(r.status==='blank') mk='0 / '+q.marks;
    const errs = isTr && Array.isArray(r.errors) && r.errors.length
      ? '<div class="errlab">What cost marks</div><ul class="errs">'+r.errors.map(e=>'<li class="'+(isSerious(e)?'sev':'min')+'"><b>'+(isSerious(e)?'Serious':'Minor')+':</b> '+esc(stripSev(e))+'</li>').join('')+'</ul>'
      : '';
    const note = r.status==='blank'?'You left this blank.':r.status==='paused'?'Not marked this time.':r.status==='error'?'Could not be marked automatically.':(r.rationale||'');
    return '<div class="q">'+
      '<div class="qtop"><span class="qn">Q'+i+'</span><span class="qmk">'+mk+'</span></div>'+
      '<div class="qp">'+esc(q.prompt)+'</div>'+
      '<div class="ln"><span class="k">Your answer</span>'+(a?esc(a):'<em>— none —</em>')+'</div>'+
      (isTr && r.correct ? '<div class="ln correct"><span class="k">Correct translation</span>'+esc(r.correct)+'</div>' : '')+
      errs+
      (note?'<div class="fbk">'+esc(note)+'</div>':'')+
      (isTr && Array.isArray(r.concepts) && r.concepts.length ? '<div class="ctags"><span class="ctk">Relates to</span>'+r.concepts.map(c=>'<span class="ct">'+esc(c)+'</span>').join('')+'</div>' : '')+
    '</div>';
  };

  const reviewList = review.length
    ? '<ul class="review">'+review.map(x=>'<li><b>Q'+x.i+':</b> '+esc((x.r&&x.r.rationale)|| (x.r&&x.r.status==='blank'?'Left blank.':'To review.'))+'</li>').join('')+'</ul>'
    : '<p class="allgood">Full marks — nothing to review. Excellent work!</p>';
  const overall = sub.ai_summary || '';
  const focusList = Array.isArray(sub.ai_focus) ? sub.ai_focus : [];
  const focusBlock = (overall?'<p style="margin:0 0 10px;font-size:13px;color:#374151;line-height:1.55;">'+esc(overall)+'</p>':'') +
    (focusList.length?'<div class="ctags" style="margin:0 0 12px;"><span class="ctk">Work on</span>'+focusList.map(c=>'<span class="ct">'+esc(c)+'</span>').join('')+'</div>':'');

  const html =
  '<!DOCTYPE html><html><head><meta charset="utf-8"><title>'+esc(ass.title)+' — summary</title>'+
  '<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>'+
  '<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,600;0,700;1,600;1,700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">'+
  '<style>'+
  '*{box-sizing:border-box;} body{font-family:"DM Sans",sans-serif;color:#1b2333;margin:0;padding:32px 36px;font-size:13px;line-height:1.5;}'+
  '.head{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:3px solid #0e1e3f;padding-bottom:12px;}'+
  '.brand{font-family:"Lora",serif;font-style:italic;font-weight:700;font-size:20px;color:#0e1e3f;}'+

  '.errs li.sev{background:#fef2f2;border-color:#dc2626;color:#991b1b;} .errs li.min{background:#fffbeb;border-color:#d97706;color:#92500e;}'+
  '.fbk{margin-top:8px;padding:9px 12px;background:#eef6ee;border:1px solid #cfe8cf;border-radius:8px;font-size:12.5px;color:#225c2b;}'+

  '@media print{body{padding:0;} @page{margin:16mm;}}'+
  '</style></head><body>'+
  '<div class="head"><div class="brand">Classicalia<small>Assessment summary</small></div>'+
