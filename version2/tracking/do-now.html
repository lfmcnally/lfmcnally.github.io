<style>
.dn-wrap { max-width: 880px; margin: 0 auto; padding: 32px 24px 80px; }
.dn-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 22px; }
.dn-tab { font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; color: var(--muted);
  background: var(--cream); border: 1px solid var(--rule); border-radius: 999px; padding: 8px 16px; cursor: pointer; }
.dn-tab.active { background: var(--navy); color: white; border-color: var(--navy); }
.dn-card { background: var(--paper); border: 1px solid var(--rule); border-radius: 12px; padding: 22px 24px; margin-bottom: 18px; }
.dn-card-head { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
.dn-card-title { font-family: 'Lora', serif; font-style: italic; font-weight: 700; font-size: 19px; color: var(--navy); }
.dn-status { font-size: 12px; color: var(--muted); }
.dn-controls { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
.dn-select { min-width: 240px; padding: 9px 11px; border: 1px solid var(--rule); border-radius: 7px; font-family: inherit; font-size: 14px; background: var(--cream); color: var(--navy); }
.dn-btn { font-family: inherit; font-size: 13px; font-weight: 700; padding: 10px 16px; border-radius: 7px; border: 1px solid var(--rule); background: white; color: var(--ink); cursor: pointer; }
.dn-btn:hover { border-color: var(--navy); }
.dn-btn-primary { background: var(--brand); color: white; border-color: var(--brand); }
.dn-btn-primary:hover { opacity: 0.9; border-color: var(--brand); }
.dn-btn-danger { color: #dc2626; }
.dn-btn-project { color: var(--brand); border-color: var(--brand); }
.dn-sublabel { font-size: 10px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin: 20px 0 10px; }
.dn-subs { display: flex; flex-wrap: wrap; gap: 9px 20px; }
.dn-subs label { font-size: 13.5px; color: var(--ink); display: flex; align-items: center; gap: 7px; cursor: pointer; }
.dn-subs input { accent-color: var(--brand); width: 15px; height: 15px; }
.dn-empty { background: var(--paper); border: 1px solid var(--rule); border-radius: 12px; padding: 28px; text-align: center; color: var(--muted); font-size: 14px; line-height: 1.6; }
.dn-empty a { color: var(--brand); font-weight: 700; }

/* live results table */
.dn-sum-head { display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
.dn-sum-label { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; }
.dn-sum-meta { font-size: 11px; color: var(--muted); }
.dn-sum-meta button { font-family: inherit; font-size: 11px; font-weight: 600; color: var(--brand); background: none; border: none; cursor: pointer; padding: 0; }
.dn-totals { display: flex; gap: 30px; flex-wrap: wrap; align-items: baseline; margin-bottom: 12px; }
.dn-totals .n { font-size: 26px; font-weight: 700; }
.dn-table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
.dn-table th { padding: 4px 8px; color: var(--muted); font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; text-align: left; border-bottom: 1px solid var(--rule-faint); font-weight: 700; }
.dn-table td { padding: 5px 8px; }

/* class view / live leaderboard */
#classView { position: fixed; inset: 0; z-index: 500; background: var(--navy); color: white; display: none; flex-direction: column; }
#classView.open { display: flex; }
.lb-sky { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
#classView > .lb-top, #classView > .lb-totals, #classView > .lb-list { position: relative; z-index: 1; }
.lb-top { display: flex; justify-content: space-between; align-items: center; gap: 16px; padding: 20px 34px; border-bottom: 1px solid rgba(255,255,255,0.12); flex-wrap: wrap; }
.lb-title { font-family: 'Lora', serif; font-style: italic; font-weight: 700; font-size: 26px; line-height: 1.1; }
.lb-sub { font-size: 13px; color: #8fa8cc; margin-top: 3px; }
.lb-controls { display: flex; gap: 10px; flex-wrap: wrap; }
.lb-btn { font-family: inherit; font-size: 13px; font-weight: 700; padding: 10px 18px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.25); background: rgba(255,255,255,0.08); color: white; cursor: pointer; }
.lb-btn:hover { background: rgba(255,255,255,0.16); }
.lb-btn-stop { background: #dc2626; border-color: #dc2626; }
.lb-btn-stop:hover { background: #b91c1c; }
.lb-vol { width: 90px; accent-color: #6ba0ff; cursor: pointer; vertical-align: middle; }
.lb-btn.is-on { background: #1A6FFF; border-color: #1A6FFF; }
.lb-totals { padding: 14px 34px 4px; font-size: 14px; color: #8fa8cc; }
.lb-totals b { color: white; font-size: 18px; }
.lb-list { flex: 1; overflow-y: auto; padding: 14px 34px 34px; }
.lb-row { display: flex; align-items: center; gap: 20px; padding: 14px 20px; margin-bottom: 11px; background: rgba(255,255,255,0.06); border-radius: 12px; transition: transform 0.6s cubic-bezier(.2,.8,.2,1), background 0.3s; }
.lb-rank { font-family: 'Lora', serif; font-weight: 700; font-size: 26px; width: 48px; text-align: center; color: #6ba0ff; flex-shrink: 0; }
.lb-name { flex: 1; font-size: 21px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.lb-score { font-family: 'Lora', serif; font-weight: 700; font-size: 30px; min-width: 48px; text-align: right; }
.lb-meta { font-size: 12.5px; color: #8fa8cc; width: 130px; text-align: right; flex-shrink: 0; }
.lb-row.top1 { background: linear-gradient(90deg, rgba(107,160,255,0.28), rgba(107,160,255,0.08)); }
.lb-row.top1 .lb-rank { color: #ffd766; }
.lb-row.notin { opacity: 0.5; }
.lb-row.notin .lb-score { color: #8fa8cc; font-size: 16px; font-family: inherit; font-weight: 600; }

/* game-mode projection (reuses .lb-* row styles) */
#gameView { position: fixed; inset: 0; z-index: 600; background: radial-gradient(circle at 50% -10%, #1b3160, var(--navy) 60%); color: #fff; display: none; flex-direction: column; }
#gameView.open { display: flex; }
#gameView > .lb-top, #gameView > .gv-join, #gameView > .lb-list { position: relative; z-index: 1; }
#gameView .lb-title { color: #ffd766; }
.gv-join { padding: 10px 34px; font-size: 16px; color: #cfe0ff; }
.gv-join b { color: #ffd766; }
.gv-xp { font-family: 'Lora', serif; font-weight: 700; font-size: 26px; color: #ffd766; flex-shrink: 0; }
.lb-row.top1 .gv-xp, .lb-row.top2 .gv-xp, .lb-row.top3 .gv-xp { color: #ffe9a8; }
</style>

<script>
// Use window.supabase directly — the supabase-js UMD bundle already
// occupies the global `supabase`, so a top-level `const supabase` here
// collides ("already declared") and stops the whole script.
const sb = window.supabase;
let classes = [], currentClassIdx = 0, activeClass = null, myId = null;
let doNowPoll = null, doNowChannel = null, doNowDebounce = null;
let dngChannel = null;   // game-mode leaderboard realtime channel
let dngPoll = null;      // game-mode leaderboard polling fallback
let gameViewOpen = false, gvClass = null;
let classViewOpen = false, lbRows = new Map(), lbClass = null, lbSky = null;
let lbSort = 'correct';   // 'correct' (most correct) or 'accuracy' (highest %)

function escapeHtml(s){ return String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function timeAgo(iso){ if(!iso) return ''; const ms=Date.now()-new Date(iso).getTime(); const m=Math.floor(ms/60000); if(m<1) return 'just now'; if(m<60) return m+'m ago'; const h=Math.floor(m/60); if(h<24) return h+'h ago'; return new Date(iso).toLocaleDateString('en-GB',{day:'numeric',month:'short'}); }
function civSubtopicsOf(topicId){ const t=((window.CivQuiz&&window.CivQuiz.topics)||[]).find(x=>x.id===topicId); if(!t) return []; const seen=[]; for(const q of t.questions) if(!seen.includes(q.subtopic)) seen.push(q.subtopic); return seen; }

async function init(){
  const area = document.getElementById('classArea');
  area.innerHTML = '<div class="dn-empty">Loading your classes…</div>';
  let user = null;
  try { const { data } = await sb.auth.getUser(); user = data && data.user; } catch (_e) {}
  if (!user) { area.innerHTML = '<div class="dn-empty">You need to be signed in as a teacher. <a href="/auth/login.html">Sign in</a>.</div>'; return; }
  myId = user.id;
  try { await loadClasses(user.id); }
  catch (e) { area.innerHTML = '<div class="dn-empty">Couldn\'t load the Do Now page.<br><span style="font-size:12px;">' + escapeHtml((e && e.message) || e || '') + '</span></div>'; }
}

// Class types that support a Do Now, mapped to the vocab_list their sessions
// are logged under. Civ classes drill a quiz topic; Latin classes drill a
// chapter range of the J282 defined vocabulary.
const DO_NOW_TYPES = { 'civ-gcse': 'civ-myth-religion', 'latin-gcse': 'latin-gcse', 'latin-prep': 'latin-suburani' };

async function loadClasses(myId){
  const area = document.getElementById('classArea');
  const { data, error } = await sb.from('v2_classes').select('id, name, type, teacher_id').order('created_at', { ascending: true });
  if (error) throw error;
  // Only classes this teacher *owns* can have a Do Now set on them. RLS also
  // lets a teacher see classes they're a member of (e.g. a test class), so
  // filter those out — otherwise "Set Do Now" fails the v2_do_now WITH CHECK.
  const rows = (data || []).filter(c => DO_NOW_TYPES[c.type] && (!myId || c.teacher_id === myId));
  if (!rows.length) { area.innerHTML = '<div class="dn-empty">No classes that can run a Do Now yet.<br>Create a GCSE Latin or Myth &amp; Religion class on your <a href="/version2/tracking/teacher.html">teacher dashboard</a>, then come back here.</div>'; return; }
  classes = [];
  for (const c of rows) {
    let members = [];
    try { const { data } = await sb.from('v2_class_members').select('student_id, users:student_id (full_name, email)').eq('class_id', c.id); members = data || []; } catch (_e) {}
    const students = members.map(m => ({ id: m.student_id, name: (m.users && m.users.full_name) || ((m.users && m.users.email) || '').split('@')[0] || 'Student' }));
    classes.push({ id: c.id, name: c.name, type: c.type, vocabList: DO_NOW_TYPES[c.type], students });
  }
  const wanted = new URLSearchParams(location.search).get('class');
  let startIdx = classes.findIndex(c => c.id === wanted);
  if (startIdx < 0) startIdx = 0;
  currentClassIdx = startIdx;
  renderClassTabs();
  renderClass(startIdx);
}

function renderClassTabs(){
  const el = document.getElementById('classTabs'); el.innerHTML = '';
  classes.forEach((c, i) => {
    const b = document.createElement('button');
    b.className = 'dn-tab' + (i === currentClassIdx ? ' active' : '');
    b.textContent = c.name + ' (' + c.students.length + ')';
    b.addEventListener('click', () => { currentClassIdx = i; renderClassTabs(); renderClass(i); });
    el.appendChild(b);
  });
}

function dnKind(cls){ return (cls.type === 'latin-gcse' || cls.type === 'latin-prep') ? 'latin' : 'civ'; }
// The vocab datasets are top-level `const`s in their data files — global
// lexical bindings, NOT window properties — so reference them by name. The
// dataset is chosen by the class's vocab_list (GCSE J282 vs. Suburani).
function latinVocab(vocabList){
  if (vocabList === 'latin-suburani') return (typeof VOCAB_SUBURANI !== 'undefined') ? VOCAB_SUBURANI : [];
  return (typeof VOCAB_LATIN_GCSE !== 'undefined') ? VOCAB_LATIN_GCSE : [];
}
function latinMaxChapter(vocabList){ return latinVocab(vocabList).reduce((m, w) => (typeof w.chapter === 'number' && w.chapter > m) ? w.chapter : m, 1); }
// Sub-label under the Do Now controls, per vocab list.
function latinSetupLabel(vocabList){
  return vocabList === 'latin-suburani'
    ? 'Suburani Book 1 &middot; vocabulary &middot; multiple choice'
    : 'OCR GCSE Latin (J282) &middot; defined vocabulary &middot; multiple choice';
}

function renderClass(idx){
  currentClassIdx = idx; activeClass = classes[idx];
  const cls = activeClass;
  if (doNowPoll) { clearInterval(doNowPoll); doNowPoll = null; }
  if (doNowChannel) { try { sb.removeChannel(doNowChannel); } catch (_e) {} doNowChannel = null; }

  if (dnKind(cls) === 'latin') renderLatinSetup(cls);
  else renderCivSetup(cls);

  refreshDoNow(cls);
  try {
    doNowChannel = sb.channel('donow-' + cls.id)
      .on('postgres_changes', { event: '*', schema: 'public', table: 'vocab_sessions' }, () => scheduleDoNowRefresh(cls))
      .subscribe();
  } catch (_e) {}
  doNowPoll = setInterval(() => refreshDoNow(cls), 10000);
}

function renderCivSetup(cls){
  const topics = (window.CivQuiz && window.CivQuiz.topics) || [];
  const area = document.getElementById('classArea');
  area.innerHTML = `
    <div class="dn-card">
      <div class="dn-card-head"><span class="dn-card-title">Set today's Do Now</span><span id="dnStatus" class="dn-status"></span></div>
      <div class="dn-controls">
        <select id="dnTopic" class="dn-select"></select>
        <button id="dnSet" class="dn-btn dn-btn-primary" type="button">Set as today's Do Now</button>
        <button id="dnClear" class="dn-btn" type="button">Stop &amp; show results</button>
        <button id="dnSave" class="dn-btn" type="button">Save results</button>
        <button id="dnReset" class="dn-btn dn-btn-danger" type="button">Clear</button>
        <button id="dnProject" class="dn-btn dn-btn-project" type="button">Class view ↗</button>
      </div>
      <div class="dn-sublabel">Subtopics (leave all ticked for the whole topic)</div>
      <div id="dnSubs" class="dn-subs"></div>
    </div>
    <div class="dn-card"><div id="dnSummary"></div></div>
    <div class="dn-card" id="dnArchiveCard" style="display:none;"><div class="dn-card-head"><span class="dn-card-title">Past Do Nows</span></div><div id="dnArchive"></div></div>`;

  const sel = document.getElementById('dnTopic');
  topics.forEach(t => { const o = document.createElement('option'); o.value = t.id; o.textContent = 'Topic ' + t.id + ' — ' + t.title; sel.appendChild(o); });

  function renderSubs(topicId, checkedSet){
    const box = document.getElementById('dnSubs'); box.innerHTML = '';
    civSubtopicsOf(topicId).forEach(label => {
      const wrap = document.createElement('label');
      const cb = document.createElement('input');
      cb.type = 'checkbox'; cb.value = label; cb.checked = !checkedSet || checkedSet.has(label);
      wrap.appendChild(cb); wrap.appendChild(document.createTextNode(' ' + label));
      box.appendChild(wrap);
    });
  }

  (async () => {
    let current = null;
    try { const { data } = await sb.from('v2_do_now').select('topic_id, subtopics, active, updated_at').eq('class_id', cls.id).maybeSingle(); current = data; } catch (_e) {}
    const initialTopic = (current && current.active && current.topic_id && topics.some(t => t.id === current.topic_id)) ? current.topic_id : (topics[0] && topics[0].id);
    if (initialTopic) sel.value = initialTopic;
    const checkedSet = (current && current.active && Array.isArray(current.subtopics) && current.subtopics.length) ? new Set(current.subtopics) : null;
    renderSubs(initialTopic, checkedSet);
    const status = document.getElementById('dnStatus');
    if (current && current.active) { status.textContent = 'Active — set ' + timeAgo(current.updated_at); status.style.color = '#059669'; }
    else { status.textContent = 'Not set'; }
  })();

  sel.addEventListener('change', () => renderSubs(sel.value, null));

  document.getElementById('dnSet').addEventListener('click', async () => {
    const status = document.getElementById('dnStatus');
    const subs = Array.from(document.querySelectorAll('#dnSubs input:checked')).map(i => i.value);
    if (!subs.length) { status.textContent = 'Tick at least one subtopic.'; status.style.color = '#dc2626'; return; }
    const allSubs = subs.length === civSubtopicsOf(sel.value).length;
    const payload = { class_id: cls.id, vocab_list: 'civ-myth-religion', topic_id: sel.value, subtopics: allSubs ? null : subs, active: true, updated_at: new Date().toISOString() };
    status.textContent = 'Saving…'; status.style.color = 'var(--muted)';
    const { error } = await sb.from('v2_do_now').upsert(payload, { onConflict: 'class_id' });
    if (error) { status.textContent = 'Could not save: ' + error.message; status.style.color = '#dc2626'; return; }
    status.textContent = 'Active — just now'; status.style.color = '#059669';
    refreshDoNow(cls);
  });
  document.getElementById('dnClear').addEventListener('click', () => doNowStop(cls));
  document.getElementById('dnReset').addEventListener('click', () => doNowClear(cls));
  document.getElementById('dnSave').addEventListener('click', () => archiveDoNowManual(cls));
  document.getElementById('dnProject').addEventListener('click', () => openClassView(cls));
  renderDoNowArchive(cls);
  mountGamePanel(cls);
}

// ── Latin: drill a chapter range of the GCSE defined vocabulary ──
function renderLatinSetup(cls){
  const area = document.getElementById('classArea');
  const maxCh = latinMaxChapter(cls.vocabList);
  area.innerHTML = `
    <div class="dn-card">
      <div class="dn-card-head"><span class="dn-card-title">Set today's Do Now</span><span id="dnStatus" class="dn-status"></span></div>
      <div class="dn-controls">
        <label style="font-size:13px;color:var(--muted);font-weight:600;">Chapter</label>
        <select id="dnChFrom" class="dn-select" style="min-width:78px;"></select>
        <label style="font-size:13px;color:var(--muted);">to</label>
        <select id="dnChTo" class="dn-select" style="min-width:78px;"></select>
        <button id="dnSet" class="dn-btn dn-btn-primary" type="button">Set as today's Do Now</button>
        <button id="dnClear" class="dn-btn" type="button">Stop &amp; show results</button>
        <button id="dnSave" class="dn-btn" type="button">Save results</button>
        <button id="dnReset" class="dn-btn dn-btn-danger" type="button">Clear</button>
        <button id="dnProject" class="dn-btn dn-btn-project" type="button">Class view ↗</button>
      </div>
      <div class="dn-sublabel">${latinSetupLabel(cls.vocabList)}</div>
      <div id="dnWordCount" class="dn-status"></div>
    </div>
    <div class="dn-card"><div id="dnSummary"></div></div>
    <div class="dn-card" id="dnArchiveCard" style="display:none;"><div class="dn-card-head"><span class="dn-card-title">Past Do Nows</span></div><div id="dnArchive"></div></div>`;

  const fromSel = document.getElementById('dnChFrom');
  const toSel   = document.getElementById('dnChTo');
  for (let i = 1; i <= maxCh; i++) {
    const a = document.createElement('option'); a.value = String(i); a.textContent = String(i); fromSel.appendChild(a);
    const b = document.createElement('option'); b.value = String(i); b.textContent = String(i); toSel.appendChild(b);
  }
  fromSel.value = '1'; toSel.value = '1';

  function chaptersInRange(){
    const lo = Math.min(+fromSel.value, +toSel.value), hi = Math.max(+fromSel.value, +toSel.value);
    const out = []; for (let i = lo; i <= hi; i++) out.push(i); return out;
  }
  function updateCount(){
    const set = new Set(chaptersInRange());
    const n = latinVocab(cls.vocabList).filter(w => w.chapter > 0 && set.has(w.chapter)).length;
    document.getElementById('dnWordCount').textContent = n + ' word' + (n !== 1 ? 's' : '') + ' in this range';
  }
  fromSel.addEventListener('change', updateCount);
  toSel.addEventListener('change', updateCount);
  updateCount();

  (async () => {
    let current = null;
    try { const { data } = await sb.from('v2_do_now').select('topic_id, subtopics, active, updated_at').eq('class_id', cls.id).maybeSingle(); current = data; } catch (_e) {}
    if (current && current.active && Array.isArray(current.subtopics) && current.subtopics.length) {
      const chs = current.subtopics.map(Number).filter(n => n >= 1 && n <= maxCh);
      if (chs.length) { fromSel.value = String(Math.min(...chs)); toSel.value = String(Math.max(...chs)); }
    } else if (current && current.active && current.subtopics == null) {
      fromSel.value = '1'; toSel.value = String(maxCh);
    }
    updateCount();
    const status = document.getElementById('dnStatus');
    if (current && current.active) { status.textContent = 'Active — set ' + timeAgo(current.updated_at); status.style.color = '#059669'; }
    else { status.textContent = 'Not set'; }
  })();

  document.getElementById('dnSet').addEventListener('click', async () => {
    const status = document.getElementById('dnStatus');
    const chs = chaptersInRange();
    const lo = chs[0], hi = chs[chs.length - 1];
    const allCh = lo === 1 && hi === maxCh;
    const label = lo === hi ? ('Chapter ' + lo) : ('Chapters ' + lo + '–' + hi);
    const payload = { class_id: cls.id, vocab_list: cls.vocabList, topic_id: label, subtopics: allCh ? null : chs, active: true, updated_at: new Date().toISOString() };
    status.textContent = 'Saving…'; status.style.color = 'var(--muted)';
    const { error } = await sb.from('v2_do_now').upsert(payload, { onConflict: 'class_id' });
    if (error) { status.textContent = 'Could not save: ' + error.message; status.style.color = '#dc2626'; return; }
    status.textContent = 'Active — just now'; status.style.color = '#059669';
    refreshDoNow(cls);
  });
  document.getElementById('dnClear').addEventListener('click', () => doNowStop(cls));
  document.getElementById('dnReset').addEventListener('click', () => doNowClear(cls));
  document.getElementById('dnSave').addEventListener('click', () => archiveDoNowManual(cls));
  document.getElementById('dnProject').addEventListener('click', () => openClassView(cls));
  renderDoNowArchive(cls);
  mountGamePanel(cls);
}

async function fetchDoNowData(cls){
  const ids = cls.students.map(s => s.id);
  let dn = null;
  try { const { data } = await sb.from('v2_do_now').select('updated_at, active, topic_id').eq('class_id', cls.id).maybeSingle(); dn = data; } catch (_e) {}
  if (!dn || !dn.updated_at || !ids.length) return { dn: (dn && dn.updated_at) ? dn : null, rows: [] };
  let sessions = [];
  try {
    const { data, error } = await sb.from('vocab_sessions').select('student_id, answered, correct, last_answer_at')
      .eq('vocab_list', cls.vocabList).gte('started_at', dn.updated_at).in('student_id', ids);
    if (!error) sessions = data || [];
  } catch (_e) {}
  const by = new Map();
  for (const r of sessions) {
    const cur = by.get(r.student_id) || { answered: 0, correct: 0, last: null };
    cur.answered += r.answered | 0; cur.correct += r.correct | 0;
    if (r.last_answer_at && (!cur.last || r.last_answer_at > cur.last)) cur.last = r.last_answer_at;
    by.set(r.student_id, cur);
  }
  const rows = cls.students.map(s => {
    const r = by.get(s.id);
    return { id: s.id, name: s.name, in: !!r, answered: r ? r.answered : 0, correct: r ? r.correct : 0,
             acc: (r && r.answered > 0) ? Math.round(r.correct / r.answered * 100) : null, last: r ? r.last : null };
  });
  return { dn, rows };
}

// Freeze the current leaderboard into v2_do_now_archive. Returns true on save,
// or a reason string ('none' = no active Do Now, 'empty' = nobody answered).
async function archiveDoNow(cls){
  let dn = null;
  try { const { data } = await sb.from('v2_do_now').select('topic_id, subtopics, vocab_list, updated_at, active').eq('class_id', cls.id).maybeSingle(); dn = data; } catch (_e) { return false; }
  if (!dn || !dn.updated_at) return 'none';
  const { rows } = await fetchDoNowData(cls);
  const participants = rows.filter(r => r.in);
  if (!participants.length) return 'empty';
  const results = participants
    .map(r => ({ name: r.name, answered: r.answered, correct: r.correct, acc: r.acc }))
    .sort((a, b) => b.answered - a.answered);
  const row = {
    class_id: cls.id,
    vocab_list: dn.vocab_list || cls.vocabList,
    topic_id: dn.topic_id || null,
    subtopics: dn.subtopics || null,
    started_at: dn.updated_at,
    results,
    student_count: cls.students.length,
    total_answered: participants.reduce((a, r) => a + (r.answered | 0), 0),
    total_correct: participants.reduce((a, r) => a + (r.correct | 0), 0),
    created_by: myId
  };
  try { const { error } = await sb.from('v2_do_now_archive').insert(row); return !error; } catch (_e) { return false; }
}

async function renderDoNowSummary(cls){

  }).join('');
  host.innerHTML = `
    <div class="dn-sum-head">
      <div class="dn-sum-label" style="color:${dn.active ? '#059669' : 'var(--muted)'};">${dn.active ? '● Live tracking' : 'Stopped · final results'}</div>

    </div>

      <thead><tr><th>Student</th><th style="text-align:right;">Answered</th><th style="text-align:right;">Correct</th><th style="text-align:right;">Accuracy</th></tr></thead>
      <tbody>${rowHtml}</tbody>

async function renderLeaderboard(cls){
  if (!classViewOpen) return;
  const { dn, rows } = await fetchDoNowData(cls);
  const topicBit = (dn && dn.topic_id) ? ' · ' + (dnKind(cls) === 'civ' ? 'Topic ' + dn.topic_id : dn.topic_id) : '';
  document.getElementById('lbSub').textContent =
    (dn ? (dn.active ? 'Live' : 'Stopped') : 'No Do Now set') + topicBit + ' · ' + cls.name;
  let answered = 0, correct = 0, done = 0;
  for (const r of rows) { answered += r.answered; correct += r.correct; if (r.in) done++; }
  const acc = answered > 0 ? Math.round(correct / answered * 100) : 0;
  document.getElementById('lbTotals').innerHTML = `<b>${done}</b> / ${cls.students.length} in · class accuracy <b>${answered ? acc + '%' : '—'}</b>`;
  const byAcc = lbSort === 'accuracy';
  const ranked = rows.slice().sort((a, b) =>
    (b.in - a.in) ||
    (byAcc
      ? (((b.acc || 0) - (a.acc || 0)) || (b.correct - a.correct))
      : ((b.correct - a.correct) || ((b.acc || 0) - (a.acc || 0)))) ||
    (b.answered - a.answered) || a.name.localeCompare(b.name));
  const list = document.getElementById('lbList');
  const firstTop = new Map();
  lbRows.forEach((el, id) => firstTop.set(id, el.getBoundingClientRect().top));
  ranked.forEach((r, i) => {
    let el = lbRows.get(r.id);
    if (!el) { el = document.createElement('div'); lbRows.set(r.id, el); }
    el.className = 'lb-row' + (i === 0 && r.in ? ' top1' : '') + (r.in ? '' : ' notin');
    const score = r.in ? (byAcc ? (r.acc + '%') : r.correct) : '–';
    const meta  = r.in ? (byAcc ? (r.correct + '/' + r.answered + ' correct') : (r.acc + '% · ' + r.answered + ' done')) : 'not in yet';
    el.innerHTML = `<div class="lb-rank">${r.in ? (i + 1) : '·'}</div><div class="lb-name">${escapeHtml(r.name)}</div><div class="lb-score">${score}</div><div class="lb-meta">${meta}</div>`;
    list.appendChild(el);
  });
  requestAnimationFrame(() => {
    ranked.forEach(r => {
      const el = lbRows.get(r.id); const first = firstTop.get(r.id);
      if (first == null) return;
      const dy = first - el.getBoundingClientRect().top;
      if (dy) { el.style.transition = 'none'; el.style.transform = 'translateY(' + dy + 'px)'; requestAnimationFrame(() => { el.style.transition = ''; el.style.transform = ''; }); }
    });
  });
}

document.getElementById('lbSortBtn').addEventListener('click', () => {
  lbSort = (lbSort === 'correct') ? 'accuracy' : 'correct';
  document.getElementById('lbSortBtn').textContent = 'Sort: ' + (lbSort === 'accuracy' ? 'Accuracy' : 'Correct');
  if (lbClass) renderLeaderboard(lbClass);
});
document.getElementById('lbSave').addEventListener('click', async () => {
  if (!lbClass) return;
  const btn = document.getElementById('lbSave');
  btn.disabled = true; const prev = btn.textContent; btn.textContent = 'Saving…';
  const res = await archiveDoNow(lbClass);
  btn.textContent = res === true ? 'Saved ✓' : (res === 'empty' ? 'No answers yet' : 'Not saved');
  setTimeout(() => { btn.textContent = prev; btn.disabled = false; }, 1800);
});
document.getElementById('lbExit').addEventListener('click', closeClassView);

// ── Background music for the projected class view ──────────────────────────
// Shuffles through a playlist of royalty-free lo-fi tracks, advancing to the
// next when one ends and reshuffling each lap. Tracks are listed in
// assets/audio/tracks.json; if that's absent it falls back to a single
// lofi.mp3. Play/pause (= mute) + volume are remembered in localStorage.
// Browsers block autoplay with sound, so we auto-resume inside the click that
// opened the class view; if that's blocked the button just shows "off".
const DoNowMusic = (function () {
  const audio = document.getElementById('lbMusic');
  // The class view and the game projection each have their own button + slider;
  // drive both so music works from whichever view is open.
  const btns = ['lbMusicBtn', 'gvMusicBtn'].map(id => document.getElementById(id)).filter(Boolean);
  const vols = ['lbMusicVol', 'gvMusicVol'].map(id => document.getElementById(id)).filter(Boolean);
  if (!audio || !btns.length || !vols.length) return { onOpen(){}, pause(){} };

  const BASE = '/version2/assets/audio/';
  let playlist = [];     // resolved track URLs
  let order = [];        // shuffled play order (indices into playlist)
  let pos = 0;
  let ready = false;
  let intendPlay = false;   // is the teacher's intent "playing"?
  let pendingPlay = false;  // asked to play before the playlist was ready
  let errCount = 0;

  let wantOn = localStorage.getItem('classicalia.donow.music') === 'on';
  let savedVol = parseFloat(localStorage.getItem('classicalia.donow.musicVol'));
  if (isNaN(savedVol)) savedVol = 0.5;
  audio.volume = savedVol;
  vols.forEach(v => v.value = String(savedVol));

  function hideControls() { btns.forEach(b => b.style.display = 'none'); vols.forEach(v => v.style.display = 'none'); }
  function setLabel() {
    const on = !audio.paused;
    btns.forEach(b => { b.textContent = '♪ Music: ' + (on ? 'on' : 'off'); b.classList.toggle('is-on', on); });
  }

  function shuffle(n) {
    const a = Array.from({ length: n }, (_, i) => i);
    for (let i = n - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
    return a;
  }
  function reshuffle() {
    const last = order.length ? order[order.length - 1] : -1;
    order = shuffle(playlist.length);
    // Avoid replaying the same track twice across the lap boundary.
    if (order.length > 1 && order[0] === last) { [order[0], order[1]] = [order[1], order[0]]; }
    pos = 0;
  }
  function setSrc() { if (playlist.length) audio.src = playlist[order[pos]]; }
  function advance() { pos++; if (pos >= order.length) reshuffle(); setSrc(); }
  function tryPlay() { const p = audio.play(); if (p && p.catch) p.catch(() => {}); }

  function play() {
    if (!ready) { pendingPlay = true; intendPlay = true; return; }
    intendPlay = true;
    if (!audio.src) setSrc();
    tryPlay();
  }
  function stop() { intendPlay = false; audio.pause(); }

  audio.addEventListener('ended', () => { if (playlist.length) { advance(); if (intendPlay) tryPlay(); } });
  audio.addEventListener('playing', () => { errCount = 0; });
  audio.addEventListener('play',  setLabel);
  audio.addEventListener('pause', setLabel);
  audio.addEventListener('error', () => {
    if (!ready) return;
    errCount++;
    if (errCount > playlist.length) { hideControls(); return; }  // nothing loads
    advance();
    if (intendPlay) tryPlay();
  });

  btns.forEach(btn => btn.addEventListener('click', () => {
    if (audio.paused) {
      wantOn = true; localStorage.setItem('classicalia.donow.music', 'on'); play();
    } else {
      wantOn = false; localStorage.setItem('classicalia.donow.music', 'off'); stop();
    }
    setLabel();
  }));
  vols.forEach(vol => vol.addEventListener('input', () => {
    audio.volume = parseFloat(vol.value);
    localStorage.setItem('classicalia.donow.musicVol', vol.value);
    vols.forEach(o => { if (o !== vol) o.value = vol.value; });
  }));
  setLabel();

  // Load the playlist manifest (array of filenames/URLs). Falls back to a
  // single lofi.mp3 so the older single-track setup keeps working.
  (async function initPlaylist() {
    let tracks = null;
    try {
      const r = await fetch(BASE + 'tracks.json', { cache: 'no-store' });
      if (r.ok) {
        const j = await r.json();
        if (Array.isArray(j)) tracks = j.filter(t => typeof t === 'string' && t.trim());
      }
    } catch (_) { /* no manifest — fall back */ }
    if (!tracks || !tracks.length) tracks = ['lofi.mp3'];
    playlist = tracks.map(t => /^(https?:)?\//.test(t) ? t : BASE + t);
    order = shuffle(playlist.length);
    pos = 0;
    ready = true;
    setSrc();
    if (pendingPlay && wantOn) { pendingPlay = false; tryPlay(); }
  })();

  return {
    // Called from openClassView (inside the projecting click) so autoplay is
    // allowed when the teacher last left it on.
    onOpen() { if (wantOn) play(); },
    pause()  { stop(); }
  };
})();

if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
else init();
</script>
