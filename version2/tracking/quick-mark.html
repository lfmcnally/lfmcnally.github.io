<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quick mark — Classicalia</title>
<link rel="icon" type="image/png" href="/images/favicon.png">
<link rel="stylesheet" href="/version2/assets/css/classicalia.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/version2/assets/js/supabase-client.js"></script>
<script src="/version2/assets/js/account-menu.js" defer></script>
<style>
body { background: var(--cream); }
.wrap { max-width: 820px; margin: 0 auto; padding: 28px 20px 90px; }
.gate { max-width: 520px; margin: 60px auto; background: var(--paper); border: 1px solid var(--rule); border-radius: 10px; padding: 28px; text-align: center; }
.row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
.spacer { flex: 1; }
label.lbl { display: block; font-size: 10.5px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); margin: 0 0 5px; }
input.f, select.f, textarea.f { width: 100%; font-family: 'DM Sans', sans-serif; font-size: 14px; padding: 9px 11px; border: 1.5px solid var(--rule); border-radius: 7px; background: var(--paper); color: var(--ink); outline: none; box-sizing: border-box; }
input.f:focus, select.f:focus, textarea.f:focus { border-color: var(--brand); }
textarea.f { resize: vertical; min-height: 56px; }
.btn { font-family: 'DM Sans', sans-serif; font-size: 13.5px; font-weight: 700; padding: 10px 18px; border-radius: 7px; border: none; background: var(--brand); color: #fff; cursor: pointer; }
.btn:hover { background: #155ee0; }
.btn:disabled { opacity: .55; cursor: default; }
.btn.ghost { background: var(--paper); color: var(--ink); border: 1px solid var(--rule); font-weight: 600; }
.btn.danger { background: var(--paper); color: #b91c1c; border: 1px solid #fecaca; font-weight: 600; }
.btn.sm { font-size: 12px; padding: 6px 11px; }
.card { background: var(--paper); border: 1px solid var(--rule); border-radius: 10px; padding: 18px 20px; margin-bottom: 14px; box-shadow: 0 1px 2px rgba(14,30,63,.04); }
.muted { color: var(--muted); font-size: 12.5px; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.field { margin-top: 14px; }
.sps { display: flex; flex-direction: column; gap: 6px; margin-top: 6px; }
.sp { display: flex; gap: 8px; align-items: center; }
.sp input.txt { flex: 1; }
.sp input.mk { width: 64px; }
.hint { margin-top: 4px; font-size: 12px; }
.hidden { display: none !important; }
.result { border: 1px solid var(--rule); border-radius: 10px; padding: 18px 20px; background: var(--paper); }
.scoreline { display: flex; align-items: baseline; gap: 10px; }
.score { font-family: 'Lora', serif; font-weight: 700; font-size: 30px; color: var(--navy); }
.lvl { display: inline-block; font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; padding: 3px 9px; border-radius: 999px; background: #eef6ee; color: #2a6e2a; }
.rat { margin-top: 10px; font-size: 14.5px; line-height: 1.5; color: var(--ink); }
.mlist { list-style: none; padding: 0; margin: 12px 0 0; display: flex; flex-direction: column; gap: 5px; }
.mlist li { font-size: 13px; padding: 5px 9px; border-radius: 6px; background: var(--cream); }
.mlist li.ao1 { border-left: 3px solid #2a6e2a; }
.mlist li.ao2 { border-left: 3px solid var(--brand); }
.mlist li.miss { border-left: 3px solid #c08a2a; color: #8a5a00; }
.mlist li.next { border-left: 3px solid var(--muted); color: var(--muted); }
.mlist li.bad { border-left: 3px solid #c0392b; color: #8a1f15; }
.secs { list-style: none; padding: 0; margin: 12px 0 0; display: flex; flex-direction: column; gap: 8px; }
.secs li { border: 1px solid var(--rule); border-radius: 8px; padding: 9px 11px; background: var(--paper); }
.sechead { display: flex; align-items: baseline; gap: 8px; }
.secmk { font-family: 'Lora', serif; font-weight: 700; font-size: 15px; color: var(--navy); white-space: nowrap; }
.seclat { font-style: italic; color: var(--ink); font-size: 13.5px; }
.secnote { margin-top: 3px; font-size: 12.5px; color: var(--muted); }
.rsec { margin-top: 14px; }
.rsec h4 { font-size: 10.5px; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin: 0 0 5px; font-weight: 700; }
/* Print sheet — hidden on screen, shown alone when printing */
.print-sheet { display: none; }
.ps-title { font-family: 'Lora', serif; font-size: 20px; font-weight: 700; margin: 0 0 2px; color: #111; }
.ps-meta { font-size: 11px; color: #555; margin-bottom: 10px; }
.ps-score { font-size: 22px; font-weight: 700; margin: 8px 0; color: #111; }
.ps-sec { margin: 9px 0; }
.ps-sec h3 { font-size: 11px; text-transform: uppercase; letter-spacing: .08em; margin: 0 0 3px; color: #333; }
.ps-sec ul { margin: 0; padding-left: 18px; }
.ps-sec li { font-size: 12px; margin: 2px 0; }
.ps-sec > div { font-size: 12.5px; }
.ps-answer { white-space: pre-wrap; font-size: 11px; color: #333; border-top: 1px solid #bbb; padding-top: 8px; margin-top: 12px; }
@media print {
  body * { visibility: hidden; }
  #printSheet, #printSheet * { visibility: visible; }
  #printSheet { display: block; position: absolute; left: 0; top: 0; width: 100%; padding: 4mm 6mm; }
}
.toast { position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%); background: var(--navy); color: #fff; font-size: 13px; padding: 9px 18px; border-radius: 8px; opacity: 0; transition: opacity .2s; z-index: 100; }
.toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar" data-tracking-nav data-role="teacher" data-active="quick" data-seed="529"></aside>
  <script src="/version2/assets/js/tracking-nav.js"></script>
  <main class="main">
    <header class="topbar">
      <div class="crumbs" id="topbarTitle"><b>Quick mark</b></div>
      <div class="top-actions"><div data-account-menu></div></div>
    </header>

<div class="wrap">
  <div id="gate" class="gate hidden"></div>

  <div id="app" class="hidden">
    <p class="muted" style="margin:0 0 16px;">Mark a single question and answer on the spot — e.g. typing up a handwritten answer a student handed you. Nothing is saved or assigned; the mark uses your monthly marking budget.</p>

    <div class="card">
      <div class="grid2">
        <div>
          <label class="lbl">Subject</label>
          <select id="subject" class="f">
            <option>Classical Civilisation</option>
            <option>Latin</option>
            <option>Classical Greek</option>
          </select>
        </div>
        <div>
          <label class="lbl">Marking style</label>
          <select id="style" class="f">
            <option value="points">Points-based — credit scheme points</option>
            <option value="translation">Translation — holistic band /5, one sentence (Latin / Greek)</option>
            <option value="passage">Passage — sectioned translation, mark per section (Latin / Greek)</option>
            <option value="essay">Essay — OCR 8-marker, levels /8 (Classical Civ)</option>
          </select>
          <div id="styleHint" class="muted hint"></div>
        </div>
      </div>

      <div class="grid2 field">
        <div style="max-width:160px;">
          <label class="lbl">Marks</label>
          <input id="marks" class="f" type="number" min="1" max="30" value="1">
          <div id="marksHint" class="muted hint"></div>
        </div>
        <div>
          <label class="lbl">Marking leniency</label>
          <select id="leniency" class="f">
            <option value="lenient">Lenient</option>
            <option value="slightly_lenient">Slightly lenient</option>
            <option value="standard" selected>Standard</option>
            <option value="slightly_strict">Slightly strict</option>
            <option value="strict">Strict</option>
          </select>
        </div>
      </div>

      <div class="field">
        <label class="lbl" id="promptLabel">Question / prompt</label>
        <textarea id="prompt" class="f" rows="2" placeholder="The question the student answered"></textarea>
      </div>

      <!-- Points scheme -->
      <div id="box-points" class="field">
        <label class="lbl">Mark scheme — creditworthy points</label>
        <div class="sps" id="pts"></div>
        <button class="btn ghost sm" id="addPt" type="button" style="margin-top:6px;">+ point</button>
      </div>

      <!-- Essay scheme -->
      <div id="box-essay" class="field hidden">
        <div class="field" style="margin-top:0;">
          <label class="lbl">Topic — grounds marking in your revision page</label>
          <select id="topic" class="f">
            <option value="">None — mark from general knowledge</option>
            <option value="the-gods">The gods</option>
            <option value="heracles">The universal hero (Heracles)</option>
            <option value="temples">Religion and the city: temples</option>
            <option value="foundation-stories">Myth and the city: foundation stories</option>
            <option value="festivals">Festivals</option>
            <option value="myth-and-symbols-of-power">Myth and symbols of power</option>
            <option value="death-and-burial">Death and burial</option>
            <option value="journeying-to-the-underworld">Journeying to the underworld</option>
          </select>
          <div class="muted hint">When set, the marker reads that revision page and treats it as the source of truth for what's accurate.</div>
        </div>
        <div class="grid2">
          <div>
            <label class="lbl">Question type</label>
            <select id="stem" class="f">
              <option value="evaluative">Evaluative — "how far / to what extent / who is more…"</option>
              <option value="in_what_ways">"In what ways…" — no counter-arguments</option>
            </select>
          </div>
          <div>
            <label class="lbl">Source (printed extract or description of a visual source)</label>
            <textarea id="source" class="f" rows="2" placeholder="Source A: …"></textarea>
          </div>
        </div>
        <div class="field">
          <label class="lbl">Indicative content — creditworthy facts, one per line (from the Myth &amp; Religion revision pages)</label>
          <textarea id="indic" class="f" rows="6" placeholder="Aeneas described as &quot;conducted by the fates&quot; (Source) — divine destiny, not personal ambition&#10;Ara Pacis shows Aeneas veiled, sacrificing as a priest — embodies pietas"></textarea>
        </div>
      </div>

      <div class="grid2 field">
        <div id="box-model">
          <label class="lbl" id="modelLabel">Model answer (optional)</label>
          <textarea id="model" class="f" rows="2"></textarea>
        </div>
        <div>
          <label class="lbl">Marking notes (optional)</label>
          <textarea id="notes" class="f" rows="2"></textarea>
        </div>
      </div>

      <div class="field">
        <label class="lbl" id="answerLabel">Student's answer</label>
        <textarea id="answer" class="f" rows="8" placeholder="Type or paste the student's answer here"></textarea>
      </div>

      <div class="row field">
        <button class="btn" id="markBtn" type="button">Mark answer</button>
        <span class="muted" id="markMsg"></span>
      </div>
    </div>

    <div id="resultBox"></div>
  </div>
</div>

  </main>
</div>
<div id="printSheet" class="print-sheet"></div>
<div id="toast" class="toast"></div>

<script>
const sb = window.supabase;
const $ = (id) => document.getElementById(id);
const esc = (s) => String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
let toastT;
function toast(msg){ const t=$('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2200); }
function gate(msg){ $('app').classList.add('hidden'); const g=$('gate'); g.classList.remove('hidden'); g.innerHTML='<h2 style="font-family:Lora,serif;color:var(--navy);">Quick mark</h2><p class="muted">'+esc(msg)+'</p>'; }

function spRow(text, mk){ return '<div class="sp"><input class="f txt" placeholder="creditworthy point" value="'+esc(text||'')+'"><input class="f mk" type="number" min="1" placeholder="mk" value="'+(mk||'')+'"><button class="btn danger sm" type="button" data-rmpt>×</button></div>'; }

function styleHint(style){
  if(style==='translation') return 'Put one Latin/Greek sentence above and the correct English in <b>Correct translation</b>. Marked holistically /5 by proportion of sense (OCR J282/J292 grid) — set marks to <b>5</b>.';
  if(style==='passage') return 'Paste the whole Latin/Greek passage above and the student\'s English below. Set the <b>total</b> marks (e.g. 25 or 30) — it\'s split into 5-mark sections, each marked on the OCR sense grid, giving a mark per section and an overall total.';
  if(style==='essay') return 'OCR GCSE Civ 8-marker. Set marks to <b>8</b>. Put the question above, the source and indicative facts below. Marked on OCR\'s 4-level grid (4 AO1 + 4 AO2).';
  return 'The AI credits each creditworthy point the answer conveys, allowing synonyms and paraphrase.';
}

function updateMarksHint(){
  const h = $('marksHint');
  if($('style').value!=='passage'){ h.textContent=''; return; }
  const n = Math.max(1, Math.min(6, Math.round((+$('marks').value||25)/5)));
  h.textContent = 'Split into '+n+' section'+(n>1?'s':'')+' of 5 (total '+(n*5)+')';
}

function applyStyle(){
  const v = $('style').value, tr = v==='translation', pa = v==='passage', es = v==='essay';
  $('styleHint').innerHTML = styleHint(v);
  $('box-points').classList.toggle('hidden', es || pa);
  $('box-essay').classList.toggle('hidden', !es);
  $('box-model').classList.toggle('hidden', es);
  $('modelLabel').textContent = (tr || pa) ? 'Correct translation (recommended)' : 'Model answer (optional)';
  $('promptLabel').textContent = pa ? 'Latin / Greek passage' : (tr ? 'Latin / Greek sentence' : 'Question / prompt');
  $('answerLabel').textContent = (tr || pa) ? 'Student\'s translation' : 'Student\'s answer';
  const mk = $('marks');
  if(tr && (+mk.value||1) < 2) mk.value = 5;
  if(pa && (+mk.value||1) < 10) mk.value = 25;
  if(es) mk.value = 8;
  updateMarksHint();
}

function bindPts(){ $('pts').querySelectorAll('[data-rmpt]').forEach(b=>b.onclick=()=>b.closest('.sp').remove()); }

function liList(arr, cls){ return (Array.isArray(arr)?arr:[]).filter(Boolean).map(s=>'<li'+(cls?' class="'+cls+'"':'')+'>'+esc(String(s))+'</li>').join(''); }
function strip(s, re){ return String(s).replace(re,''); }

function renderPassage(r){
  const secs = Array.isArray(r.sections) ? r.sections : [];
  let html = '<div class="result">';
  html += '<div class="row" style="justify-content:space-between;align-items:flex-start;gap:10px;">';
  html += '<div class="scoreline"><span class="score">'+r.marks+' / '+r.max+'</span></div>';
  html += '<button class="btn ghost sm" type="button" onclick="window.print()">Print feedback</button>';
  html += '</div>';
  if(r.rationale) html += '<div class="rat">'+esc(r.rationale)+'</div>';
  if(secs.length){
    html += '<div class="rsec"><h4>Marks by section</h4><ul class="secs">';
    secs.forEach((s,i)=>{
      html += '<li><div class="sechead"><span class="secmk">'+s.marks+' / '+(s.max||5)+'</span>'
           + '<span class="seclat">'+esc(s.latin||('Section '+(i+1)))+'</span></div>'
           + (s.note?'<div class="secnote">'+esc(s.note)+'</div>':'')+'</li>';
    });
    html += '</ul></div>';
  }
  html += '</div>';
  $('resultBox').innerHTML = html;
  buildPassagePrintSheet(r, secs);
  $('resultBox').scrollIntoView({ behavior:'smooth', block:'nearest' });
}

function buildPassagePrintSheet(r, secs){
  const q=$('prompt').value.trim(), a=$('answer').value.trim(), subj=$('subject').value;
  let h='';
  h += '<div class="ps-title">'+esc(subj)+' — translation feedback</div>';
  h += '<div class="ps-meta">Marked by Classicalia AI · '+esc(new Date().toLocaleDateString())+'</div>';
  h += '<div class="ps-score">'+r.marks+' / '+r.max+'</div>';
  if(r.rationale) h += '<div class="ps-sec"><h3>Feedback</h3><div>'+esc(r.rationale)+'</div></div>';
  if(secs.length){
    h += '<div class="ps-sec"><h3>Marks by section</h3><ul>';
    secs.forEach((s,i)=>{ h += '<li><b>'+s.marks+'/'+(s.max||5)+'</b> — '+esc(s.latin||('Section '+(i+1)))+(s.note?' — '+esc(s.note):'')+'</li>'; });
    h += '</ul></div>';
  }
  if(q) h += '<div class="ps-answer"><b>Passage</b>\n'+esc(q)+'</div>';
  if(a) h += '<div class="ps-answer"><b>Student\'s translation</b>\n'+esc(a)+'</div>';
  $('printSheet').innerHTML = h;
}

function renderResult(r){
  if($('style').value==='passage') return renderPassage(r);
  const isEssay = $('style').value==='essay';
  const ao1=[], ao2=[], nexts=[], other=[];
  (Array.isArray(r.matched)?r.matched:[]).forEach(m=>{
    const s=String(m);
    if(s.startsWith('AO1:')) ao1.push(strip(s,/^AO1:\s*/));
    else if(s.startsWith('AO2:')) ao2.push(strip(s,/^AO2:\s*/));
    else if(s.startsWith('missing:')) nexts.push(strip(s,/^missing:\s*/));
    else if(s.startsWith('next:')) nexts.push(strip(s,/^next:\s*/));
    else if(s.startsWith('serious:')) nexts.push(strip(s,/^serious:\s*/));
    else if(s.startsWith('minor:')) nexts.push(strip(s,/^minor:\s*/));
    else other.push(s);
  });
  const inacc = Array.isArray(r.inaccuracies)?r.inaccuracies.filter(Boolean):[];
  const pts = isEssay ? ao1 : (ao1.concat(other));

  let html = '<div class="result">';
  html += '<div class="row" style="justify-content:space-between;align-items:flex-start;gap:10px;">';
  html += '<div class="scoreline"><span class="score">'+r.marks+' / '+r.max+'</span>'+(isEssay&&r.level!=null?'<span class="lvl">Level '+r.level+'</span>':'')+'</div>';
  html += '<button class="btn ghost sm" type="button" onclick="window.print()">Print feedback</button>';
  html += '</div>';
  if(r.rationale) html += '<div class="rat">'+esc(r.rationale)+'</div>';
  if(isEssay) html += '<div class="muted" style="margin-top:8px;">Source used: <b>'+(r.source_used?'yes':'no')+'</b> · Weighing conclusion: <b>'+(r.conclusion?'yes':'no')+'</b></div>';
  if(pts.length) html += '<div class="rsec"><h4>'+(isEssay?'AO1 — knowledge credited':'Points credited')+'</h4><ul class="mlist">'+liList(pts,'ao1')+'</ul></div>';
  if(isEssay && ao2.length) html += '<div class="rsec"><h4>AO2 — analysis credited</h4><ul class="mlist">'+liList(ao2,'ao2')+'</ul></div>';
  if(inacc.length) html += '<div class="rsec"><h4>Factual inaccuracies</h4><ul class="mlist">'+liList(inacc,'bad')+'</ul></div>';
  if(nexts.length) html += '<div class="rsec"><h4>To improve</h4><ul class="mlist">'+liList(nexts,'next')+'</ul></div>';
  html += '</div>';
  $('resultBox').innerHTML = html;

  buildPrintSheet(r, isEssay, pts, ao2, inacc, nexts);
  $('resultBox').scrollIntoView({ behavior:'smooth', block:'nearest' });
}

function buildPrintSheet(r, isEssay, pts, ao2, inacc, nexts){
  const q=$('prompt').value.trim(), a=$('answer').value.trim(), subj=$('subject').value;
  let h='';
  h += '<div class="ps-title">'+esc(subj)+(isEssay?' — 8-mark feedback':' — marking feedback')+'</div>';
  h += '<div class="ps-meta">Marked by Classicalia AI · '+esc(new Date().toLocaleDateString())+'</div>';
  if(q) h += '<div class="ps-sec"><h3>Question</h3><div>'+esc(q)+'</div></div>';
  h += '<div class="ps-score">'+r.marks+' / '+r.max+(isEssay&&r.level!=null?'  (Level '+r.level+')':'')+'</div>';
  if(r.rationale) h += '<div class="ps-sec"><h3>Feedback</h3><div>'+esc(r.rationale)+'</div></div>';
  if(isEssay) h += '<div class="ps-sec"><h3>Checklist</h3><div>Source used: '+(r.source_used?'yes':'no')+' · Weighing conclusion: '+(r.conclusion?'yes':'no')+'</div></div>';
  if(pts.length) h += '<div class="ps-sec"><h3>'+(isEssay?'AO1 — knowledge credited':'Points credited')+'</h3><ul>'+liList(pts)+'</ul></div>';
  if(isEssay && ao2.length) h += '<div class="ps-sec"><h3>AO2 — analysis credited</h3><ul>'+liList(ao2)+'</ul></div>';
  if(inacc.length) h += '<div class="ps-sec"><h3>Factual inaccuracies</h3><ul>'+liList(inacc)+'</ul></div>';
  if(nexts.length) h += '<div class="ps-sec"><h3>To improve</h3><ul>'+liList(nexts)+'</ul></div>';
  if(a) h += '<div class="ps-answer"><b>Answer</b>\n'+esc(a)+'</div>';
  $('printSheet').innerHTML = h;
}

async function doMark(){
  const style = $('style').value;
  const prompt = $('prompt').value.trim();
  const answer = $('answer').value.trim();
  if(!prompt){ toast('Add the question'); return; }
  if(!answer){ toast('Add the student\'s answer'); return; }

  const scheme = {
    model_answer: $('model').value.trim(),
    marking_notes: $('notes').value.trim(),
  };
  if(style==='points'){
    scheme.scheme_points = [...$('pts').querySelectorAll('.sp')].map(r=>({ text:r.querySelector('.txt').value.trim(), marks:+r.querySelector('.mk').value||undefined })).filter(p=>p.text);
  } else if(style==='essay'){
    scheme.essay_scheme = {
      stem_type: $('stem').value,
      source: $('source').value.trim(),
      indicative: $('indic').value.split('\n').map(s=>s.trim()).filter(Boolean),
    };
  }

  const body = {
    subject: $('subject').value,
    mark_style: style,
    marks: Math.max(1, Math.min(30, +$('marks').value||1)),
    leniency: $('leniency').value,
    topic: style==='essay' ? $('topic').value : '',
    prompt, answer_text: answer, scheme,
  };

  const btn = $('markBtn'); btn.disabled = true; $('markMsg').textContent = 'Marking…';
  try {
    const { data, error } = await sb.functions.invoke('mark-adhoc', { body });
    if(error){ $('markMsg').textContent=''; toast('Marking failed: '+error.message); return; }
    if(data?.paused){ $('markMsg').textContent=''; toast(data.message||'Marking is paused'); return; }
    if(data?.error){ $('markMsg').textContent=''; toast(data.error); return; }
    $('markMsg').textContent = '';
    renderResult(data);
  } catch(e){
    $('markMsg').textContent=''; toast('Marking failed');
  } finally {
    btn.disabled = false;
  }
}

(async function init(){
  const { data: au } = await sb.auth.getUser();
  const user = au?.user;
  if(!user){ return gate('Please sign in as a teacher to use quick marking.'); }
  const { data: profile } = await sb.from('users').select('role').eq('id', user.id).single();
  if(!profile || profile.role !== 'teacher'){ return gate('This page is for teachers. If you\'re a teacher, ask an admin to set your role.'); }

  $('app').classList.remove('hidden');
  $('pts').insertAdjacentHTML('beforeend', spRow('', '') + spRow('', '') + spRow('', ''));
  bindPts();
