<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To-do — Classicalia</title>
<link rel="icon" type="image/png" href="/images/favicon.png">
<link rel="stylesheet" href="/version2/assets/css/classicalia.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/version2/assets/js/supabase-client.js"></script>
<script src="/version2/assets/js/account-menu.js" defer></script>
<style>
.gate { max-width:520px; margin:60px auto; background:var(--paper); border:1px solid var(--rule); border-radius:10px; padding:28px; text-align:center; font-size:15px; line-height:1.6; }
.todo-sec { margin-bottom:26px; max-width:760px; }
.section-h { font-size:10.5px; font-weight:700; letter-spacing:.16em; text-transform:uppercase; color:var(--muted); margin:0 0 10px; }
.todo-card { display:flex; align-items:center; gap:14px; background:var(--paper); border:1px solid var(--rule); border-radius:10px; padding:15px 18px; margin-bottom:10px; text-decoration:none; transition:border-color .12s, box-shadow .12s; }
.todo-card:hover { border-color:var(--brand); box-shadow:0 2px 10px rgba(14,30,63,.06); }
.todo-ic { width:38px; height:38px; flex:none; border-radius:9px; display:flex; align-items:center; justify-content:center; }
.todo-ic.test { background:#eef4ff; color:var(--brand); }
.todo-ic.bank { background:#fef6ec; color:#d97706; }
.todo-ic svg { width:19px; height:19px; }
.todo-main { flex:1; min-width:0; }
.todo-title { font-family:'Lora',serif; font-style:italic; font-weight:700; font-size:17px; color:var(--navy); }
.todo-meta { font-size:12.5px; color:var(--muted); margin-top:2px; }
.todo-meta.soon { color:#b91c1c; font-weight:600; }
.todo-go { font-family:'DM Sans',sans-serif; font-size:12.5px; font-weight:700; color:var(--brand); flex:none; }
.todo-empty { max-width:760px; text-align:center; background:var(--paper); border:1px solid var(--rule); border-radius:12px; padding:48px 28px; color:var(--muted); }
.todo-empty .big { font-family:'Lora',serif; font-style:italic; font-weight:700; font-size:24px; color:var(--navy); margin-bottom:8px; }
.todo-loading { color:var(--muted); font-size:14px; padding:8px 0; }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar" data-tracking-nav data-role="student" data-active="todo" data-seed="640"></aside>
  <script src="/version2/assets/js/tracking-nav.js"></script>
  <main class="main">
    <header class="topbar">
      <div class="crumbs" id="topbarTitle"><b>To-do</b></div>
      <div class="top-actions"><div data-account-menu></div></div>
    </header>
    <div class="dash-body">
      <div id="gate" class="gate hidden"></div>
      <div id="content">
        <div class="todo-loading">Loading your to-do…</div>
      </div>
    </div>
  </main>
</div>

<script src="/version2/assets/js/starfield.js"></script>
<script>
'use strict';
const sb = window.supabase;
const $ = (id) => document.getElementById(id);
const esc = (s) => String(s == null ? '' : s).replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));

const IC = {
  test: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 3h9l5 5v13a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1z"/><path d="M14 3v5h5M8 13h7M8 17h5"/></svg>',
  bank: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7l2-3h6l2 3h6a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V8a1 1 0 0 1 1-1z"/></svg>'
};

// Friendly due-date text; flags anything due within 48h as urgent.
function dueText(d) {
  if (!d) return { txt: 'No due date', soon: false };
  const date = new Date(d), now = new Date();
  const days = Math.round((date - now) / 86400000);
  const soon = date - now <= 2 * 86400000;
  let txt;
  if (date < now) txt = 'Overdue';
  else if (days === 0) txt = 'Due today';
  else if (days === 1) txt = 'Due tomorrow';
  else txt = 'Due ' + date.toLocaleDateString(undefined, { day: 'numeric', month: 'short' });
  return { txt: txt, soon: soon };
}

function card(kind, title, dueAt, href) {
  const d = dueText(dueAt);
  return '<a class="todo-card" href="' + href + '">' +
    '<span class="todo-ic ' + kind + '">' + IC[kind] + '</span>' +
    '<span class="todo-main"><span class="todo-title">' + esc(title) + '</span>' +
    '<span class="todo-meta' + (d.soon ? ' soon' : '') + '">' + d.txt + '</span></span>' +
    '<span class="todo-go">Open &rarr;</span></a>';
}

function section(title, cards) {
  return '<div class="todo-sec"><div class="section-h">' + title + '</div>' + cards.join('') + '</div>';
}

(async function init() {
  const { data: au } = await sb.auth.getUser();
  if (!au || !au.user) {
    $('content').innerHTML = '';
    $('gate').classList.remove('hidden');
    $('gate').innerHTML = 'Please <a href="/auth/login.html">sign in</a> to see your to-do list.';
    return;
  }
  const me = au.user.id;

  // Open weekly tests (set by teachers) + bank assessments assigned to my classes.
  const [wtRes, clsRes, asgRes] = await Promise.all([
    sb.from('weekly_tests').select('*').eq('status', 'open').order('due_at', { ascending: true, nullsFirst: false }),
    sb.from('v2_classes').select('id, teacher_id'),
    sb.from('bank_class_assignments').select('*').eq('status', 'open')
  ]);

  const tests = wtRes.data || [];
  const myClassIds = (clsRes.data || []).filter(c => c.teacher_id !== me).map(c => c.id);
  const asg = (asgRes.data || []).filter(a => myClassIds.includes(a.class_id));

  let titles = {};
  if (asg.length) {
    const ids = [...new Set(asg.map(a => a.assessment_id))];
    const { data: bass } = await sb.from('bank_assessments').select('id, title').in('id', ids);
    (bass || []).forEach(b => { titles[b.id] = b.title; });
  }

  render(tests, asg, titles);
})();

function render(tests, asg, titles) {
  if (tests.length + asg.length === 0) {
    $('content').innerHTML = '<div class="todo-empty"><div class="big">You’re all caught up</div>' +
      'Nothing assigned right now. When your teacher sets a weekly test or an assessment, it’ll show up here.</div>';
    return;
  }
  let html = '';
  if (tests.length) {
    html += section('Weekly tests', tests.map(t => card('test', t.title || 'Weekly test', t.due_at, '/version2/tracking/weekly-test-take.html')));
  }
  if (asg.length) {
    html += section('Assigned assessments', asg.map(a => card('bank', titles[a.assessment_id] || 'Assessment', a.due_at, '/version2/tracking/bank.html?view=assigned')));
  }
  $('content').innerHTML = html;
}
</script>
</body>
</html>
