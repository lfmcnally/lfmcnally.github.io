<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly test — Classicalia</title>
<link rel="icon" type="image/png" href="/images/favicon.png">
<link rel="stylesheet" href="/version2/assets/css/classicalia.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/version2/assets/js/supabase-client.js"></script>
<script src="/version2/assets/js/account-menu.js" defer></script>
<style>
body { background: var(--cream); }
.wrap { max-width: 720px; margin: 0 auto; padding: 28px 20px 90px; }
.gate { max-width: 520px; margin: 60px auto; background: var(--paper); border: 1px solid var(--rule); border-radius: 10px; padding: 28px; text-align: center; font-size: 15px; line-height: 1.6; }
.card { background: var(--paper); border: 1px solid var(--rule); border-radius: 10px; padding: 18px 20px; margin-bottom: 14px; box-shadow: 0 1px 2px rgba(14,30,63,.04); }
.testrow { display: flex; align-items: center; gap: 12px; cursor: pointer; }
.testrow:hover .tt { color: var(--brand); }
.tt { font-family: 'Lora', serif; font-style: italic; font-weight: 700; font-size: 18px; color: var(--navy); }
.muted { color: var(--muted); font-size: 12.5px; }
.qprompt { font-size: 15px; color: var(--ink); line-height: 1.5; }
.qmarks { font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); }
.qimg { max-width: 100%; border-radius: 8px; border: 1px solid var(--rule); margin: 10px 0; }
textarea.f { width: 100%; font-family: 'DM Sans', sans-serif; font-size: 15px; padding: 11px 13px; border: 1.5px solid var(--rule); border-radius: 8px; resize: vertical; min-height: 70px; color: var(--ink); outline: none; }
textarea.f:focus { border-color: var(--brand); }
textarea.f:disabled { background: var(--cream); color: var(--muted); }
.btn { font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 700; padding: 12px 22px; border-radius: 7px; border: none; background: var(--brand); color: #fff; cursor: pointer; }
.btn:hover { background: #155ee0; }
.btn:disabled { background: var(--rule); color: var(--muted); cursor: default; }
.btn.ghost { background: var(--paper); color: var(--ink); border: 1px solid var(--rule); }
.btn.dark { background: var(--navy); }
.submit-card { text-align: center; }
.fb { margin-top: 12px; padding: 12px 15px; border-radius: 9px; border: 1px solid var(--rule); font-size: 13.5px; line-height: 1.5; }
.fb.good { background: #ecfdf3; border-color: #a7f3d0; color: #15803d; }
.fb.part { background: #fffbeb; border-color: #fde68a; color: #92500e; }
.fb.zero { background: #fef2f2; border-color: #fecaca; color: #b91c1c; }
.fb.info { background: #eff6ff; border-color: #bfdbfe; color: #1e40af; }
.fb b { font-family: 'Lora', serif; }
.total { font-family: 'Lora', serif; font-style: italic; font-weight: 700; font-size: 30px; color: var(--navy); }
.ans { margin-top: 6px; font-size: 14px; color: var(--ink); }
.ans .lab { color: var(--muted); font-size: 12px; }
.markpill { float: right; font-family: 'Lora', serif; font-style: italic; font-weight: 700; font-size: 18px; }
.spin { display: inline-block; width: 18px; height: 18px; border: 3px solid rgba(255,255,255,.4); border-top-color: #fff; border-radius: 50%; animation: spin .8s linear infinite; vertical-align: -3px; margin-right: 8px; }
@keyframes spin { to { transform: rotate(360deg); } }
.hidden { display: none !important; }
</style>
</head>
<body>
<div class="header">
  <canvas class="header-sky" data-starfield data-seed="714" data-region="0.8"></canvas>
  <nav class="nav"><div class="nav-inner">
    <a href="/version2/" class="nav-logo">Classicalia</a>
    <div class="nav-links">
      <a href="/version2/tracking/dashboard.html" class="nav-link">My progress</a>
      <div class="nav-div"></div>
      <div data-account-menu></div>
    </div>
  </div></nav>
  <div class="header-inner">
    <div class="header-eyebrow">Student</div>
    <h1 class="header-title">Weekly test</h1>
    <p class="header-deck">Answer every question in your own words, then submit to get your marks and feedback.</p>
  </div>
</div>

<div class="wrap">
  <div id="gate" class="gate hidden"></div>
  <div id="list" class="hidden"></div>
  <div id="test" class="hidden"></div>
</div>

<script src="/version2/assets/js/starfield.js"></script>
<script>
'use strict';
const sb = window.supabase;
const $ = (id)=>document.getElementById(id);
const esc = (s)=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function imgSrc(path){ if(!path) return ''; if(/^https?:\/\//.test(path)||path.startsWith('/')) return path; return sb.storage.from('weekly-test-images').getPublicUrl(path).data.publicUrl; }
const draftKey = (sid)=>'wt-draft-'+sid;

let me_id = null, openTests = [];

(async function init(){
  const { data: au } = await sb.auth.getUser();
  if(!au?.user){ $('gate').classList.remove('hidden'); $('gate').innerHTML='Please <a href="/auth/login.html">sign in</a> to take your weekly test.'; return; }
  me_id = au.user.id;
  const { data } = await sb.from('weekly_tests').select('*').eq('status','open').order('due_at',{ascending:true,nullsFirst:false});
  openTests = data || [];
  renderList();
})();

function renderList(){
  $('test').classList.add('hidden'); $('list').classList.remove('hidden');
  $('list').innerHTML = openTests.length
    ? openTests.map(t=>('<div class="card"><div class="testrow" data-t="'+t.id+'"><div><div class="tt">'+esc(t.title)+'</div><div class="muted">'+(t.due_at?('Due '+new Date(t.due_at).toLocaleString()):'No due date')+'</div></div><span style="flex:1"></span><span class="btn ghost">Open →</span></div></div>')).join('')
    : '<div class="card muted">No open tests right now. Check back when your teacher sets one.</div>';
  $('list').querySelectorAll('[data-t]').forEach(r=>r.addEventListener('click',()=>openTest(r.dataset.t)));
}

async function openTest(testId){
  const t = openTests.find(x=>x.id===testId);
  let { data: sub } = await sb.from('weekly_test_submissions').select('*').eq('test_id',testId).eq('student_id',me_id).maybeSingle();
  if(!sub){ const ins = await sb.from('weekly_test_submissions').insert({ test_id:testId, student_id:me_id }).select().single(); sub = ins.data; }
  const { data: qs } = await sb.from('weekly_test_questions').select('id,position,prompt,marks,image_path').eq('test_id',testId).order('position');
  const questions = qs||[];
  const { data: ans } = await sb.from('weekly_test_answers').select('*').eq('submission_id', sub.id);
  const answers = {}; (ans||[]).forEach(a=>answers[a.question_id]=a);

  $('list').classList.add('hidden'); $('test').classList.remove('hidden');
  if(sub.submitted_at){
    // already submitted — show the report
    const results = questions.map(q=>{ const a=answers[q.id]; return { question_id:q.id, status: a&&a.attempts>0?'marked':'blank', marks: a?a.final_marks:0, max:q.marks, rationale: a?a.ai_rationale:null }; });
    renderReport(t, questions, answers, results, sub);
  } else {
    renderTake(t, sub, questions, answers);
  }
}

function renderTake(t, sub, questions, answers){
  const totalMarks = questions.reduce((s,q)=>s+q.marks,0);
  let draft = {}; try { draft = JSON.parse(localStorage.getItem(draftKey(sub.id))||'{}'); } catch(e){}
  $('test').innerHTML =
    '<button class="btn ghost" id="back" style="margin-bottom:12px;">← All tests</button>' +
    '<h2 style="font-family:Lora,serif;font-style:italic;color:var(--navy);">'+esc(t.title)+'</h2>' +
    '<p class="muted" style="margin-bottom:14px;">'+questions.length+' questions · '+totalMarks+' marks. Answer them all, then submit once to get your marks.</p>' +
    questions.map((q,i)=>{
      const saved = (answers[q.id] && answers[q.id].answer_text) || draft[q.id] || '';
      return '<div class="card" data-q="'+q.id+'">' +
        '<div style="display:flex;gap:10px;"><span class="qmarks">Q'+(i+1)+'</span><span style="flex:1"></span><span class="qmarks">'+q.marks+' mark'+(q.marks>1?'s':'')+'</span></div>' +
        '<div class="qprompt" style="margin-top:6px;">'+esc(q.prompt)+'</div>' +
        (q.image_path?('<img class="qimg" src="'+imgSrc(q.image_path)+'" alt="source image">'):'') +
        '<textarea class="f" data-input="'+q.id+'" placeholder="Your answer…">'+esc(saved)+'</textarea>' +
      '</div>';
    }).join('') +
    '<div class="card submit-card"><button class="btn dark" id="submit">Submit &amp; get my marks</button>' +
      '<div class="muted" style="margin-top:8px;">You can\'t change your answers once you submit.</div>' +
      '<div class="fb hidden" id="submitFb"></div></div>';

  $('back').addEventListener('click', renderList);
  // save a local draft as they type, so nothing is lost if they navigate away
  $('test').querySelectorAll('[data-input]').forEach(ta=>ta.addEventListener('input',()=>{
    draft[ta.dataset.input] = ta.value;
    try { localStorage.setItem(draftKey(sub.id), JSON.stringify(draft)); } catch(e){}
  }));
  $('submit').addEventListener('click', ()=>submitTest(t, sub, questions, answers));
}

async function submitTest(t, sub, questions, answers){
  const inputs = [...$('test').querySelectorAll('[data-input]')];
  const payloadAnswers = inputs.map(ta=>({ question_id: ta.dataset.input, answer_text: ta.value.trim() }));
  const answered = payloadAnswers.filter(a=>a.answer_text).length;
  const fb = $('submitFb');
  if(answered === 0){ fb.className='fb info'; fb.classList.remove('hidden'); fb.textContent='Write at least one answer before submitting.'; return; }
  if(answered < questions.length && !confirm((questions.length-answered)+' question(s) are blank. Submit anyway?')) return;

  const btn = $('submit'); btn.disabled = true; btn.innerHTML = '<span class="spin"></span>Marking your paper…';
  fb.className='fb info'; fb.classList.remove('hidden'); fb.textContent='This can take up to a minute for a long test — please wait.';
  inputs.forEach(ta=>ta.disabled = true);

  const { data, error } = await sb.functions.invoke('mark-test', { body: { submission_id: sub.id, answers: payloadAnswers } });
  if(error){
    let msg = 'Could not mark your test — please try again.';
    try { const j = await error.context.json(); if(j&&j.error) msg=j.error; } catch(_){}
    btn.disabled = false; btn.textContent = 'Submit & get my marks'; inputs.forEach(ta=>ta.disabled=false);
    fb.className='fb zero'; fb.textContent = msg; return;
  }
  try { localStorage.removeItem(draftKey(sub.id)); } catch(e){}
  // refresh answers + show report
  const ansMap = {}; payloadAnswers.forEach(a=>ansMap[a.question_id]={ answer_text:a.answer_text });
  renderReport(t, questions, ansMap, data.results || [], { submitted_at: new Date().toISOString() }, data);
}

function renderReport(t, questions, answers, results, sub, meta){
  const byId = {}; results.forEach(r=>byId[r.question_id]=r);
  const total = (meta && meta.total_awarded != null) ? meta.total_awarded : results.reduce((s,r)=>s+(r.marks||0),0);
  const totalMarks = (meta && meta.total_marks != null) ? meta.total_marks : questions.reduce((s,q)=>s+q.marks,0);
  const paused = meta && meta.paused;
  $('test').innerHTML =
    '<button class="btn ghost" id="back" style="margin-bottom:12px;">← All tests</button>' +
    '<div class="card" style="text-align:center;"><div class="muted" style="font-size:11px;letter-spacing:.12em;text-transform:uppercase;">Your result</div>' +
      '<div class="total">'+total+' / '+totalMarks+'</div>' +
      '<div class="muted" style="margin-top:4px;">'+esc(t.title)+(sub.submitted_at?(' · submitted '+new Date(sub.submitted_at).toLocaleString()):'')+'</div>' +
      (paused?'<div class="fb info" style="margin-top:10px;">Some answers couldn\'t be auto-marked right now — your teacher will mark those.</div>':'') +
    '</div>' +
    questions.map((q,i)=>{
      const r = byId[q.id] || { status:'blank', marks:0, max:q.marks };
      const a = (answers[q.id] && answers[q.id].answer_text) || '';
      let cls='info', mark='—';
      if(r.status==='marked'){ mark=(r.marks==null?'—':r.marks)+' / '+q.marks; cls = r.marks>=q.marks?'good':(r.marks>0?'part':'zero'); }
      else if(r.status==='blank'){ mark='0 / '+q.marks; cls='zero'; }
      else if(r.status==='paused'){ mark='—'; cls='info'; }
      else if(r.status==='error'){ mark='—'; cls='info'; }
      const note = r.status==='blank' ? 'You left this blank.' : r.status==='paused' ? 'Your teacher will mark this one.' : r.status==='error' ? 'Couldn\'t mark this automatically.' : (r.rationale||'');
      return '<div class="card"><span class="markpill" style="color:'+(cls==='good'?'#15803d':cls==='part'?'#92500e':cls==='zero'?'#b91c1c':'#1e40af')+'">'+mark+'</span>' +
        '<span class="qmarks">Q'+(i+1)+'</span>' +
        '<div class="qprompt" style="margin-top:6px;">'+esc(q.prompt)+'</div>' +
        (a?('<div class="ans"><span class="lab">Your answer:</span> '+esc(a)+'</div>'):'<div class="ans muted">No answer given.</div>') +
        (note?('<div class="fb '+cls+'" style="margin-top:8px;">'+esc(note)+'</div>'):'') +
      '</div>';
    }).join('');
  $('back').addEventListener('click', renderList);
}
</script>
</body>
</html>
