<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly tests — Classicalia</title>
<link rel="icon" type="image/png" href="/images/favicon.png">
<link rel="stylesheet" href="/version2/assets/css/classicalia.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/version2/assets/js/supabase-client.js"></script>
<script src="/version2/assets/js/account-menu.js" defer></script>
<style>
body { background: var(--cream); }
.wrap { max-width: 920px; margin: 0 auto; padding: 28px 20px 90px; }
.gate { max-width: 520px; margin: 60px auto; background: var(--paper); border: 1px solid var(--rule); border-radius: 10px; padding: 28px; text-align: center; }
.row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
.spacer { flex: 1; }
label.lbl { display: block; font-size: 10.5px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); margin: 0 0 5px; }
input.f, select.f, textarea.f { width: 100%; font-family: 'DM Sans', sans-serif; font-size: 14px; padding: 9px 11px; border: 1.5px solid var(--rule); border-radius: 7px; background: var(--paper); color: var(--ink); outline: none; }
input.f:focus, select.f:focus, textarea.f:focus { border-color: var(--brand); }
textarea.f { resize: vertical; min-height: 56px; }
.btn { font-family: 'DM Sans', sans-serif; font-size: 13.5px; font-weight: 700; padding: 9px 16px; border-radius: 7px; border: none; background: var(--brand); color: #fff; cursor: pointer; }
.btn:hover { background: #155ee0; }
.btn.ghost { background: var(--paper); color: var(--ink); border: 1px solid var(--rule); font-weight: 600; }
.btn.ghost:hover { background: var(--cream); }
.btn.dark { background: var(--navy); }
.btn.danger { background: var(--paper); color: #b91c1c; border: 1px solid #fecaca; font-weight: 600; }
.btn.sm { font-size: 12px; padding: 6px 11px; }
.tabs { display: flex; gap: 6px; margin: 18px 0 16px; }
.tab { font-size: 13px; font-weight: 600; padding: 8px 16px; border-radius: 8px; border: 1px solid var(--rule); background: var(--paper); color: var(--muted); cursor: pointer; }
.tab.on { background: var(--navy); border-color: var(--navy); color: #fff; }
.card { background: var(--paper); border: 1px solid var(--rule); border-radius: 10px; padding: 18px 20px; margin-bottom: 14px; box-shadow: 0 1px 2px rgba(14,30,63,.04); }
.card h3 { font-family: 'Lora', serif; font-style: italic; font-weight: 700; font-size: 19px; color: var(--navy); margin: 0; }
.muted { color: var(--muted); font-size: 12.5px; }
.pillbadge { display: inline-block; font-size: 9.5px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; padding: 2px 8px; border-radius: 999px; }
.st-draft { background: var(--rule-faint); color: var(--muted); }
.st-open { background: #eef6ee; color: #2a6e2a; }
.st-closed { background: #fdecec; color: #b91c1c; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.grid4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
.qcard { border: 1px solid var(--rule); border-radius: 9px; padding: 14px 16px; margin-bottom: 12px; background: var(--cream); }
.sps { display: flex; flex-direction: column; gap: 6px; margin-top: 6px; }
.sp { display: flex; gap: 8px; align-items: center; }
.sp input.txt { flex: 1; }
.sp input.mk { width: 64px; }
.thumb { max-width: 160px; max-height: 110px; border-radius: 6px; border: 1px solid var(--rule); display: block; margin-top: 8px; }
table.tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
table.tbl th, table.tbl td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--rule-faint); }
table.tbl th { font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); }
tr.clickable { cursor: pointer; }
tr.clickable:hover { background: var(--cream); }
.bar { height: 8px; background: var(--rule-faint); border-radius: 4px; overflow: hidden; min-width: 80px; }
.bar > span { display: block; height: 100%; background: var(--brand); }
.toast { position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%); background: var(--navy); color: #fff; font-size: 13px; padding: 9px 18px; border-radius: 8px; opacity: 0; transition: opacity .2s; z-index: 100; }
.toast.show { opacity: 1; }
.hidden { display: none !important; }
</style>
</head>
<body>
<div class="header">
  <canvas class="header-sky" data-starfield data-seed="713" data-region="0.8"></canvas>
  <nav class="nav"><div class="nav-inner">
    <a href="/version2/" class="nav-logo">Classicalia</a>
    <div class="nav-links">
      <a href="/version2/tracking/teacher.html" class="nav-link">Classes</a>
      <a href="/version2/tools/" class="nav-link">Tools</a>
      <div class="nav-div"></div>
      <div data-account-menu></div>
    </div>
  </div></nav>
  <div class="header-inner">
    <div class="header-eyebrow">Teacher · Tools</div>
    <h1 class="header-title">Weekly tests</h1>
    <p class="header-deck">Write a short marked test, let Claude mark it against your scheme, and see how the class did.</p>
  </div>
</div>

<div class="wrap">
  <div id="gate" class="gate hidden"></div>

  <div id="app" class="hidden">
    <div class="row">
      <div style="min-width:240px;">
        <label class="lbl">Class</label>
        <select id="classSel" class="f"></select>
      </div>
      <div class="spacer"></div>
    </div>

    <div class="tabs">
      <button class="tab on" data-tab="build">Build</button>
      <button class="tab" data-tab="results">Results</button>
      <button class="tab" data-tab="usage">Usage &amp; cost</button>
    </div>

    <section id="tab-build"></section>
    <section id="tab-results" class="hidden"></section>
    <section id="tab-usage" class="hidden"></section>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="/version2/assets/js/starfield.js"></script>
<script>
'use strict';
const sb = window.supabase;
const $ = (id) => document.getElementById(id);
const esc = (s) => String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const money = (micros) => '£' + (Number(micros||0)/1e6).toFixed(2);
// Finer formatting so sub-penny amounts don't all read as £0.00.
const moneyFine = (micros) => { const p = Number(micros||0)/1e6; return '£' + (p >= 0.01 ? p.toFixed(2) : p.toFixed(4)); };
let toastT;
function toast(msg){ const t=$('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2200); }

function imgSrc(path){
  if(!path) return '';
  if(/^https?:\/\//.test(path) || path.startsWith('/')) return path;
  return sb.storage.from('weekly-test-images').getPublicUrl(path).data.publicUrl;
}

let me_id = null, classes = [], classId = null, tests = [], curTab = 'build';

(async function init(){
  const { data: au } = await sb.auth.getUser();
  const user = au?.user;
  if(!user){ return gate('Please <a href="/auth/login.html">sign in</a> as a teacher to manage weekly tests.'); }
  me_id = user.id;
  const { data: profile } = await sb.from('users').select('role').eq('id', user.id).single();
  if(!profile || profile.role !== 'teacher'){ return gate('This page is for teachers. If you\'re a teacher, ask an admin to set your role.'); }
  // Access flag — tolerant of the column not existing until migration 059 is applied.
  let allowed = true;
  const acc = await sb.from('users').select('can_set_weekly_tests').eq('id', user.id).single();
  if(!acc.error && acc.data) allowed = !!acc.data.can_set_weekly_tests;
  if(!allowed){ return gate('You don\'t have access to weekly tests yet. A site admin can switch it on for your account in the admin panel.'); }

  const { data: cls } = await sb.from('v2_classes').select('id,name,type').order('created_at');
  classes = cls || [];
  if(!classes.length){ return gate('You have no classes yet — create one on the <a href="/version2/tracking/teacher.html">Classes</a> page first.'); }

  $('app').classList.remove('hidden');
  $('classSel').innerHTML = classes.map(c=>`<option value="${c.id}">${esc(c.name)}</option>`).join('');
  classId = classes[0].id;
  $('classSel').addEventListener('change', async () => { classId = $('classSel').value; await loadTests(); render(); });
  document.querySelectorAll('.tab').forEach(b=>b.addEventListener('click',()=>{ curTab=b.dataset.tab; document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('on',x===b)); render(); }));
  await loadTests();
  render();
})();

function gate(html){ const g=$('gate'); g.innerHTML='<p style="font-size:15px;color:var(--ink);line-height:1.6;">'+html+'</p>'; g.classList.remove('hidden'); }

async function loadTests(){
  const { data } = await sb.from('weekly_tests').select('*').eq('class_id', classId).order('created_at',{ascending:false});
  tests = data || [];
}

function render(){
  $('tab-build').classList.toggle('hidden', curTab!=='build');
  $('tab-results').classList.toggle('hidden', curTab!=='results');
  $('tab-usage').classList.toggle('hidden', curTab!=='usage');
  if(curTab==='build') renderBuild();
  if(curTab==='results') renderResults();
  if(curTab==='usage') renderUsage();
}

// ─────────────────────────────── BUILD ───────────────────────────────
function renderBuild(){
  const root = $('tab-build');
  root.innerHTML =
    '<div class="row" style="margin-bottom:14px;"><h3 style="font-family:Lora,serif;font-style:italic;color:var(--navy);margin:0;">Tests for this class</h3><span class="spacer"></span><button class="btn" id="newTest">+ New test</button></div>' +
    (tests.length ? '' : '<p class="muted">No tests yet. Create one to get started.</p>') +
    tests.map(t=>(
      '<div class="card"><div class="row">' +
        '<div><h3>'+esc(t.title)+'</h3><div class="muted">'+(t.due_at?('Due '+new Date(t.due_at).toLocaleString()):'No due date')+'</div></div>' +
        '<span class="spacer"></span>' +
        '<span class="pillbadge st-'+t.status+'">'+t.status+'</span>' +
        '<button class="btn ghost sm" data-edit="'+t.id+'">Edit</button>' +
      '</div></div>'
    )).join('');
  $('newTest').addEventListener('click', async () => {
    const { data, error } = await sb.from('weekly_tests').insert({ teacher_id: me_id, class_id: classId, title: 'New weekly test' }).select().single();
    if(error) return toast('Could not create: '+error.message);
    tests.unshift(data); openEditor(data.id);
  });
  root.querySelectorAll('[data-edit]').forEach(b=>b.addEventListener('click',()=>openEditor(b.dataset.edit)));
}

async function openEditor(testId){
  const t = tests.find(x=>x.id===testId);
  const { data: qs } = await sb.from('weekly_test_questions').select('*').eq('test_id', testId).order('position');
  const questions = qs || [];
  // fetch mark schemes for these questions
  const ids = questions.map(q=>q.id);
  let schemes = {};
  if(ids.length){ const { data: sc } = await sb.from('weekly_test_mark_schemes').select('*').in('question_id', ids); (sc||[]).forEach(s=>schemes[s.question_id]=s); }

  const root = $('tab-build');
  root.innerHTML =
   '<button class="btn ghost sm" id="back">← All tests</button>' +
   '<div class="card" style="margin-top:12px;">' +
     '<div class="grid2">' +
       '<div><label class="lbl">Title</label><input class="f" id="e_title" value="'+esc(t.title)+'"></div>' +
       '<div><label class="lbl">Due date</label><input class="f" id="e_due" type="datetime-local" value="'+(t.due_at?new Date(t.due_at).toISOString().slice(0,16):'')+'"></div>' +
     '</div>' +
     '<div class="grid4" style="margin-top:12px;">' +
       '<div><label class="lbl">Status</label><select class="f" id="e_status">'+['draft','open','closed'].map(s=>'<option '+(t.status===s?'selected':'')+'>'+s+'</option>').join('')+'</select></div>' +
       '<div><label class="lbl">Attempts / question</label><input class="f" id="e_att" type="number" min="1" max="5" value="'+t.max_attempts_per_question+'"></div>' +
       '<div><label class="lbl">Max answer length</label><input class="f" id="e_len" type="number" min="100" max="4000" value="'+t.max_answer_chars+'"></div>' +
       '<div style="display:flex;align-items:flex-end;"><button class="btn" id="saveTest">Save test</button></div>' +
     '</div>' +
     '<p class="muted" id="estCost" style="margin-top:10px;"></p>' +
   '</div>' +
   '<div class="row" style="margin:6px 0 10px;"><h3 style="font-family:Lora,serif;font-style:italic;color:var(--navy);margin:0;">Questions</h3><span class="spacer"></span><button class="btn" id="addQ">+ Add question</button></div>' +
   '<div id="qlist"></div>';

  $('back').addEventListener('click', renderBuild);
  $('saveTest').addEventListener('click', async () => {
    const patch = {
      title: $('e_title').value.trim() || 'Untitled',
      due_at: $('e_due').value ? new Date($('e_due').value).toISOString() : null,
      status: $('e_status').value,
      max_attempts_per_question: Math.max(1,Math.min(5, +$('e_att').value||1)),
      max_answer_chars: Math.max(100,Math.min(4000, +$('e_len').value||1200)),
    };
    const { error } = await sb.from('weekly_tests').update(patch).eq('id', testId);
    if(error) return toast('Save failed: '+error.message);
    Object.assign(t, patch); toast('Saved');
  });
  $('addQ').addEventListener('click', async () => {
    const pos = questions.length;
    const { data, error } = await sb.from('weekly_test_questions').insert({ test_id: testId, position: pos, prompt: '', marks: 1 }).select().single();
    if(error) return toast('Could not add: '+error.message);
    questions.push(data); schemes[data.id] = { question_id:data.id, scheme_points:[], model_answer:'', marking_notes:'' };
    drawQuestions();
  });

  const studentCount = await classMemberCount(classId);
  function updateEst(){
    const calls = questions.length * Math.max(1, studentCount) * (+($('e_att')?.value)||1);
    // ~£0.004/call on sonnet (conservative)
    $('estCost').textContent = 'Estimated cost of one full run: ~' + money(calls*4050) + ' (' + calls + ' markings) — capped by your monthly budget on the Usage tab.';
  }
  ['e_att'].forEach(id=>$(id).addEventListener('input',updateEst));
  updateEst();

  function drawQuestions(){
    const list = $('qlist');
    list.innerHTML = questions.map((q,i)=>qEditorHTML(q, schemes[q.id]||{scheme_points:[]}, i)).join('') || '<p class="muted">No questions yet.</p>';
    questions.forEach((q)=>wireQ(q));
    updateEst();
  }
  function qEditorHTML(q, sc, i){
    const pts = Array.isArray(sc.scheme_points)?sc.scheme_points:[];
    return '<div class="qcard" data-q="'+q.id+'">' +
      '<div class="row"><b style="color:var(--navy);">Q'+(i+1)+'</b><span class="spacer"></span><button class="btn danger sm" data-del="'+q.id+'">Delete</button></div>' +
      '<div style="margin-top:8px;"><label class="lbl">Question / prompt</label><textarea class="f" data-f="prompt">'+esc(q.prompt)+'</textarea></div>' +
      '<div style="margin-top:10px;"><label class="lbl">Marking style</label>' +
        '<select class="f" data-f="style">' +
          '<option value="points"'+(q.mark_style==='translation'?'':' selected')+'>Points-based — credit scheme points (Civ / comprehension)</option>' +
          '<option value="translation"'+(q.mark_style==='translation'?' selected':'')+'>Translation — holistic band /5 (Latin / Greek)</option>' +
        '</select>' +
        '<div class="muted" data-styhint style="margin-top:4px;font-size:12px;">'+styleHint(q.mark_style)+'</div>' +
      '</div>' +
      '<div class="grid4" style="margin-top:10px;">' +
        '<div><label class="lbl">Marks</label><input class="f" type="number" min="1" max="10" data-f="marks" value="'+q.marks+'"></div>' +
        '<div style="grid-column:span 2;"><label class="lbl">Image (optional)</label><input class="f" type="file" accept="image/*" data-f="imgfile"></div>' +
        '<div style="display:flex;align-items:flex-end;gap:6px;"><label class="muted" style="display:flex;align-items:center;gap:6px;"><input type="checkbox" data-f="mwi" '+(q.mark_with_image?'checked':'')+'> show image to marker</label></div>' +
      '</div>' +
      (q.image_path?('<img class="thumb" src="'+imgSrc(q.image_path)+'" alt="">'):'') +
      '<div style="margin-top:10px;"><label class="lbl">Mark scheme — creditworthy points</label><div class="sps" data-pts>'+
        pts.map(p=>spRow(p)).join('')+'</div><button class="btn ghost sm" data-addpt style="margin-top:6px;">+ point</button></div>' +
      '<div class="grid2" style="margin-top:10px;">' +
        '<div><label class="lbl" data-modellabel>'+(q.mark_style==='translation'?'Correct translation (required)':'Model answer (optional)')+'</label><textarea class="f" data-f="model">'+esc(sc.model_answer||'')+'</textarea></div>' +
        '<div><label class="lbl">Marking notes (optional)</label><textarea class="f" data-f="notes">'+esc(sc.marking_notes||'')+'</textarea></div>' +
      '</div>' +
      '<div class="row" style="margin-top:10px;"><span class="spacer"></span><button class="btn" data-save="'+q.id+'">Save question</button></div>' +
    '</div>';
  }
  function spRow(p){ return '<div class="sp"><input class="f txt" placeholder="creditworthy point" value="'+esc(p&&p.text||'')+'"><input class="f mk" type="number" min="1" placeholder="mk" value="'+(p&&p.marks||'')+'"><button class="btn danger sm" data-rmpt>×</button></div>'; }
  function styleHint(style){
    return style==='translation'
      ? 'Put the Latin/Greek in the prompt and the correct English in <b>Correct translation</b>. Marked holistically out of 5 by proportion of sense (OCR J282/J292 grid) — set marks to <b>5</b>. Creditworthy points are ignored.'
      : 'The AI credits each creditworthy point the student conveys, allowing synonyms and paraphrase.';
  }

  function wireQ(q){
    const card = $('qlist').querySelector('[data-q="'+q.id+'"]'); if(!card) return;
    card.querySelector('[data-del]').addEventListener('click', async ()=>{
      if(!confirm('Delete this question?')) return;
      await sb.from('weekly_test_questions').delete().eq('id', q.id);
      const idx=questions.findIndex(x=>x.id===q.id); if(idx>=0) questions.splice(idx,1); delete schemes[q.id]; drawQuestions();
    });
    const styleSel = card.querySelector('[data-f="style"]');
    styleSel.addEventListener('change', ()=>{
      const tr = styleSel.value==='translation';
      card.querySelector('[data-styhint]').innerHTML = styleHint(styleSel.value);
      const ml = card.querySelector('[data-modellabel]'); if(ml) ml.textContent = tr ? 'Correct translation (required)' : 'Model answer (optional)';
      const mk = card.querySelector('[data-f="marks"]'); if(tr && (+mk.value||1) < 2) mk.value = 5;
    });
    card.querySelector('[data-addpt]').addEventListener('click', ()=>{ card.querySelector('[data-pts]').insertAdjacentHTML('beforeend', spRow({})); bindPts(); });
    function bindPts(){ card.querySelectorAll('[data-rmpt]').forEach(b=>b.onclick=()=>b.closest('.sp').remove()); }
    bindPts();
    const fileInput = card.querySelector('[data-f="imgfile"]');
    fileInput.addEventListener('change', async ()=>{
      const file = fileInput.files[0]; if(!file) return;
      const path = me_id+'/'+testId+'/'+crypto.randomUUID()+'-'+file.name.replace(/[^a-zA-Z0-9._-]/g,'_');
      const { error } = await sb.storage.from('weekly-test-images').upload(path, file);
      if(error) return toast('Upload failed: '+error.message);
      q.image_path = path; await sb.from('weekly_test_questions').update({ image_path: path }).eq('id', q.id); drawQuestions(); toast('Image uploaded');
    });
    card.querySelector('[data-save]').addEventListener('click', async ()=>{
      const marks = Math.max(1,Math.min(10, +card.querySelector('[data-f="marks"]').value||1));
      const qpatch = { prompt: card.querySelector('[data-f="prompt"]').value.trim(), marks, mark_with_image: card.querySelector('[data-f="mwi"]').checked, mark_style: card.querySelector('[data-f="style"]').value };
      await sb.from('weekly_test_questions').update(qpatch).eq('id', q.id); Object.assign(q, qpatch);
      const points = [...card.querySelectorAll('.sp')].map(r=>({ text: r.querySelector('.txt').value.trim(), marks: +r.querySelector('.mk').value||undefined })).filter(p=>p.text);
      const spatch = { question_id:q.id, scheme_points: points, model_answer: card.querySelector('[data-f="model"]').value.trim(), marking_notes: card.querySelector('[data-f="notes"]').value.trim(), updated_at: new Date().toISOString() };
      await sb.from('weekly_test_mark_schemes').upsert(spatch, { onConflict:'question_id' }); schemes[q.id]=spatch;
      toast('Question saved');
    });
  }
  drawQuestions();
}

async function classMemberCount(cid){
  const { count } = await sb.from('v2_class_members').select('student_id',{count:'exact',head:true}).eq('class_id', cid);
  return count||0;
}

// ─────────────────────────────── RESULTS ───────────────────────────────
async function renderResults(){
  const root = $('tab-results');
  root.innerHTML = '<div class="row" style="margin-bottom:12px;"><label class="lbl" style="margin:0 8px 0 0;">Test</label><select class="f" id="rTest" style="max-width:320px;"></select></div><div id="rBody"></div>';
  $('rTest').innerHTML = tests.map(t=>`<option value="${t.id}">${esc(t.title)} (${t.status})</option>`).join('') || '<option>No tests</option>';
  $('rTest').addEventListener('change', ()=>drawResults($('rTest').value));
  if(tests.length) drawResults(tests[0].id);
}
async function drawResults(testId){
  const t = tests.find(x=>x.id===testId); if(!t) return;
  const { data: qs } = await sb.from('weekly_test_questions').select('id,position,prompt,marks').eq('test_id',testId).order('position');
  const questions = qs||[];
  const { data: subs } = await sb.from('weekly_test_submissions').select('id,student_id,submitted_at,total_awarded').eq('test_id',testId);
  const submissions = subs||[];
  const subIds = submissions.map(s=>s.id);
  let answers = [];
  if(subIds.length){ const { data: a } = await sb.from('weekly_test_answers').select('*').in('submission_id', subIds); answers = a||[]; }
  // names
  const sids = submissions.map(s=>s.student_id);
  let names = {};
  if(sids.length){ const { data: us } = await sb.from('users').select('id,full_name,email').in('id', sids); (us||[]).forEach(u=>names[u.id]=u.full_name||u.email||'student'); }

  const totalMarks = questions.reduce((s,q)=>s+q.marks,0);
  // per-question average
  const perQ = questions.map(q=>{ const aa=answers.filter(a=>a.question_id===q.id && a.final_marks!=null); const avg = aa.length? aa.reduce((s,a)=>s+a.final_marks,0)/aa.length : null; return { q, n:aa.length, avg }; });

  const body = $('rBody');
  body.innerHTML =
   '<div class="card"><h3>Per-question average</h3><table class="tbl"><thead><tr><th>#</th><th>Question</th><th>Avg</th><th>Marks</th><th>Answered</th></tr></thead><tbody>' +
   perQ.map((p,i)=>('<tr><td>'+(i+1)+'</td><td>'+esc((p.q.prompt||'').slice(0,80))+'</td><td>'+(p.avg==null?'—':p.avg.toFixed(1)+'/'+p.q.marks)+'</td><td><div class="bar"><span style="width:'+(p.avg==null?0:Math.round(p.avg/p.q.marks*100))+'%"></span></div></td><td>'+p.n+'</td></tr>')).join('') +
   '</tbody></table></div>' +
   '<div class="card"><h3>Students ('+submissions.length+')</h3><table class="tbl"><thead><tr><th>Student</th><th>Score</th><th>Submitted</th></tr></thead><tbody>' +
   (submissions.length? submissions.map(s=>{ const got=answers.filter(a=>a.submission_id===s.id).reduce((x,a)=>x+(a.final_marks||0),0); return '<tr class="clickable" data-sub="'+s.id+'" data-sid="'+s.student_id+'"><td>'+esc(names[s.student_id]||'student')+'</td><td>'+got+' / '+totalMarks+'</td><td>'+(s.submitted_at?new Date(s.submitted_at).toLocaleString():'in progress')+'</td></tr>'; }).join('') : '<tr><td colspan="3" class="muted">No submissions yet.</td></tr>') +
   '</tbody></table></div><div id="drill"></div>';
  body.querySelectorAll('[data-sub]').forEach(tr=>tr.addEventListener('click',()=>drill(tr.dataset.sub, names[tr.dataset.sid]||'student', questions, answers.filter(a=>a.submission_id===tr.dataset.sub))));
}
function drill(subId, name, questions, answers){
  const d = $('drill');
  d.innerHTML = '<div class="card"><h3>'+esc(name)+'</h3>' + questions.map(q=>{
    const a = answers.find(x=>x.question_id===q.id);
    if(!a) return '<div class="qcard"><b>Q:</b> '+esc((q.prompt||'').slice(0,120))+'<div class="muted">Not answered.</div></div>';
    return '<div class="qcard"><b>Q:</b> '+esc(q.prompt)+
      '<div style="margin-top:6px;"><span class="muted">Answer:</span> '+esc(a.answer_text)+'</div>' +
      '<div style="margin-top:6px;"><span class="muted">AI:</span> '+(a.ai_marks==null?'—':a.ai_marks)+'/'+q.marks+' — '+esc(a.ai_rationale||'')+'</div>' +
      '<div class="row" style="margin-top:8px;"><label class="lbl" style="margin:0;">Final mark</label><input class="f" style="width:80px;" type="number" min="0" max="'+q.marks+'" value="'+(a.final_marks==null?'':a.final_marks)+'" data-fm="'+a.id+'"><span class="muted" data-marked="'+a.id+'">'+(a.marked_by==='teacher'?'(overridden)':'(AI)')+'</span></div>' +
      '<div style="margin-top:8px;"><label class="lbl" style="margin:0 0 4px;">Feedback to student</label><textarea class="f" data-fr="'+a.id+'" rows="2" style="width:100%;">'+esc(a.teacher_rationale||a.ai_rationale||'')+'</textarea></div>' +
      '<div class="row" style="margin-top:8px;"><span class="spacer"></span><button class="btn sm" data-savefm="'+a.id+'">Save mark &amp; feedback</button></div>' +
    '</div>';
  }).join('') + '</div>';
  d.querySelectorAll('[data-savefm]').forEach(b=>b.addEventListener('click', async ()=>{
    const id = b.dataset.savefm;
    const inp = d.querySelector('[data-fm="'+id+'"]'); const v = inp.value===''?null:Math.max(0,+inp.value);
    const fr = d.querySelector('[data-fr="'+id+'"]').value.trim();
    const { error } = await sb.from('weekly_test_answers').update({ final_marks: v, teacher_rationale: fr||null, marked_by:'teacher', updated_at:new Date().toISOString() }).eq('id', id);
    if(error) return toast('Save failed: '+error.message);
    const a = answers.find(x=>x.id===id); if(a){ a.final_marks=v; a.teacher_rationale=fr||null; a.marked_by='teacher'; }
    const lbl = d.querySelector('[data-marked="'+id+'"]'); if(lbl) lbl.textContent='(overridden)';
    toast('Saved');
  }));
}

// ─────────────────────────────── USAGE ───────────────────────────────
async function renderUsage(){
  const root = $('tab-usage');
  const monthStart = new Date(); monthStart.setUTCDate(1); monthStart.setUTCHours(0,0,0,0);
  const { data: usage } = await sb.from('weekly_test_marking_usage').select('cost_micros,input_tokens,output_tokens,test_id,created_at').eq('teacher_id', me_id).gte('created_at', monthStart.toISOString());
  const rows = usage||[];
  const spent = rows.reduce((s,r)=>s+Number(r.cost_micros||0),0);
  const totalTokens = rows.reduce((s,r)=>s+Number(r.input_tokens||0)+Number(r.output_tokens||0),0);
  const { data: bud } = await sb.from('weekly_test_budget').select('*').eq('teacher_id', me_id).maybeSingle();
  const cap = bud?.monthly_cost_cap_micros ?? 5000000;
  const callCap = bud?.monthly_call_cap ?? 5000;
  const byTest = {}; rows.forEach(r=>{ byTest[r.test_id]=(byTest[r.test_id]||0)+Number(r.cost_micros||0); });
  const tname = (id)=> (tests.find(t=>t.id===id)?.title) || '—';
  root.innerHTML =
   '<div class="card"><h3>This month</h3>' +
     '<p style="font-family:Lora,serif;font-style:italic;font-size:26px;color:var(--navy);margin:6px 0 2px;">'+moneyFine(spent)+' <span style="font-size:14px;color:var(--muted);">of '+money(cap)+'</span></p>' +
     '<div class="bar" style="max-width:360px;"><span style="width:'+Math.min(100,Math.round(spent/cap*100))+'%;'+(spent>=cap?'background:#dc2626;':'')+'"></span></div>' +
     '<p class="muted" style="margin-top:8px;">'+rows.length+' marking'+(rows.length===1?'':'s')+' · '+totalTokens.toLocaleString()+' tokens this month (cap: '+callCap+' markings). Each answer costs roughly half a penny — when you hit the cap, marking pauses and students see "your teacher will mark this".</p>' +
   '</div>' +
   '<div class="card"><h3>By test</h3><table class="tbl"><thead><tr><th>Test</th><th>Spend</th></tr></thead><tbody>'+
     (Object.keys(byTest).length? Object.entries(byTest).map(([id,c])=>'<tr><td>'+esc(tname(id))+'</td><td>'+moneyFine(c)+'</td></tr>').join('') : '<tr><td colspan="2" class="muted">No marking yet this month.</td></tr>')+
   '</tbody></table></div>' +
   '<div class="card"><h3>Budget</h3><div class="grid2"><div><label class="lbl">Monthly cap (£)</label><input class="f" id="b_cost" type="number" min="0" step="0.5" value="'+(cap/1e6).toFixed(2)+'"></div><div><label class="lbl">Max markings / month</label><input class="f" id="b_calls" type="number" min="0" value="'+callCap+'"></div></div>' +
     '<div class="row" style="margin-top:10px;"><span class="spacer"></span><button class="btn" id="saveBudget">Save budget</button></div>' +
     '<p class="muted" style="margin-top:8px;">Also set a hard spend limit on your <b>Anthropic Console</b> workspace as a final backstop.</p></div>';
  $('saveBudget').addEventListener('click', async ()=>{
    const patch = { teacher_id: me_id, monthly_cost_cap_micros: Math.round((+$('b_cost').value||0)*1e6), monthly_call_cap: Math.max(0,+$('b_calls').value||0), updated_at:new Date().toISOString() };
    const { error } = await sb.from('weekly_test_budget').upsert(patch, { onConflict:'teacher_id' });
    if(error) return toast('Save failed: '+error.message);
    toast('Budget saved');
  });
}
</script>
