<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- ═══════════════════════════════════════════════════
     BOOKLET METADATA — edit these four lines only
     ═══════════════════════════════════════════════════ -->
<title>Death and Burial: Greece — Classicalia</title>
<meta name="booklet-eyebrow"  content="GCSE Classical Civilisation · Myth and Religion · Topic 1.7">
<meta name="booklet-title"    content="Death and Burial — Greece">
<meta name="booklet-deck"     content="Preparation of the body, the funeral procession, burial and cremation, grave stelai, and the festivals of the dead — from death to remembrance in ancient Greece.">
<meta name="booklet-pdf"      content="death-and-burial.pdf">
<!-- tags: add as many as you like, comma-separated -->
<meta name="booklet-tags"     content="14 pages, 10 sections, OCR J199/11, Topic 1.7">
<!-- subject for nav active state: latin | greek | classciv -->
<meta name="booklet-subject"  content="classciv">
<!-- ═══════════════════════════════════════════════════ -->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/version2/assets/css/classicalia.css">

<style>
body {
  margin: 0;
  background: var(--cream);
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* ── Resource header ── */
.resource-header {
  background: var(--navy);
  position: relative;
  overflow: hidden;
  padding: 76px 0 40px;
  flex-shrink: 0;
}
.resource-header-dots { position: absolute; inset: 0; pointer-events: none; }
.resource-header-inner {
  max-width: 1080px;
  margin: 0 auto;
  padding: 0 40px;
  position: relative;
  z-index: 2;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 40px;
  align-items: center;
}
.resource-eyebrow {
  font-size: 10.5px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: #6ba0ff;
  font-weight: 700;
  margin-bottom: 10px;
  opacity: 0.85;
}
.resource-title {
  font-family: 'Lora', serif;
  font-style: italic;
  font-weight: 700;
  font-size: 38px;
  color: white;
  line-height: 1.1;
  letter-spacing: -0.02em;
  margin-bottom: 10px;
}
.resource-deck {
  font-family: 'Lora', serif;
  font-style: italic;
  color: #8fa8cc;
  font-size: 13px;
  line-height: 1.7;
  max-width: 56ch;
  margin-bottom: 18px;
}
.resource-tags {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.resource-tag {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 3px 10px;
  border-radius: 2px;
  background: rgba(255,255,255,0.07);
  color: rgba(255,255,255,0.55);
  border: 1px solid rgba(255,255,255,0.12);
}

/* download button */
.btn-download {
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 700;
  color: var(--navy);
  background: white;
  padding: 11px 22px;
  border-radius: 5px;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  white-space: nowrap;
  flex-shrink: 0;
  transition: background 0.12s;
}
.btn-download:hover { background: #eef3ff; }
.btn-download svg { width: 15px; height: 15px; flex-shrink: 0; }

/* ── PDF viewer ── */
.pdf-viewer {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: #3a3a3a;
  min-height: calc(100vh - 200px);
}
.pdf-viewer iframe {
  flex: 1;
  width: 100%;
  border: none;
  min-height: calc(100vh - 200px);
}

/* fallback message */
.pdf-fallback {
  display: none;
  text-align: center;
  padding: 60px 40px;
  color: #aaa;
}
.pdf-fallback a {
  color: var(--brand);
  font-weight: 600;
  text-decoration: underline;
}
</style>
</head>
<body>

<!-- ── Nav / resource header (built from meta tags by JS) ── -->
<div class="resource-header">
  <div class="resource-header-dots">
    <svg width="100%" height="100%" viewBox="0 0 1440 200" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
      <g stroke="#9bbcff" stroke-width="0.9" fill="none" opacity="0.28">
        <polyline points="860,18 960,58 1100,20 1200,75 1280,30 1380,70"/>
        <line x1="960" y1="58" x2="980" y2="155"/>
        <line x1="1200" y1="75" x2="1180" y2="160"/>
        <polyline points="1060,100 1160,135 1310,90 1400,125"/>
      </g>
      <g fill="#1A6FFF" stroke="#9bbcff" stroke-width="0.8" opacity="0.45">
        <circle cx="860" cy="18" r="2"/><circle cx="960" cy="58" r="2.5"/><circle cx="1100" cy="20" r="3"/>
        <circle cx="1200" cy="75" r="2"/><circle cx="1280" cy="30" r="2"/><circle cx="1380" cy="70" r="2"/>
        <circle cx="980" cy="155" r="1.5"/><circle cx="1180" cy="160" r="1.5"/>
        <circle cx="1060" cy="100" r="2"/><circle cx="1160" cy="135" r="2"/>
      </g>
    </svg>
  </div>

  <nav class="nav">
    <div class="nav-inner">
      <a href="/version2/" class="nav-logo">Classicalia</a>
      <div class="nav-links" id="navLinks">
        <a href="/version2/subjects/latin/" class="nav-link" data-subject="latin">Latin</a>
        <a href="/version2/subjects/greek/" class="nav-link" data-subject="greek">Greek</a>
        <a href="/version2/subjects/classical-civilisation/" class="nav-link" data-subject="classciv">Class. Civ.</a>
        <div class="nav-div"></div>
        <a href="#" class="nav-link">Tools</a>
        <a href="#" class="nav-link">About</a>
        <a href="#" class="nav-cta">Sign in</a>
      </div>
    </div>
  </nav>

  <div class="resource-header-inner">
    <div>
      <div class="resource-eyebrow" id="hdrEyebrow"></div>
      <div class="resource-title" id="hdrTitle"></div>
      <p class="resource-deck" id="hdrDeck"></p>
      <div class="resource-tags" id="hdrTags"></div>
    </div>
    <a class="btn-download" id="btnDownload" href="#" download>
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 16h12M10 3v10M6 9l4 4 4-4"/>
      </svg>
      Download PDF
    </a>
  </div>
</div>

<!-- ── PDF viewer ── -->
<div class="pdf-viewer">
  <iframe id="pdfFrame" title="Booklet PDF viewer" allowfullscreen></iframe>
  <div class="pdf-fallback" id="pdfFallback">
    <p>Your browser couldn't display the PDF inline.<br>
    <a id="fallbackLink" href="#">Click here to open it directly.</a></p>
  </div>
</div>

<script>
// ── Read metadata ──
function getMeta(name) {
  const el = document.querySelector(`meta[name="${name}"]`);
  return el ? el.getAttribute('content') : '';
}

const eyebrow = getMeta('booklet-eyebrow');
const title   = getMeta('booklet-title');
const deck    = getMeta('booklet-deck');
const pdf     = getMeta('booklet-pdf');
const tags    = getMeta('booklet-tags');
const subject = getMeta('booklet-subject');

// ── Populate header ──
document.getElementById('hdrEyebrow').textContent = eyebrow;
document.getElementById('hdrTitle').textContent   = title;
document.getElementById('hdrDeck').textContent    = deck;

tags.split(',').forEach(tag => {
  const span = document.createElement('span');
  span.className = 'resource-tag';
  span.textContent = tag.trim();
  document.getElementById('hdrTags').appendChild(span);
});

// ── Set PDF src ──
document.getElementById('pdfFrame').src     = pdf;
document.getElementById('btnDownload').href = pdf;
document.getElementById('fallbackLink').href = pdf;

// ── Active nav link ──
document.querySelectorAll('.nav-link[data-subject]').forEach(link => {
  if (link.dataset.subject === subject) link.classList.add('active');
});

// ── Show fallback if iframe fails ──
document.getElementById('pdfFrame').addEventListener('error', () => {
  document.getElementById('pdfFrame').style.display = 'none';
  document.getElementById('pdfFallback').style.display = 'block';
});
</script>
</body>
</html>
