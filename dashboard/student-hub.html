<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Hub - Classicalia</title>
    <meta name="description" content="Track your progress, earn XP, and compete on leaderboards as you learn Latin, Greek, and Classical Civilisation.">
    <link rel="icon" type="image/png" href="../images/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../shared/google-theme.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Page-specific styles */
        .loading-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            flex-direction: column;
            gap: 1rem;
        }

        .loading-page .spinner {
            width: 40px;
            height: 40px;
        }

        .quick-actions {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }

        .class-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .class-card {
            background: var(--g-card-bg);
            border: 1px solid var(--g-border);
            border-radius: var(--g-radius);
            padding: var(--g-space-24);
            transition: box-shadow var(--g-transition);
        }

        .class-card:hover {
            box-shadow: var(--g-shadow-hover);
        }

        .class-card-name {
            font-size: 16px;
            font-weight: 500;
            color: var(--g-text);
            margin-bottom: 0.5rem;
        }

        .class-card-meta {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .class-card-students {
            font-size: var(--g-font-size-sm);
            color: var(--g-text-secondary);
        }

        .join-form {
            display: flex;
            gap: 0.75rem;
        }

        .join-form .form-input {
            flex: 1;
            text-transform: uppercase;
        }

        .join-message {
            margin-top: 0.75rem;
            font-size: var(--g-font-size);
            padding: 0.5rem 0.75rem;
            border-radius: var(--g-radius-sm);
        }

        .join-message.success {
            background: var(--g-green-light);
            color: #047857;
        }

        .join-message.error {
            background: var(--g-red-light);
            color: #b91c1c;
        }

        .announcements-section {
            margin-bottom: 1.5rem;
        }

        .announcement-title {
            font-weight: 500;
            margin-bottom: 0.25rem;
        }

        .announcement-date {
            font-size: var(--g-font-size-sm);
            color: var(--g-text-secondary);
        }

        @media (max-width: 600px) {
            .join-form { flex-direction: column; }
            .class-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <!-- Top Bar -->
    <div class="top-bar">
        <a href="../index.html" class="top-bar-brand">Classicalia</a>
        <div class="top-bar-nav">
            <a href="my-essays.html">My Essays</a>
            <a href="my-profile.html">My Profile</a>
            <a href="../index.html">Home</a>
        </div>
        <div class="top-bar-actions">
            <span class="user-name" id="topBarUserName"></span>
        </div>
    </div>

    <!-- Loading State -->
    <div id="loading" class="loading-page">
        <div class="spinner"></div>
        <p class="text-muted">Loading your classes...</p>
    </div>

    <!-- Main Content -->
    <div id="content" class="container" style="display: none; padding-top: 1.5rem; padding-bottom: 3rem;">

        <!-- Stats Row -->
        <div class="stats-row mb-24" id="statsRow">
            <div class="metric-card">
                <div class="metric-value" id="statXp">0</div>
                <div class="metric-label">XP</div>
            </div>
            <div class="metric-card">
                <div class="metric-value" id="statLevel">1</div>
                <div class="metric-label">Level</div>
            </div>
            <div class="metric-card">
                <div class="metric-value" id="statClasses">0</div>
                <div class="metric-label">Classes</div>
            </div>
            <div class="metric-card">
                <div class="metric-value" id="statStreak">0</div>
                <div class="metric-label">Streak</div>
            </div>
        </div>

        <!-- Announcements -->
        <div class="announcements-section" id="announcementsSection" style="display: none;">
            <h3 class="section-title">Announcements</h3>
            <div id="announcementsList">
                <!-- Populated dynamically -->
            </div>
        </div>

        <!-- Quick Actions -->
        <div class="quick-actions" id="quickActions" style="display: none;">
            <a href="my-profile.html" class="btn btn-secondary">Customise Profile</a>
        </div>

        <!-- Your Classes -->
        <h3 class="section-title">Your Classes</h3>
        <div id="classesGrid" class="class-grid">
            <!-- Class cards inserted here -->
        </div>

        <!-- Join Class -->
        <div class="card">
            <div class="card-header">
                <h3 class="card-title" style="margin: 0;">Join a Class</h3>
            </div>
            <div class="card-body">
                <div class="join-form">
                    <input type="text" id="joinCodeInput" class="form-input" placeholder="Enter class code (e.g. LATIN-7X)">
                    <button onclick="joinClass()" class="btn btn-primary">Join Class</button>
                </div>
                <div id="joinMessage" class="join-message" style="display: none;"></div>
            </div>
        </div>
    </div>

    <script src="../auth/config.js"></script>
    <script src="../shared/xp-system.js"></script>
    <script>
        let currentUser = null;
        let userClasses = [];

        // Type configuration with new type values
        const typeConfig = {
            'latin-prep': {
                chipLabel: 'Prep Latin',
                chipClass: 'chip-blue'
            },
            'latin-gcse': {
                chipLabel: 'GCSE Latin',
                chipClass: 'chip-blue'
            },
            'latin-alevel': {
                chipLabel: 'A Level Latin',
                chipClass: 'chip-blue'
            },
            'greek-gcse': {
                chipLabel: 'GCSE Greek',
                chipClass: 'chip-green'
            },
            'greek-alevel': {
                chipLabel: 'A Level Greek',
                chipClass: 'chip-green'
            },
            'civ-gcse': {
                chipLabel: 'GCSE Civ',
                chipClass: 'chip-yellow'
            },
            'civ-alevel': {
                chipLabel: 'A Level Civ',
                chipClass: 'chip-yellow'
            },
            // Legacy fallbacks
            latin: {
                chipLabel: 'Latin',
                chipClass: 'chip-blue'
            },
            'prep-latin': {
                chipLabel: 'Prep Latin',
                chipClass: 'chip-blue'
            },
            greek: {
                chipLabel: 'Greek',
                chipClass: 'chip-green'
            },
            classics: {
                chipLabel: 'Classical Civ',
                chipClass: 'chip-yellow'
            }
        };

        // Initialize
        async function init() {
            try {
                const { data: { user }, error: authError } = await supabase.auth.getUser();

                if (!user) {
                    window.location.href = '../auth/login.html';
                    return;
                }

                currentUser = user;

                // Get user profile
                const { data: profile } = await supabase
                    .from('users')
                    .select('full_name, school')
                    .eq('id', user.id)
                    .single();

                if (profile && profile.full_name) {
                    const firstName = profile.full_name.split(' ')[0];
                    document.getElementById('topBarUserName').textContent = firstName;
                }

                // Prompt for school if not set
                if (profile && !profile.school) {
                    showSchoolPrompt(user.id);
                }

                // Load classes, XP, and announcements
                await Promise.all([
                    loadClasses(),
                    loadXpData(),
                    loadAnnouncements()
                ]);

                // Show content
                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';
            } catch (err) {
                console.error('Init error:', err);
                document.getElementById('loading').innerHTML = '<p class="text-muted">Error loading page. Please try again.</p>';
            }
        }

        // Load user's classes
        async function loadClasses() {
            const { data: memberships, error } = await supabase
                .from('class_members')
                .select(`
                    class_id,
                    classes (
                        id,
                        name,
                        type
                    )
                `)
                .eq('student_id', currentUser.id);

            if (error || !memberships || memberships.length === 0) {
                renderNoClasses();
                return;
            }

            userClasses = memberships.map(m => m.classes);

            // Update stats
            document.getElementById('statClasses').textContent = userClasses.length;

            // Get student counts for each class
            const classData = await Promise.all(userClasses.map(async (c) => {
                const { count } = await supabase
                    .from('class_members')
                    .select('id', { count: 'exact', head: true })
                    .eq('class_id', c.id);

                return { ...c, studentCount: count || 0 };
            }));

            renderClasses(classData);

            // Show quick actions when classes exist
            document.getElementById('quickActions').style.display = 'flex';
        }

        // Render class cards
        function renderClasses(classData) {
            const grid = document.getElementById('classesGrid');

            grid.innerHTML = classData.map(c => {
                const config = typeConfig[c.type] || typeConfig.latin;

                return `
                    <div class="class-card">
                        <div class="class-card-name">${c.name}</div>
                        <div class="class-card-meta">
                            <span class="chip ${config.chipClass}">${config.chipLabel}</span>
                            <span class="class-card-students">${c.studentCount} student${c.studentCount !== 1 ? 's' : ''}</span>
                        </div>
                        <a href="student.html?class_id=${c.id}" class="btn btn-primary" style="width: 100%;">View Class</a>
                    </div>
                `;
            }).join('');
        }

        // Render no classes state
        function renderNoClasses() {
            const grid = document.getElementById('classesGrid');
            grid.innerHTML = `
                <div class="empty-state" style="grid-column: 1 / -1;">
                    <div class="empty-state-icon">📚</div>
                    <p class="empty-state-text">No classes yet</p>
                    <p class="text-muted">Ask your teacher for a class code to get started!</p>
                </div>
            `;
        }

        // Join a class
        async function joinClass() {
            const input = document.getElementById('joinCodeInput');
            const code = input.value.trim().toUpperCase();

            if (!code) {
                showMessage('Please enter a class code', 'error');
                return;
            }

            const { data: classData, error: classError } = await supabase
                .from('classes')
                .select('id, name')
                .eq('join_code', code)
                .single();

            if (classError || !classData) {
                showMessage('Class not found. Check the code and try again.', 'error');
                return;
            }

            const { data: existing } = await supabase
                .from('class_members')
                .select('id')
                .eq('class_id', classData.id)
                .eq('student_id', currentUser.id)
                .single();

            if (existing) {
                showMessage("You're already in this class!", 'error');
                return;
            }

            const { error: joinError } = await supabase
                .from('class_members')
                .insert({
                    class_id: classData.id,
                    student_id: currentUser.id
                });

            if (joinError) {
                showMessage('Error joining class. Please try again.', 'error');
                return;
            }

            showMessage(`Successfully joined "${classData.name}"!`, 'success');
            input.value = '';
            await loadClasses();
        }

        // Show join message
        function showMessage(text, type) {
            const el = document.getElementById('joinMessage');
            el.textContent = text;
            el.className = 'join-message ' + type;
            el.style.display = 'block';
            setTimeout(() => { el.style.display = 'none'; }, 5000);
        }

        // Load XP data
        async function loadXpData() {
            try {
                await xpSystem.init();

                if (!xpSystem.userId) return;

                const data = xpSystem.getDisplayData();

                document.getElementById('statXp').textContent = data.xp.toLocaleString();
                document.getElementById('statLevel').textContent = data.level;
                document.getElementById('statStreak').textContent = data.streak || 0;
            } catch (err) {
                console.error('Error loading XP data:', err);
            }
        }

        // Load announcements
        async function loadAnnouncements() {
            try {
                // Get announcements for user's classes
                if (userClasses.length === 0) return;

                const classIds = userClasses.map(c => c.id);
                const { data: announcements, error } = await supabase
                    .from('announcements')
                    .select('*')
                    .in('class_id', classIds)
                    .order('created_at', { ascending: false })
                    .limit(5);

                if (error || !announcements || announcements.length === 0) return;

                const section = document.getElementById('announcementsSection');
                const list = document.getElementById('announcementsList');

                list.innerHTML = announcements.map(a => {
                    const isImportant = a.important || a.priority === 'high';
                    const alertClass = isImportant ? 'alert-warning' : 'alert-info';
                    const dateStr = new Date(a.created_at).toLocaleDateString('en-GB', {
                        day: 'numeric', month: 'short'
                    });

                    return `
                        <div class="alert ${alertClass}" style="margin-bottom: 0.5rem;">
                            <div class="announcement-title">${a.title || a.message || ''}</div>
                            ${a.body ? `<div>${a.body}</div>` : ''}
                            <div class="announcement-date">${dateStr}</div>
                        </div>
                    `;
                }).join('');

                section.style.display = 'block';
            } catch (err) {
                console.error('Error loading announcements:', err);
            }
        }

        // Sign out
        async function signOut() {
            await supabase.auth.signOut();
            window.location.href = '../auth/login.html';
        }

        // School prompt modal
        function showSchoolPrompt(userId) {
            const overlay = document.createElement('div');
            overlay.className = 'modal-overlay';
            overlay.style.display = 'flex';
            overlay.innerHTML = `
                <div class="modal" style="padding: 2rem; max-width: 420px;">
                    <h3 style="margin-bottom: 0.5rem;">What school are you from?</h3>
                    <p class="text-muted" style="font-size: 14px; margin-bottom: 1.25rem;">This helps us understand how Classicalia is being used across schools.</p>
                    <div class="form-group" style="margin-bottom: 1rem;">
                        <input type="text" id="schoolPromptInput" class="form-input" placeholder="Enter your school name">
                    </div>
                    <button id="schoolPromptBtn" class="btn btn-primary" style="width: 100%;">Save</button>
                    <p id="schoolPromptError" style="color: var(--g-red); font-size: 13px; margin-top: 0.5rem; display: none;"></p>
                </div>
            `;
            document.body.appendChild(overlay);

            document.getElementById('schoolPromptBtn').addEventListener('click', async () => {
                const school = document.getElementById('schoolPromptInput').value.trim();
                if (!school) {
                    const errEl = document.getElementById('schoolPromptError');
                    errEl.textContent = 'Please enter your school name';
                    errEl.style.display = 'block';
                    return;
                }
                const { error } = await supabase.from('users').update({ school }).eq('id', userId);
                if (error) {
                    const errEl = document.getElementById('schoolPromptError');
                    errEl.textContent = 'Error saving school. Please try again.';
                    errEl.style.display = 'block';
                    return;
                }
                overlay.remove();
            });
        }

        // Start
        init();
    </script>
</body>
</html>
